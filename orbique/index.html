<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbique</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- LANGUAGE SELECT -->
<div id="langSelect">
    <div class="grid-bg"></div>
    <div class="particle-container" id="particles"></div>
    <h1 class="game-title">ORBIQUE</h1>
    <div class="game-subtitle" id="langSubtitle">Choisissez votre langue / Choose your language</div>

    <div class="menu-separator"></div>
    <button class="menu-btn" onclick="setLanguage('fr')">FRANÇAIS</button>
    <button class="menu-btn" onclick="setLanguage('en')">ENGLISH</button>
    <div class="version-tag">v0.1 — ALPHA</div>
</div>

<!-- MENU -->
<div id="menu" style="display:none">
    <div class="grid-bg"></div>
    <div class="particle-container" id="menuParticles"></div>
    <h1 class="game-title">ORBIQUE</h1>
    <div class="game-subtitle" id="menuSubtitle">Rien n'est ce qu'il semble être</div>
    <div class="menu-separator"></div>
    <button class="menu-btn" id="btnEasy" onclick="startGame('easy')">FACILE</button>
    <button class="menu-btn" id="btnBeginner" onclick="startGame('beginner')">DÉBUTANT</button>
    <button class="menu-btn" id="btnSimple" onclick="startGame('simple')">SIMPLE</button>
    <div class="version-tag">v0.1 — ALPHA</div>
</div>

<!-- HUD -->
<div id="hud">
    <div class="item" id="hudPlans">Plans: 0/10</div>
    <div class="item" id="hudKeys">Clefs: 0</div>
    <div class="item" id="hudOrbs">Orbes: 0/4</div>
    <div class="item" id="hudRoom">Zone: ---</div>
</div>
<div id="crosshair"></div>
<div id="interactHint"></div>
<div id="carryIndicator"></div>
<div id="notification"></div>

<!-- TUTORIAL OVERLAY -->
<div id="tutorialOverlay">
    <div class="tuto-message" id="tutoMessage"></div>
    <div class="tuto-progress" id="tutoProgress"></div>
    <div class="tuto-progress-bar"><div class="tuto-progress-fill" id="tutoProgressBar"></div></div>
</div>

<!-- INVENTORY -->
<div id="inventoryPanel">
    <div class="inv-item" id="invOrbeB1">○ Orbe Blanche I</div>
    <div class="inv-item" id="invOrbeB2">○ Orbe Blanche II</div>
    <div class="inv-item" id="invOrbeN1">● Orbe Noire I</div>
    <div class="inv-item" id="invOrbeN2">● Orbe Noire II</div>
</div>

<!-- DOOR ROOM -->
<div id="doorRoomUI">
    <span class="close-btn" onclick="closeDoorRoom()">×</span>
    <div class="doors-container" id="doorsContainer"></div>
</div>

<!-- UNLOCK MODE -->
<div id="unlockMode">
    <div class="combo-hint" id="unlockTitle">MODE DÉVERROUILLAGE<br>Entrez la combinaison</div>
    <div class="combo-display" id="comboDisplay">_</div>
    <div class="combo-result" id="comboResult"></div>
    <div class="combo-hint" id="unlockEsc" style="margin-top:20px">ESC pour quitter</div>
</div>

<!-- MAP -->
<div id="mapOverlay">
    <canvas id="mapCanvas" width="600" height="600"></canvas>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="js/i18n.js"></script>
<script src="js/main.js"></script>
<script src="js/textures.js"></script>
<script src="js/particles.js"></script>
<script src="js/world.js"></script>
<script src="js/rooms.js"></script>
<script src="js/player.js"></script>
<script src="js/puzzles.js"></script>
<script src="js/inventory.js"></script>
<script src="js/tutorial.js"></script>
<script src="js/ui.js"></script>
</body>
</html>
