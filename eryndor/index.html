                // Soldats ou villageois courageux: combattre
                if (distance <= this.combatStats.range + 1) {
                    // À portée: attaquer
                    this.attack(enemy);
                } else {
                    // Se rapprocher
                    const dx = enemy.x - this.x;
                    const dy = enemy.y - this.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const moveSpeed = this.unitType === UNIT_TYPE.CAVALRY ? 3 : 2;
                    const newX = this.x + (dx / dist) * moveSpeed;
                    const newY = this.y + (dy / dist) * moveSpeed;
                    if (gameMap.isWalkable(Math.floor(newX), Math.floor(newY))) {
                        this.targetX = newX;
                        this.targetY = newY;
                    }
                }

                this.currentTask = 'combat';
                return true;
            }

            // Trouver la ressource préférée la plus proche
            findPreferredResource(gameMap, faction) {
                const factionConfig = this.factionType === 'human' ? FACTIONS.HUMAN : FACTIONS.ELF;
                const preferredTerrain = factionConfig.traits.preferredTerrain;

                let bestTarget = null;
                let bestScore = -Infinity;

                const searchRadius = 15;
                const px = Math.floor(this.x);
                const py = Math.floor(this.y);

                for (let dy = -searchRadius; dy <= searchRadius; dy++) {
                    for (let dx = -searchRadius; dx <= searchRadius; dx++) {
                        const x = px + dx;
                        const y = py + dy;

                        if (x < 0 || x >= gameMap.width || y < 0 || y >= gameMap.height) continue;
                        if (gameMap.territory[y][x] !== this.factionId) continue;
                        if (!gameMap.isWalkable(x, y)) continue;

                        const terrain = gameMap.terrain[y][x];
                        const resource = gameMap.resources[y][x];

                        if (resource.amount <= 0) continue;

                        const dist = Math.sqrt(dx * dx + dy * dy);
                        let score = resource.amount - dist * 2;

                        // Bonus pour terrain préféré
                        if (terrain === preferredTerrain) {
                            score += 50;
                        }

                        // Elfes préfèrent aussi les forêts secondairement
                        if (this.factionType === 'elf' && terrain === TERRAIN.FOREST) {
                            score += 30;
                        }

                        // Humains préfèrent aussi le fer
                        if (this.factionType === 'human' && terrain === TERRAIN.IRON) {
                            score += 25;
                        }

                        if (score > bestScore) {
                            bestScore = score;
                            bestTarget = { x, y, terrain };
                        }
                    }
                }

                return bestTarget;
            }

            update(gameMap, faction, allFactions) {
                if (!this.isAlive) return;

                // Mettre à jour le métier périodiquement (tous les 1000 ticks)
                this.jobChangeTimer += CONFIG.gameSpeed;
                if (this.jobChangeTimer > 1000) {
                    this.jobChangeTimer = 0;
                    this.job = this.determineJob();
                }

                this.moveTimer += CONFIG.gameSpeed;

                if (this.moveTimer >= this.moveInterval) {
                    this.moveTimer = 0;
                    this.moveInterval = 50 + Math.random() * 100;

                    // Priorité 1: Combat (sauf pour les breeders qui fuient toujours)
                    if (allFactions && this.job !== JOB.BREEDER) {
                        if (this.handleCombat(allFactions, gameMap)) {
                            // En combat, ne pas faire autre chose
                            this.applyMovement(gameMap);
                            return;
                        }
                    } else if (allFactions && this.job === JOB.BREEDER) {
                        // Les breeders fuient toujours
                        const enemyInfo = this.findNearestEnemy(allFactions);
                        if (enemyInfo && enemyInfo.distance < 8) {
                            this.fleeFrom(enemyInfo.enemy, gameMap);
                            this.applyMovement(gameMap);
                            return;
                        }
                    }

                    // Comportement selon le métier
                    this.executeJobBehavior(gameMap, faction);
                }

                this.applyMovement(gameMap);
            }

            // Applique le mouvement avec la vitesse du terrain
            applyMovement(gameMap) {
                const speedMultiplier = gameMap.getSpeedMultiplier(Math.floor(this.x), Math.floor(this.y));
                const speed = 0.02 * CONFIG.gameSpeed * speedMultiplier;
                this.x += (this.targetX - this.x) * speed;
                this.y += (this.targetY - this.y) * speed;
            }

            // Fuir un ennemi
            fleeFrom(enemy, gameMap) {
                const dx = this.x - enemy.x;
                const dy = this.y - enemy.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist > 0) {
                    const fleeX = Math.max(0, Math.min(CONFIG.mapWidth - 1, this.x + (dx / dist) * 4));
                    const fleeY = Math.max(0, Math.min(CONFIG.mapHeight - 1, this.y + (dy / dist) * 4));
                    if (gameMap.isWalkable(Math.floor(fleeX), Math.floor(fleeY))) {
                        this.targetX = fleeX;
                        this.targetY = fleeY;
                    }
                }
                this.currentTask = 'flee';
            }

            // Exécute le comportement selon le métier
            executeJobBehavior(gameMap, faction) {
                let newX, newY;

                // Évaluer la situation de la faction
                const aliveCount = faction.villagers.filter(v => v.isAlive).length;
                const criticalFood = faction.resources.food < aliveCount * 10; // Critique
                const lowFood = faction.resources.food < aliveCount * 30; // Bas

                // PRIORITÉ SURVIE: Seulement les métiers appropriés cherchent de la nourriture
                // Les builders et warriors continuent leurs tâches
                const isFoodJob = [JOB.GATHERER, JOB.FARMER, JOB.HUNTER, JOB.FISHER].includes(this.job);

                if (criticalFood && this.currentTask !== 'forage' && isFoodJob && Math.random() < 0.4) {
                    // Mode survie: chercher des baies en priorité
                    const berryTarget = this.findResourceOfType(gameMap, faction, [TERRAIN.BERRIES]);
                    if (berryTarget) {
                        this.currentTask = 'forage';
                        this.taskTarget = berryTarget;
                    }
                }

                // Si en mode forage (survie), collecter les baies
                if (this.currentTask === 'forage') {
                    this.doGatherTask(gameMap, faction);
                    // Sortir du mode forage si assez de nourriture
                    if (faction.resources.food > aliveCount * 25) {
                        this.currentTask = null;
                        this.taskTarget = null;
                    }
                    return;
                }

                switch (this.job) {
                    case JOB.GATHERER:
                        // Collecteur: cherche bois, pierre, fer, or ET baies si nourriture basse
                        if (!this.currentTask || this.currentTask === 'flee' || Math.random() < 0.05) {
                            // Si nourriture basse, priorité aux baies
                            let target;
                            if (lowFood) {
                                target = this.findResourceOfType(gameMap, faction, [TERRAIN.BERRIES]);
                            }
                            if (!target) {
                                target = this.findResourceOfType(gameMap, faction, [TERRAIN.FOREST, TERRAIN.STONE, TERRAIN.IRON, TERRAIN.GOLD, TERRAIN.BERRIES]);
                            }
                            if (target) {
                                this.currentTask = 'gather';
                                this.taskTarget = target;
                            }
                        }
                        this.doGatherTask(gameMap, faction);
                        break;

                    case JOB.FARMER:
                        // Fermier: reste près des fermes, produit de la nourriture
                        if (!this.currentTask || this.currentTask === 'flee' || Math.random() < 0.05) {
                            const farm = this.findNearestBuilding(faction, BUILDING.FARM);
                            if (farm) {
                                this.currentTask = 'farm';
                                this.taskTarget = farm;
                            } else {
                                // Pas de ferme, collecte des baies ou nourriture dans les forêts
                                const target = this.findResourceOfType(gameMap, faction, [TERRAIN.BERRIES, TERRAIN.FOREST]);
                                if (target) {
                                    this.currentTask = 'gather';
                                    this.taskTarget = target;
                                }
                            }
                        }
                        if (this.currentTask === 'farm') {
                            this.doFarmTask(gameMap, faction);
                        } else {
                            this.doGatherTask(gameMap, faction);
                        }
                        break;

                    case JOB.BUILDER:
                        // Constructeur: aide à la construction et collecte des matériaux
                        if (!this.currentTask || this.currentTask === 'flee' || Math.random() < 0.05) {
                            // Vérifier les besoins en ressources de construction
                            const needWood = faction.resources.wood < 100;
                            const needStone = faction.resources.stone < 50;

                            if (needWood || needStone) {
                                // Collecter des matériaux de construction
                                const terrains = needWood ? [TERRAIN.FOREST] : [TERRAIN.STONE];
                                const target = this.findResourceOfType(gameMap, faction, terrains);
                                if (target) {
                                    this.currentTask = 'gather';
                                    this.taskTarget = target;
                                }
                            } else {
                                // Assez de ressources: aller près du château pour aider
                                const castle = this.findNearestBuilding(faction, BUILDING.CASTLE);
                                if (castle) {
                                    this.currentTask = 'build';
                                    this.taskTarget = castle;
                                }
                            }
                        }
                        if (this.currentTask === 'gather') {
                            this.doGatherTask(gameMap, faction);
                        } else {
                            this.doBuildTask(gameMap, faction);
                        }
                        break;

                    case JOB.WARRIOR:
                        // Guerrier: patrouille aux frontières
                        if (!this.currentTask || this.currentTask === 'flee' || Math.random() < 0.1) {
                            this.currentTask = 'patrol';
                            // Patrouiller vers la frontière
                            const borderPos = this.findBorderPosition(gameMap, faction);
                            if (borderPos) {
                                this.taskTarget = borderPos;
                            }
                        }
                        this.doPatrolTask(gameMap, faction);
                        break;

                    case JOB.HUNTER:
                        // Chasseur: chasse les animaux pour produire de la nourriture
                        if (!this.currentTask || this.currentTask === 'flee' || Math.random() < 0.08) {
                            // Priorité: chercher un animal à chasser
                            const animal = this.findNearestAnimal(gameMap, faction);
                            if (animal) {
                                this.currentTask = 'hunt';
                                this.huntTarget = animal;
                            } else {
                                // Pas d'animal, collecter dans la forêt ou patrouiller
                                if (Math.random() < 0.5) {
                                    const target = this.findResourceOfType(gameMap, faction, [TERRAIN.FOREST, TERRAIN.BERRIES]);
                                    if (target) {
                                        this.currentTask = 'gather';
                                        this.taskTarget = target;
                                    }
                                } else {
                                    this.currentTask = 'patrol';
                                    const borderPos = this.findBorderPosition(gameMap, faction);
                                    if (borderPos) this.taskTarget = borderPos;
                                }
                            }
                        }
                        if (this.currentTask === 'hunt') {
                            this.doHuntTask(gameMap, faction);
                        } else if (this.currentTask === 'patrol') {
                            this.doPatrolTask(gameMap, faction);
                        } else {
                            this.doGatherTask(gameMap, faction);
                        }
                        break;

                    case JOB.FISHER:
                        // Pêcheur: reste près de l'eau
                        if (!this.currentTask || this.currentTask === 'flee' || Math.random() < 0.05) {
                            const waterPos = this.findNearbyWater(gameMap, faction);
                            if (waterPos) {
                                this.currentTask = 'fish';
                                this.taskTarget = waterPos;
                            }
                        }
                        this.doFishTask(gameMap, faction);
                        break;

                    case JOB.BREEDER:
                        // Breeder: reste près des maisons, socialise
                        if (!this.currentTask || this.currentTask === 'flee' || Math.random() < 0.05) {
                            const house = this.findNearestBuilding(faction, BUILDING.HOUSE);
                            const castle = this.findNearestBuilding(faction, BUILDING.CASTLE);
                            this.taskTarget = house || castle;
                            this.currentTask = 'socialize';
                        }
                        this.doSocializeTask(gameMap, faction);
                        break;

                    default:
                        // Comportement par défaut: mouvement aléatoire
                        this.doRandomMovement(gameMap);
                }
            }

            // Trouve une ressource d'un type spécifique
            findResourceOfType(gameMap, faction, terrainTypes) {
                let bestTarget = null;
                let bestScore = -Infinity;
                const searchRadius = 20;

                for (let dy = -searchRadius; dy <= searchRadius; dy++) {
                    for (let dx = -searchRadius; dx <= searchRadius; dx++) {
                        const x = Math.floor(this.x) + dx;
                        const y = Math.floor(this.y) + dy;
                        if (x < 0 || x >= gameMap.width || y < 0 || y >= gameMap.height) continue;
                        if (!gameMap.isWalkable(x, y)) continue;

                        const terrain = gameMap.terrain[y][x];
                        if (!terrainTypes.includes(terrain)) continue;

                        const resource = gameMap.resources[y][x];
                        if (resource.amount <= 0) continue;

                        const dist = Math.sqrt(dx * dx + dy * dy);
                        // Score basé sur la distance et la quantité, avec un peu de hasard pour éviter les groupements
                        const score = resource.amount - dist * 2 + Math.random() * 15;

                        if (score > bestScore) {
                            bestScore = score;
                            bestTarget = { x: x + 0.5, y: y + 0.5 };
                        }
                    }
                }
                return bestTarget;
            }

            // Trouve le bâtiment le plus proche d'un type
            findNearestBuilding(faction, buildingType) {
                let nearest = null;
                let nearestDist = Infinity;

                faction.buildings.forEach(b => {
                    if (b.type === buildingType) {
                        const dx = b.x - this.x;
                        const dy = b.y - this.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < nearestDist) {
                            nearestDist = dist;
                            nearest = { x: b.x + 0.5, y: b.y + 0.5 };
                        }
                    }
                });
                return nearest;
            }

            // Trouve une position à la frontière du territoire
            findBorderPosition(gameMap, faction) {
                const candidates = [];
                for (let y = 0; y < gameMap.height; y++) {
                    for (let x = 0; x < gameMap.width; x++) {
                        if (gameMap.territory[y][x] !== faction.id) continue;
                        // Vérifier si c'est une frontière
                        const neighbors = [[x - 1, y], [x + 1, y], [x, y - 1], [x, y + 1]];
                        const isBorder = neighbors.some(([nx, ny]) => {
                            if (nx < 0 || nx >= gameMap.width || ny < 0 || ny >= gameMap.height) return true;
                            return gameMap.territory[ny][nx] !== faction.id;
                        });
                        if (isBorder && gameMap.isWalkable(x, y)) {
                            candidates.push({ x: x + 0.5, y: y + 0.5 });
                        }
                    }
                }
                if (candidates.length === 0) return null;
                return candidates[Math.floor(Math.random() * candidates.length)];
            }

            // Trouve de l'eau proche
            findNearbyWater(gameMap, faction) {
                let nearest = null;
                let nearestDist = Infinity;

                for (let dy = -15; dy <= 15; dy++) {
                    for (let dx = -15; dx <= 15; dx++) {
                        const x = Math.floor(this.x) + dx;
                        const y = Math.floor(this.y) + dy;
                        if (x < 0 || x >= gameMap.width || y < 0 || y >= gameMap.height) continue;

                        if (gameMap.terrain[y][x] === TERRAIN.WATER) {
                            // Chercher une case adjacente à l'eau qui est marchable
                            const adjacent = [[x - 1, y], [x + 1, y], [x, y - 1], [x, y + 1]];
                            for (const [ax, ay] of adjacent) {
                                if (ax >= 0 && ax < gameMap.width && ay >= 0 && ay < gameMap.height) {
                                    if (gameMap.isWalkable(ax, ay) && gameMap.terrain[ay][ax] !== TERRAIN.WATER) {
                                        const dist = Math.sqrt(dx * dx + dy * dy);
                                        if (dist < nearestDist) {
                                            nearestDist = dist;
                                            nearest = { x: ax + 0.5, y: ay + 0.5 };
                                        }
                                    }
                                }
                            }
                        }
                    }
                }
                return nearest;
            }

            // Tâche: collecter des ressources
            doGatherTask(gameMap, faction) {
                if (!this.taskTarget) {
                    this.doRandomMovement(gameMap);
                    return;
                }

                const dx = this.taskTarget.x - this.x;
                const dy = this.taskTarget.y - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < 1.5) {
                    this.gatherTimer += CONFIG.gameSpeed;
                    if (this.gatherTimer > 50) {
                        this.gatherTimer = 0;
                        const tx = Math.floor(this.taskTarget.x);
                        const ty = Math.floor(this.taskTarget.y);
                        const resource = gameMap.resources[ty][tx];
                        const terrain = gameMap.terrain[ty][tx];

                        if (resource && resource.amount > 0) {
                            const skillBonus = 1 + this.skills.gathering / 100;
                            // Bonus de technologie mining pour pierre/fer
                            const techBonus = (terrain === TERRAIN.STONE || terrain === TERRAIN.IRON)
                                ? (faction.traits.miningBonus || 1) : 1;
                            const gatherAmount = Math.min(5 * skillBonus * techBonus, resource.amount);
                            resource.amount -= gatherAmount;

                            if (terrain === TERRAIN.FOREST) faction.resources.wood += gatherAmount;
                            else if (terrain === TERRAIN.STONE) faction.resources.stone += gatherAmount;
                            else if (terrain === TERRAIN.IRON) faction.resources.iron += gatherAmount;
                            else if (terrain === TERRAIN.GOLD) faction.resources.gold += gatherAmount * (faction.traits.tradeBonus || 1);
                            else if (terrain === TERRAIN.BERRIES) faction.resources.food += gatherAmount * 1.5; // Baies = bonne source de nourriture

                            this.skills.gathering = Math.min(100, this.skills.gathering + 0.1);
                        }

                        if (!resource || resource.amount <= 0) {
                            this.currentTask = null;
                            this.taskTarget = null;
                        }
                    }
                } else {
                    this.moveToward(this.taskTarget, gameMap, 2);
                }
            }

            // Tâche: fermier - produit de la nourriture près des fermes
            doFarmTask(gameMap, faction) {
                if (!this.taskTarget) {
                    this.doRandomMovement(gameMap);
                    return;
                }

                const dx = this.taskTarget.x - this.x;
                const dy = this.taskTarget.y - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < 3) {
                    // Près de la ferme: produire de la nourriture (production augmentée)
                    this.gatherTimer += CONFIG.gameSpeed;
                    if (this.gatherTimer > 25) { // Plus fréquent (était 40)
                        this.gatherTimer = 0;
                        const skillBonus = 1 + this.skills.farming / 50; // Bonus compétence doublé
                        // Bonus de technologie agriculture
                        const techBonus = faction.traits.farmingBonus || 1;
                        // Bonus saisonnier
                        const seasonMods = getSeasonModifiers();
                        faction.resources.food += 5 * skillBonus * techBonus * seasonMods.foodProduction * CONFIG.gameSpeed * 0.15;
                        this.skills.farming = Math.min(100, this.skills.farming + 0.15);
                    }
                    // Petit mouvement autour de la ferme
                    if (Math.random() < 0.1) {
                        const newX = this.taskTarget.x + (Math.random() - 0.5) * 4;
                        const newY = this.taskTarget.y + (Math.random() - 0.5) * 4;
                        if (gameMap.isWalkable(Math.floor(newX), Math.floor(newY))) {
                            this.targetX = newX;
                            this.targetY = newY;
                        }
                    }
                } else {
                    this.moveToward(this.taskTarget, gameMap, 2);
                }
            }

            // Tâche: constructeur - aide à la construction
            doBuildTask(gameMap, faction) {
                if (!this.taskTarget) {
                    this.doRandomMovement(gameMap);
                    return;
                }

                const dx = this.taskTarget.x - this.x;
                const dy = this.taskTarget.y - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < 5) {
                    // Près du chantier: améliore les stats de construction de la faction
                    this.gatherTimer += CONFIG.gameSpeed;
                    if (this.gatherTimer > 60) {
                        this.gatherTimer = 0;
                        this.skills.building = Math.min(100, this.skills.building + 0.1);
                        // Petit bonus à la vitesse de construction
                        faction.traits.buildSpeed = Math.min(2, (faction.traits.buildSpeed || 1) + 0.001);
                    }
                    // Mouvement autour du chantier
                    if (Math.random() < 0.15) {
                        const newX = this.taskTarget.x + (Math.random() - 0.5) * 6;
                        const newY = this.taskTarget.y + (Math.random() - 0.5) * 6;
                        if (gameMap.isWalkable(Math.floor(newX), Math.floor(newY))) {
                            this.targetX = newX;
                            this.targetY = newY;
                        }
                    }
                } else {
                    this.moveToward(this.taskTarget, gameMap, 2);
                }
            }

            // Tâche: patrouiller
            doPatrolTask(gameMap, faction) {
                if (!this.taskTarget) {
                    this.doRandomMovement(gameMap);
                    return;
                }

                const dx = this.taskTarget.x - this.x;
                const dy = this.taskTarget.y - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < 2) {
                    // Arrivé, chercher un nouveau point
                    this.currentTask = null;
                    this.taskTarget = null;
                    this.skills.combat = Math.min(100, this.skills.combat + 0.05);
                } else {
                    this.moveToward(this.taskTarget, gameMap, 2.5);
                }
            }

            // Tâche: pêcher
            doFishTask(gameMap, faction) {
                if (!this.taskTarget) {
                    this.doRandomMovement(gameMap);
                    return;
                }

                const dx = this.taskTarget.x - this.x;
                const dy = this.taskTarget.y - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < 2) {
                    // Près de l'eau: pêcher
                    this.gatherTimer += CONFIG.gameSpeed;
                    if (this.gatherTimer > 45) {
                        this.gatherTimer = 0;
                        const skillBonus = 1 + (this.skills.farming + this.skills.gathering) / 200;
                        faction.resources.fish = (faction.resources.fish || 0) + 1.5 * skillBonus;
                        faction.resources.food += 1 * skillBonus; // Le poisson compte aussi comme nourriture
                        this.skills.farming = Math.min(100, this.skills.farming + 0.05);
                    }
                    // Petit mouvement le long de l'eau
                    if (Math.random() < 0.08) {
                        const newX = this.x + (Math.random() - 0.5) * 3;
                        const newY = this.y + (Math.random() - 0.5) * 3;
                        if (gameMap.isWalkable(Math.floor(newX), Math.floor(newY))) {
                            this.targetX = newX;
                            this.targetY = newY;
                        }
                    }
                } else {
                    this.moveToward(this.taskTarget, gameMap, 1.5);
                }
            }

            // Trouve l'animal le plus proche dans le territoire
            findNearestAnimal(gameMap, faction) {
                if (!gameMap.animals || gameMap.animals.length === 0) return null;

                let nearest = null;
                let nearestDist = Infinity;

                for (const animal of gameMap.animals) {
                    if (!animal.isAlive || animal.typeData.aquatic) continue;

                    const dx = animal.x - this.x;
                    const dy = animal.y - this.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    // Vérifier si l'animal est dans notre territoire ou proche
                    const ax = Math.floor(animal.x);
                    const ay = Math.floor(animal.y);
                    if (ax >= 0 && ax < gameMap.width && ay >= 0 && ay < gameMap.height) {
                        const inTerritory = gameMap.territory[ay][ax] === faction.id;
                        const closeEnough = dist < 15;

                        if ((inTerritory || closeEnough) && dist < nearestDist) {
                            nearestDist = dist;
                            nearest = animal;
                        }
                    }
                }
                return nearest;
            }

            // Tâche: chasser un animal
            doHuntTask(gameMap, faction) {
                // Vérifier si la cible existe encore
                if (!this.huntTarget || !this.huntTarget.isAlive) {
                    this.currentTask = null;
                    this.huntTarget = null;
                    return;
                }

                const dx = this.huntTarget.x - this.x;
                const dy = this.huntTarget.y - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                // Portée d'attaque (les chasseurs ont une portée)
                const attackRange = 2 + (this.skills.archery / 50);

                if (dist < attackRange) {
                    // À portée: attaquer l'animal
                    this.gatherTimer += CONFIG.gameSpeed;
                    if (this.gatherTimer > 30) {
                        this.gatherTimer = 0;

                        // Infliger des dégâts à l'animal
                        const damage = 10 + this.skills.archery * 0.3;
                        this.huntTarget.health -= damage;

                        // Améliorer les compétences
                        this.skills.archery = Math.min(100, this.skills.archery + 0.1);
                        this.skills.combat = Math.min(100, this.skills.combat + 0.05);

                        // Si l'animal est mort, récolter la viande
                        if (this.huntTarget.health <= 0) {
                            this.huntTarget.isAlive = false;
                            const foodGained = this.huntTarget.typeData.food || 10;
                            faction.resources.food += foodGained;
                            this.huntTarget = null;
                            this.currentTask = null;
                        }
                    }
                } else {
                    // Se rapprocher de l'animal
                    this.moveToward({ x: this.huntTarget.x, y: this.huntTarget.y }, gameMap, 2);
                }
            }

            // Tâche: socialiser (pour les breeders)
            doSocializeTask(gameMap, faction) {
                if (!this.taskTarget) {
                    this.taskTarget = { x: this.x, y: this.y };
                }

                const dx = this.taskTarget.x - this.x;
                const dy = this.taskTarget.y - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < 4) {
                    // Près de la maison: rester dans les parages
                    if (Math.random() < 0.1) {
                        const newX = this.taskTarget.x + (Math.random() - 0.5) * 6;
                        const newY = this.taskTarget.y + (Math.random() - 0.5) * 6;
                        if (gameMap.isWalkable(Math.floor(newX), Math.floor(newY))) {
                            this.targetX = newX;
                            this.targetY = newY;
                        }
                    }
                } else {
                    this.moveToward(this.taskTarget, gameMap, 1);
                }
            }

            // Mouvement aléatoire
            doRandomMovement(gameMap) {
                const dx = (Math.random() - 0.5) * 4;
                const dy = (Math.random() - 0.5) * 4;
                const newX = Math.max(0, Math.min(CONFIG.mapWidth - 1, this.x + dx));
                const newY = Math.max(0, Math.min(CONFIG.mapHeight - 1, this.y + dy));
                if (gameMap.isWalkable(Math.floor(newX), Math.floor(newY))) {
                    this.targetX = newX;
                    this.targetY = newY;
                }
            }

            // Se déplacer vers une cible
            moveToward(target, gameMap, speed) {
                const dx = target.x - this.x;
                const dy = target.y - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist > 0) {
                    const newX = Math.max(0, Math.min(CONFIG.mapWidth - 1, this.x + (dx / dist) * speed));
                    const newY = Math.max(0, Math.min(CONFIG.mapHeight - 1, this.y + (dy / dist) * speed));
                    if (gameMap.isWalkable(Math.floor(newX), Math.floor(newY))) {
                        this.targetX = newX;
                        this.targetY = newY;
                    }
                }
            }
        }

        // ============================================
        // GÉNÉRATION DE CARTE
        // ============================================
        class GameMap {
            constructor(width, height) {
                this.width = width;
                this.height = height;
                this.terrain = [];
                this.elevation = [];  // Nouveau: niveau d'élévation
                this.buildings = [];
                this.territory = [];
                this.resources = [];
                this.generate();
            }

            generate() {
                for (let y = 0; y < this.height; y++) {
                    this.terrain[y] = [];
                    this.elevation[y] = [];
                    this.buildings[y] = [];
                    this.territory[y] = [];
                    this.resources[y] = [];

                    for (let x = 0; x < this.width; x++) {
                        this.terrain[y][x] = TERRAIN.GRASS;
                        this.elevation[y][x] = 0;  // 0 = pas d'élévation spéciale
                        this.buildings[y][x] = { type: BUILDING.NONE, faction: -1 };
                        this.territory[y][x] = -1;
                        this.resources[y][x] = { amount: 0, type: null };
                    }
                }

                this.generateClusters(TERRAIN.FOREST, 15, 8, 12);
                this.generateClusters(TERRAIN.STONE, 8, 4, 6);
                this.generateClusters(TERRAIN.IRON, 6, 3, 5);
                this.generateClusters(TERRAIN.BERRIES, 20, 4, 8); // Beaucoup de baies pour survie initiale
                this.generateWaterBodies(4, 5, 8);
                this.generateMountainRanges();

                // Générer des animaux
                this.animals = [];
                this.generateAnimals();
            }

            generateAnimals() {
                // Moutons et vaches sur l'herbe (plus nombreux)
                for (let i = 0; i < 25; i++) {
                    const pos = this.findRandomGrassPosition();
                    if (pos) {
                        const type = Math.random() < 0.5 ? 'SHEEP' : 'COW';
                        this.animals.push(new Animal(type, pos.x, pos.y));
                    }
                }
                // Poules
                for (let i = 0; i < 20; i++) {
                    const pos = this.findRandomGrassPosition();
                    if (pos) {
                        this.animals.push(new Animal('CHICKEN', pos.x, pos.y));
                    }
                }
                // Cochons près des forêts
                for (let i = 0; i < 15; i++) {
                    const pos = this.findPositionNear(TERRAIN.FOREST);
                    if (pos) {
                        this.animals.push(new Animal('PIG', pos.x, pos.y));
                    }
                }
                // Cerfs dans/près des forêts (plus de cerfs = plus de chasse)
                for (let i = 0; i < 12; i++) {
                    const pos = this.findPositionNear(TERRAIN.FOREST);
                    if (pos) {
                        this.animals.push(new Animal('DEER', pos.x, pos.y));
                    }
                }
            }

            // Fait se reproduire les animaux périodiquement
            spawnNewAnimals() {
                // Limiter le nombre total d'animaux
                const maxAnimals = 100;
                if (this.animals.filter(a => a.isAlive).length >= maxAnimals) return;

                // Chance de spawn basée sur le nombre actuel
                if (Math.random() > 0.02) return;

                const types = ['SHEEP', 'COW', 'CHICKEN', 'PIG', 'DEER'];
                const type = types[Math.floor(Math.random() * types.length)];

                const pos = type === 'DEER' || type === 'PIG'
                    ? this.findPositionNear(TERRAIN.FOREST)
                    : this.findRandomGrassPosition();

                if (pos) {
                    this.animals.push(new Animal(type, pos.x, pos.y));
                }
            }

            findRandomGrassPosition() {
                for (let attempt = 0; attempt < 50; attempt++) {
                    const x = Math.floor(Math.random() * this.width);
                    const y = Math.floor(Math.random() * this.height);
                    if (this.terrain[y][x] === TERRAIN.GRASS) {
                        return { x: x + 0.5, y: y + 0.5 };
                    }
                }
                return null;
            }

            findPositionNear(terrainType) {
                for (let attempt = 0; attempt < 50; attempt++) {
                    const x = Math.floor(Math.random() * this.width);
                    const y = Math.floor(Math.random() * this.height);
                    // Chercher une case herbe près du terrain voulu
                    if (this.terrain[y][x] === TERRAIN.GRASS) {
                        const neighbors = [{ x: x - 1, y }, { x: x + 1, y }, { x, y: y - 1 }, { x, y: y + 1 }];
                        const nearTarget = neighbors.some(n => {
                            if (n.x < 0 || n.x >= this.width || n.y < 0 || n.y >= this.height) return false;
                            return this.terrain[n.y][n.x] === terrainType;
                        });
                        if (nearTarget) {
                            return { x: x + 0.5, y: y + 0.5 };
                        }
                    }
                }
                return this.findRandomGrassPosition(); // Fallback
            }

            generateClusters(type, count, minSize, maxSize) {
                for (let i = 0; i < count; i++) {
                    const cx = Math.floor(Math.random() * (this.width - 10)) + 5;
                    const cy = Math.floor(Math.random() * (this.height - 10)) + 5;
                    const size = minSize + Math.floor(Math.random() * (maxSize - minSize));

                    for (let j = 0; j < size; j++) {
                        const angle = Math.random() * Math.PI * 2;
                        const dist = Math.random() * (size / 2);
                        const x = Math.floor(cx + Math.cos(angle) * dist);
                        const y = Math.floor(cy + Math.sin(angle) * dist);

                        if (x >= 0 && x < this.width && y >= 0 && y < this.height) {
                            if (this.terrain[y][x] === TERRAIN.GRASS) {
                                this.terrain[y][x] = type;
                                // Les baies ont plus de ressources pour la survie
                                const amount = type === TERRAIN.BERRIES
                                    ? 100 + Math.floor(Math.random() * 100)  // Baies: 100-200
                                    : 50 + Math.floor(Math.random() * 50);   // Autres: 50-100
                                this.resources[y][x] = { amount: amount, type: type };
                            }
                        }
                    }
                }
            }

            generateWaterBodies(count, minSize, maxSize) {
                for (let i = 0; i < count; i++) {
                    const cx = Math.floor(Math.random() * (this.width - 10)) + 5;
                    const cy = Math.floor(Math.random() * (this.height - 10)) + 5;
                    const size = minSize + Math.floor(Math.random() * (maxSize - minSize));

                    for (let j = 0; j < size * 2; j++) {
                        const angle = Math.random() * Math.PI * 2;
                        const dist = Math.random() * (size / 2);
                        const x = Math.floor(cx + Math.cos(angle) * dist);
                        const y = Math.floor(cy + Math.sin(angle) * dist);

                        if (x >= 0 && x < this.width && y >= 0 && y < this.height) {
                            this.terrain[y][x] = TERRAIN.WATER;
                            // Profondeur: centre plus profond
                            const distFromCenter = Math.sqrt(Math.pow(x - cx, 2) + Math.pow(y - cy, 2));
                            if (distFromCenter < size / 4) {
                                this.elevation[y][x] = ELEVATION.DEEP;
                            } else if (distFromCenter < size / 2.5) {
                                this.elevation[y][x] = ELEVATION.MEDIUM;
                            } else {
                                this.elevation[y][x] = ELEVATION.SHALLOW;
                            }
                        }
                    }
                }
            }

            generateMountainRanges() {
                // Montagnes sur les bords avec élévation variable
                for (let x = 0; x < this.width; x++) {
                    if (Math.random() < 0.5) {
                        this.terrain[0][x] = TERRAIN.MOUNTAIN;
                        this.elevation[0][x] = 1 + Math.floor(Math.random() * 3);
                    }
                    if (Math.random() < 0.5) {
                        this.terrain[this.height - 1][x] = TERRAIN.MOUNTAIN;
                        this.elevation[this.height - 1][x] = 1 + Math.floor(Math.random() * 3);
                    }
                }
                for (let y = 0; y < this.height; y++) {
                    if (Math.random() < 0.5) {
                        this.terrain[y][0] = TERRAIN.MOUNTAIN;
                        this.elevation[y][0] = 1 + Math.floor(Math.random() * 3);
                    }
                    if (Math.random() < 0.5) {
                        this.terrain[y][this.width - 1] = TERRAIN.MOUNTAIN;
                        this.elevation[y][this.width - 1] = 1 + Math.floor(Math.random() * 3);
                    }
                }
            }

            isWalkable(x, y, factionId = -1) {
                if (x < 0 || x >= this.width || y < 0 || y >= this.height) return false;
                const terrain = this.terrain[y][x];
                const elev = this.elevation[y][x];
                const building = this.buildings[y][x];

                // Mur: bloque passage sauf pour la faction propriétaire
                if (building.type === BUILDING.WALL && building.faction !== factionId) {
                    return false;
                }

                // Eau: seulement peu profonde (niveau 1) est marchable
                if (terrain === TERRAIN.WATER) {
                    return elev === ELEVATION.SHALLOW;
                }
                // Montagne: seulement normale (niveau 1) est marchable
                if (terrain === TERRAIN.MOUNTAIN) {
                    return elev === ELEVATION.SHALLOW || elev === 1;
                }
                return true;
            }

            // Retourne le multiplicateur de vitesse sur cette case
            getSpeedMultiplier(x, y) {
                if (x < 0 || x >= this.width || y < 0 || y >= this.height) return 1;
                const building = this.buildings[y][x];
                const terrain = this.terrain[y][x];
                const elev = this.elevation[y][x];

                // Route: vitesse x1.8
                if (building.type === BUILDING.ROAD) {
                    return 1.8;
                }

                // Montagne basse: vitesse x0.5
                if (terrain === TERRAIN.MOUNTAIN && elev === 1) {
                    return 0.5;
                }

                // Forêt: vitesse x0.8
                if (terrain === TERRAIN.FOREST) {
                    return 0.8;
                }

                return 1;
            }

            // Vérifie si une tour peut attaquer depuis cette position
            getTowerAt(x, y) {
                if (x < 0 || x >= this.width || y < 0 || y >= this.height) return null;
                const building = this.buildings[y][x];
                if (building.type === BUILDING.TOWER || building.type === BUILDING.WATCHTOWER) {
                    return building;
                }
                return null;
            }

            isValidBuildLocation(x, y) {
                if (x < 0 || x >= this.width || y < 0 || y >= this.height) return false;
                const terrain = this.terrain[y][x];
                return terrain === TERRAIN.GRASS && this.buildings[y][x].type === BUILDING.NONE;
            }

            // Vérifie si un bateau peut naviguer sur cette case
            isNavigable(x, y) {
                if (x < 0 || x >= this.width || y < 0 || y >= this.height) return false;
                const terrain = this.terrain[y][x];
                const elev = this.elevation[y][x];

                // Bateaux: seulement eau profonde ou très profonde (pas peu profonde)
                if (terrain === TERRAIN.WATER) {
                    return elev >= ELEVATION.MEDIUM;  // Niveau 2 ou 3
                }
                return false;
            }

            // Vérifie si un port peut être construit (besoin d'eau adjacente navigable)
            canBuildPort(x, y, factionId) {
                if (x < 0 || x >= this.width || y < 0 || y >= this.height) return false;

                // Le port doit être sur terre ferme
                const terrain = this.terrain[y][x];
                if (terrain !== TERRAIN.GRASS) return false;
                if (this.buildings[y][x].type !== BUILDING.NONE) return false;
                if (this.territory[y][x] !== factionId) return false;

                // Compter l'eau navigable adjacente et dans le territoire
                let deepWaterCount = 0;
                let mediumWaterCount = 0;

                const checkRadius = 5;
                for (let dy = -checkRadius; dy <= checkRadius; dy++) {
                    for (let dx = -checkRadius; dx <= checkRadius; dx++) {
                        const nx = x + dx;
                        const ny = y + dy;
                        if (nx < 0 || nx >= this.width || ny < 0 || ny >= this.height) continue;

                        if (this.terrain[ny][nx] === TERRAIN.WATER) {
                            const depth = this.elevation[ny][nx];
                            if (depth === ELEVATION.DEEP) deepWaterCount++;
                            else if (depth === ELEVATION.MEDIUM) mediumWaterCount++;
                        }
                    }
                }

                // Besoin d'au moins 1 case très profonde et 4 cases moyennement profondes
                return deepWaterCount >= 1 && mediumWaterCount >= 4;
            }

            // Trouve une case d'eau navigable près d'une position
            findNearbyNavigableWater(x, y) {
                const searchRadius = 3;
                for (let dy = -searchRadius; dy <= searchRadius; dy++) {
                    for (let dx = -searchRadius; dx <= searchRadius; dx++) {
                        const nx = x + dx;
                        const ny = y + dy;
                        if (this.isNavigable(nx, ny)) {
                            return { x: nx, y: ny };
                        }
                    }
                }
                return null;
            }

            setTerrain(x, y, terrainType, brushSize = 1) {
                for (let dy = -brushSize + 1; dy < brushSize; dy++) {
                    for (let dx = -brushSize + 1; dx < brushSize; dx++) {
                        const nx = x + dx;
                        const ny = y + dy;
                        if (nx >= 0 && nx < this.width && ny >= 0 && ny < this.height) {
                            const dist = Math.sqrt(dx * dx + dy * dy);
                            if (dist < brushSize) {
                                const oldTerrain = this.terrain[ny][nx];
                                const oldElev = this.elevation[ny][nx];

                                // Si même type de terrain avec niveaux, augmenter le niveau
                                if ((terrainType === TERRAIN.WATER || terrainType === TERRAIN.MOUNTAIN) &&
                                    oldTerrain === terrainType) {
                                    // Cycle: 1 -> 2 -> 3 -> 1
                                    this.elevation[ny][nx] = (oldElev % 3) + 1;
                                } else {
                                    this.terrain[ny][nx] = terrainType;
                                    // Reset élévation pour nouveau terrain
                                    if (terrainType === TERRAIN.WATER || terrainType === TERRAIN.MOUNTAIN) {
                                        this.elevation[ny][nx] = 1;
                                    } else {
                                        this.elevation[ny][nx] = 0;
                                    }
                                    // Ajouter des ressources pour les terrains qui en ont
                                    if (terrainType === TERRAIN.FOREST || terrainType === TERRAIN.STONE ||
                                        terrainType === TERRAIN.IRON || terrainType === TERRAIN.GOLD ||
                                        terrainType === TERRAIN.BERRIES) {
                                        this.resources[ny][nx] = { amount: 50 + Math.floor(Math.random() * 50), type: terrainType };
                                    } else {
                                        this.resources[ny][nx] = { amount: 0, type: null };
                                    }
                                    // Supprimer le bâtiment si présent
                                    this.buildings[ny][nx] = { type: BUILDING.NONE, faction: -1 };
                                }
                            }
                        }
                    }
                }
            }
        }

        // ============================================
        // CLASSE FACTION
        // ============================================
        class Faction {
            constructor(config, startX, startY) {
                this.id = config.id;
                this.name = config.name;
                this.color = config.color;
                this.lightColor = config.lightColor;
                this.darkColor = config.darkColor;
                this.emoji = config.emoji;
                this.type = config.type;
                this.traits = { ...config.traits }; // Clone pour modifications
                this.startX = startX;
                this.startY = startY;

                this.resources = { wood: 300, stone: 150, iron: 80, food: 2500, gold: 150, fish: 0 };
                this.population = 10;
                this.maxPopulation = 20;
                this.villagers = [];
                this.buildings = [];
                this.boats = [];
                this.territorySize = 0;
                this.completedTechs = [];
                this.currentResearch = null;
                this.researchProgress = 0;
                this.production = { wood: 1, stone: 0.5, iron: 0.3, food: 2, gold: 0.5 };

                // Compteur pour vérifier périodiquement si on peut construire
                this.portCheckTimer = 0;
                this.colonyCheckTimer = 0;
                this.infrastructureTimer = 0;

                // Système militaire
                this.trainingQueue = [];
                this.militaryUnits = 0;

                // Système de guerre
                this.warState = {
                    isAtWar: false,
                    enemyId: null,
                    warStartTick: 0
                };

                // === NOUVEAUX SYSTÈMES ===

                // Système de colonies
                this.colonies = []; // [{ x, y, foundedTick, population }]
                this.maxColonies = CONFIG.colonyMaxCount;

                // Système de diplomatie
                this.diplomacy = {
                    relations: {},
                    treaties: [],
                    tributePaid: 0,
                    lastInteraction: 0
                };

                // Statistiques pour conditions de victoire
                this.stats = {
                    totalKills: 0,
                    totalDeaths: 0,
                    buildingsConstructed: 0,
                    techsResearched: 0,
                    peakPopulation: 0,
                    warsDeclared: 0,
                    warsWon: 0
                };

                // Bonus des bâtiments spéciaux
                this.buildingBonuses = {
                    goldBonus: 1.0,
                    foodStorage: 0,
                    foodPreservation: 1.0,
                    eventBonus: 1.0
                };
            }

            // Calcule les bonus des bâtiments
            calculateBuildingBonuses() {
                this.buildingBonuses = {
                    goldBonus: 1.0,
                    foodStorage: 0,
                    foodPreservation: 1.0,
                    eventBonus: 1.0
                };

                this.buildings.forEach(b => {
                    const config = BUILDING_CONFIG[b.type];
                    if (!config) return;

                    if (config.goldBonus) this.buildingBonuses.goldBonus *= config.goldBonus;
                    if (config.foodStorage) this.buildingBonuses.foodStorage += config.foodStorage;
                    if (config.foodPreservation) this.buildingBonuses.foodPreservation *= config.foodPreservation;
                    if (config.eventBonus) this.buildingBonuses.eventBonus *= config.eventBonus;
                });
            }

            // Vérifie si on peut fonder une colonie
            canFoundColony() {
                if (this.colonies.length >= this.maxColonies) return false;
                const cost = BUILDING_CONFIG[BUILDING.COLONY].cost;
                return this.resources.wood >= cost.wood &&
                    this.resources.stone >= cost.stone &&
                    this.resources.food >= cost.food &&
                    this.villagers.filter(v => v.isAlive).length >= 15;
            }

            // Trouve un emplacement pour une nouvelle colonie
            findColonyLocation(gameMap) {
                const validLocations = [];
                const minDist = CONFIG.colonyMinDistance;

                for (let y = 5; y < gameMap.height - 5; y++) {
                    for (let x = 5; x < gameMap.width - 5; x++) {
                        // Doit être sur de l'herbe
                        if (gameMap.terrain[y][x] !== TERRAIN.GRASS) continue;
                        if (gameMap.buildings[y][x].type !== BUILDING.NONE) continue;

                        // Ne doit pas être dans un territoire existant
                        if (gameMap.territory[y][x] >= 0) continue;

                        // Doit être assez loin du château principal
                        const distFromCastle = Math.sqrt(
                            Math.pow(x - this.startX, 2) + Math.pow(y - this.startY, 2)
                        );
                        if (distFromCastle < minDist) continue;

                        // Doit être assez loin des autres colonies
                        const tooCloseToColony = this.colonies.some(c => {
                            const dist = Math.sqrt(Math.pow(x - c.x, 2) + Math.pow(y - c.y, 2));
                            return dist < minDist * 0.7;
                        });
                        if (tooCloseToColony) continue;

                        // Vérifier qu'il y a des ressources à proximité
                        let resourceScore = 0;
                        for (let dy = -5; dy <= 5; dy++) {
                            for (let dx = -5; dx <= 5; dx++) {
                                const nx = x + dx, ny = y + dy;
                                if (nx < 0 || nx >= gameMap.width || ny < 0 || ny >= gameMap.height) continue;
                                const terrain = gameMap.terrain[ny][nx];
                                if (terrain === TERRAIN.FOREST) resourceScore += 2;
                                if (terrain === TERRAIN.STONE) resourceScore += 3;
                                if (terrain === TERRAIN.IRON) resourceScore += 4;
                                if (terrain === TERRAIN.BERRIES) resourceScore += 5;
                                if (terrain === TERRAIN.WATER) resourceScore += 1;
                            }
                        }

                        if (resourceScore > 15) {
                            validLocations.push({ x, y, score: resourceScore });
                        }
                    }
                }

                if (validLocations.length === 0) return null;

                // Choisir le meilleur emplacement
                validLocations.sort((a, b) => b.score - a.score);
                return validLocations[0];
            }

            // Fonde une colonie
            foundColony(gameMap, x, y) {
                const cost = BUILDING_CONFIG[BUILDING.COLONY].cost;

                // Dépenser les ressources
                this.resources.wood -= cost.wood;
                this.resources.stone -= cost.stone;
                this.resources.food -= cost.food;

                // Créer le bâtiment colonie
                gameMap.buildings[y][x] = createBuilding(BUILDING.COLONY, this.id);
                this.buildings.push({ type: BUILDING.COLONY, x, y });

                // Ajouter à la liste des colonies
                this.colonies.push({
                    x, y,
                    foundedTick: CONFIG.currentTick,
                    population: 0
                });

                // Étendre le territoire autour de la colonie
                const radius = BUILDING_CONFIG[BUILDING.COLONY].territoryRadius;
                for (let dy = -radius; dy <= radius; dy++) {
                    for (let dx = -radius; dx <= radius; dx++) {
                        const nx = x + dx, ny = y + dy;
                        if (nx < 0 || nx >= gameMap.width || ny < 0 || ny >= gameMap.height) continue;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist <= radius && gameMap.territory[ny][nx] < 0) {
                            gameMap.territory[ny][nx] = this.id;
                        }
                    }
                }

                // Envoyer quelques villageois à la colonie
                const settlers = this.villagers.filter(v => v.isAlive).slice(0, 3);
                settlers.forEach(v => {
                    v.targetX = x + (Math.random() - 0.5) * 4;
                    v.targetY = y + (Math.random() - 0.5) * 4;
                });

                // Augmenter la population max
                this.maxPopulation += BUILDING_CONFIG[BUILDING.COLONY].popBonus;

                addNotification(
                    `${this.name} fonde une nouvelle colonie!`,
                    'success',
                    '🏕️'
                );

                this.stats.buildingsConstructed++;
            }

            // Construire des infrastructures automatiquement (routes, murs, tours)
            buildInfrastructure(gameMap) {
                this.infrastructureTimer += CONFIG.gameSpeed;
                if (this.infrastructureTimer < 80) return; // Plus fréquent (était 200)
                this.infrastructureTimer = 0;

                const year = Math.floor(CONFIG.currentTick / CONFIG.ticksPerYear);

                // Construire des routes entre les bâtiments importants (plus fréquent)
                if (this.resources.stone > 30 && Math.random() < 0.5) {
                    this.buildRoadNetwork(gameMap);
                }

                // Construire des murs aux frontières - même en temps de paix après 20 ans
                // En guerre: plus agressif, sinon: défense préventive
                const wallChance = this.warState.isAtWar ? 0.6 : (year > 20 ? 0.25 : 0.1);
                if (this.resources.stone > 60 && Math.random() < wallChance) {
                    this.buildDefensiveWalls(gameMap);
                }

                // Construire des tours de défense (plus fréquent et moins cher)
                if (this.resources.stone > 80 && this.resources.iron > 30 && Math.random() < 0.3) {
                    this.buildDefensiveTower(gameMap);
                }
            }

            // Construit un réseau de routes reliant les bâtiments importants au château
            buildRoadNetwork(gameMap) {
                const castle = this.buildings.find(b => b.type === BUILDING.CASTLE);
                if (!castle) return;

                // Trouver les bâtiments importants non connectés par route au château
                const importantBuildings = this.buildings.filter(b =>
                    [BUILDING.FARM, BUILDING.MINE, BUILDING.FORGE, BUILDING.BARRACKS, BUILDING.MARKET, BUILDING.COLONY].includes(b.type)
                );

                if (importantBuildings.length === 0) return;

                // Choisir un bâtiment qui n'a pas de route adjacente menant au château
                const unconnected = importantBuildings.filter(b => {
                    // Vérifier si le bâtiment a une route adjacente
                    const neighbors = [[b.x - 1, b.y], [b.x + 1, b.y], [b.x, b.y - 1], [b.x, b.y + 1]];
                    return !neighbors.some(([nx, ny]) => {
                        if (nx < 0 || nx >= gameMap.width || ny < 0 || ny >= gameMap.height) return false;
                        return gameMap.buildings[ny][nx].type === BUILDING.ROAD;
                    });
                });

                const targetBuilding = unconnected.length > 0 ? unconnected[0] : importantBuildings[Math.floor(Math.random() * importantBuildings.length)];

                // Construire une route en L (horizontal puis vertical) pour rejoindre le château
                this.buildRoadPath(gameMap, targetBuilding.x, targetBuilding.y, castle.x, castle.y);
            }

            // Construit une route en suivant un chemin logique (priorité horizontale puis verticale)
            buildRoadPath(gameMap, x1, y1, x2, y2) {
                let roadsBuilt = 0;
                const maxRoads = 8;
                const roadCost = BUILDING_CONFIG[BUILDING.ROAD].cost.stone;

                // D'abord horizontal
                const dx = x2 > x1 ? 1 : -1;
                let x = x1;
                while (x !== x2 && roadsBuilt < maxRoads) {
                    x += dx;
                    if (this.canBuildRoadAt(gameMap, x, y1) && this.resources.stone >= roadCost) {
                        gameMap.buildings[y1][x] = createBuilding(BUILDING.ROAD, this.id);
                        this.buildings.push({ type: BUILDING.ROAD, x, y: y1 });
                        this.resources.stone -= roadCost;
                        roadsBuilt++;
                    }
                }

                // Puis vertical
                const dy = y2 > y1 ? 1 : -1;
                let y = y1;
                while (y !== y2 && roadsBuilt < maxRoads) {
                    y += dy;
                    if (this.canBuildRoadAt(gameMap, x2, y) && this.resources.stone >= roadCost) {
                        gameMap.buildings[y][x2] = createBuilding(BUILDING.ROAD, this.id);
                        this.buildings.push({ type: BUILDING.ROAD, x: x2, y });
                        this.resources.stone -= roadCost;
                        roadsBuilt++;
                    }
                }
            }

            canBuildRoadAt(gameMap, x, y) {
                if (x < 0 || x >= gameMap.width || y < 0 || y >= gameMap.height) return false;
                if (gameMap.terrain[y][x] !== TERRAIN.GRASS) return false;
                if (gameMap.buildings[y][x].type !== BUILDING.NONE) return false;
                if (gameMap.territory[y][x] !== this.id) return false;
                return true;
            }

            // Construit des murs défensifs aux frontières
            buildDefensiveWalls(gameMap) {
                // Trouver les cases frontières (avec autre faction OU territoire neutre proche d'ennemi)
                const borderCells = [];
                for (let y = 0; y < gameMap.height; y++) {
                    for (let x = 0; x < gameMap.width; x++) {
                        if (gameMap.territory[y][x] !== this.id) continue;
                        if (gameMap.terrain[y][x] !== TERRAIN.GRASS) continue;
                        if (gameMap.buildings[y][x].type !== BUILDING.NONE) continue;

                        // Vérifier si c'est une frontière avec une autre faction ou territoire neutre
                        const neighbors = [[x - 1, y], [x + 1, y], [x, y - 1], [x, y + 1]];
                        const isBorder = neighbors.some(([nx, ny]) => {
                            if (nx < 0 || nx >= gameMap.width || ny < 0 || ny >= gameMap.height) return true;
                            const neighborTerritory = gameMap.territory[ny][nx];
                            // Frontière si: autre faction OU bord de carte
                            return neighborTerritory !== this.id && neighborTerritory >= 0;
                        });

                        if (isBorder) {
                            borderCells.push({ x, y });
                        }
                    }
                }

                // Construire plus de murs (augmenté de 3 à 5)
                let wallsBuilt = 0;
                const maxWalls = this.warState.isAtWar ? 8 : 5;
                for (const cell of borderCells) {
                    if (wallsBuilt >= maxWalls) break;
                    if (this.resources.stone < BUILDING_CONFIG[BUILDING.WALL].cost.stone) break;

                    gameMap.buildings[cell.y][cell.x] = createBuilding(BUILDING.WALL, this.id);
                    this.buildings.push({ type: BUILDING.WALL, x: cell.x, y: cell.y });
                    this.resources.stone -= BUILDING_CONFIG[BUILDING.WALL].cost.stone;
                    wallsBuilt++;
                }
            }

            // Construit une tour de défense
            buildDefensiveTower(gameMap) {
                // Trouver un bon emplacement stratégique
                const castle = this.buildings.find(b => b.type === BUILDING.CASTLE);
                if (!castle) return;

                // Chercher près des frontières ou du château
                for (let radius = 3; radius <= 8; radius++) {
                    for (let angle = 0; angle < Math.PI * 2; angle += Math.PI / 4) {
                        const x = Math.floor(castle.x + Math.cos(angle) * radius);
                        const y = Math.floor(castle.y + Math.sin(angle) * radius);

                        if (x < 0 || x >= gameMap.width || y < 0 || y >= gameMap.height) continue;
                        if (gameMap.territory[y][x] !== this.id) continue;
                        if (gameMap.terrain[y][x] !== TERRAIN.GRASS) continue;
                        if (gameMap.buildings[y][x].type !== BUILDING.NONE) continue;

                        // Vérifier qu'il n'y a pas déjà une tour trop proche
                        const tooClose = this.buildings.some(b => {
                            if (b.type !== BUILDING.TOWER && b.type !== BUILDING.WATCHTOWER) return false;
                            const dist = Math.sqrt(Math.pow(x - b.x, 2) + Math.pow(y - b.y, 2));
                            return dist < 5;
                        });
                        if (tooClose) continue;

                        const cost = BUILDING_CONFIG[BUILDING.TOWER].cost;
                        if (this.resources.stone >= cost.stone && this.resources.iron >= cost.iron) {
                            gameMap.buildings[y][x] = createBuilding(BUILDING.TOWER, this.id);
                            this.buildings.push({ type: BUILDING.TOWER, x, y });
                            this.resources.stone -= cost.stone;
                            this.resources.iron -= cost.iron;
                            this.stats.buildingsConstructed++;
                            return;
                        }
                    }
                }
            }

            // Vérifie périodiquement si on doit fonder une colonie
            checkColonyExpansion(gameMap) {
                this.colonyCheckTimer += CONFIG.gameSpeed;
                if (this.colonyCheckTimer < 1000) return;
                this.colonyCheckTimer = 0;

                if (!this.canFoundColony()) return;

                const location = this.findColonyLocation(gameMap);
                if (location) {
                    this.foundColony(gameMap, location.x, location.y);
                }
            }

            // Vérifie si de la nourriture est disponible sur la carte (baies, animaux, fermes)
            hasFoodAvailableOnMap(gameMap) {
                // Chercher des baies dans le territoire ou à proximité
                for (let y = 0; y < gameMap.height; y++) {
                    for (let x = 0; x < gameMap.width; x++) {
                        // Vérifier si c'est notre territoire ou adjacent
                        const isOurTerritory = gameMap.territory[y][x] === this.id;
                        if (!isOurTerritory) continue;

                        const terrain = gameMap.terrain[y][x];
                        const resource = gameMap.resources[y][x];

                        // Baies disponibles
                        if (terrain === TERRAIN.BERRIES && resource.amount > 0) {
                            return true;
                        }
                    }
                }

                // Vérifier s'il y a des animaux chassables dans le territoire
                if (gameMap.animals && gameMap.animals.length > 0) {
                    for (const animal of gameMap.animals) {
                        if (!animal.isAlive || animal.typeData.aquatic) continue;
                        const ax = Math.floor(animal.x);
                        const ay = Math.floor(animal.y);
                        if (ax >= 0 && ax < gameMap.width && ay >= 0 && ay < gameMap.height) {
                            if (gameMap.territory[ay][ax] === this.id) {
                                return true;
                            }
                        }
                    }
                }

                // Vérifier s'il y a des fermes fonctionnelles
                for (const building of this.buildings) {
                    if (building.type === BUILDING.FARM) {
                        return true;
                    }
                }

                return false;
            }

            update(gameMap, allFactions) {
                // === OBTENIR LES MODIFICATEURS DE SAISON ===
                const seasonMods = getSeasonModifiers();

                // Consommation de nourriture (affectée par saison)
                const aliveVillagers = this.villagers.filter(v => v.isAlive);
                let foodNeeded = aliveVillagers.length * CONFIG.foodPerVillagerPerTick * CONFIG.gameSpeed;

                // En hiver, la consommation augmente légèrement
                if (CONFIG.currentSeason === 3) {
                    foodNeeded *= 1.2;
                }

                // Appliquer le bonus de préservation des greniers
                foodNeeded *= this.buildingBonuses.foodPreservation;

                const hasStoredFood = this.resources.food >= foodNeeded;
                const hasFoodOnMap = this.hasFoodAvailableOnMap(gameMap);
                const hasEnoughFood = hasStoredFood || hasFoodOnMap;

                if (hasStoredFood) {
                    this.resources.food -= foodNeeded;
                } else if (hasFoodOnMap) {
                    this.resources.food = Math.max(0, this.resources.food - foodNeeded * 0.5);
                } else {
                    this.resources.food = 0;
                }

                // Mettre à jour la faim et la mort naturelle
                const famineResistance = this.traits.famineResistance || 1;
                aliveVillagers.forEach(v => {
                    v.updateHunger(hasEnoughFood, famineResistance);
                    v.checkNaturalDeath();
                });

                // Supprimer les villageois morts et mettre à jour les stats
                const deadVillagers = this.villagers.filter(v => !v.isAlive);
                if (deadVillagers.length > 0) {
                    this.stats.totalDeaths += deadVillagers.length;
                    this.villagers = this.villagers.filter(v => v.isAlive);
                }

                // Mettre à jour le pic de population
                if (aliveVillagers.length > this.stats.peakPopulation) {
                    this.stats.peakPopulation = aliveVillagers.length;
                }

                // Mariage et reproduction (affectés par la saison)
                this.processMarriages();
                const foodPerVillager = aliveVillagers.length > 0 ? this.resources.food / aliveVillagers.length : 0;
                const birthChanceMod = seasonMods.birthRate;

                if (foodPerVillager > CONFIG.birthFoodThreshold && this.villagers.length < this.maxPopulation) {
                    if (Math.random() < birthChanceMod) {
                        this.processReproduction(gameMap);
                    }
                }

                // Recherche
                if (this.currentResearch) {
                    this.researchProgress += CONFIG.gameSpeed * this.traits.researchSpeed * 0.5;
                    if (this.researchProgress >= this.currentResearch.duration) {
                        this.completeTech();
                        this.stats.techsResearched++;
                    }
                } else {
                    this.startNewResearch();
                }

                // Extension du territoire (plus fréquente)
                if (aliveVillagers.length > 0 && this.buildings.length > 0 && Math.random() < 0.02 * CONFIG.gameSpeed) {
                    this.expandTerritoryFromBuildings(gameMap);
                }

                // Construction automatique (beaucoup plus fréquente)
                if (Math.random() < 0.03 * CONFIG.gameSpeed * this.traits.buildSpeed) {
                    this.tryBuildSomething(gameMap);
                }

                // Vérifier construction de port
                this.portCheckTimer += CONFIG.gameSpeed;
                if (this.portCheckTimer > 500) {
                    this.portCheckTimer = 0;
                    this.tryBuildPort(gameMap);
                }

                // Mettre à jour les bateaux
                this.boats.forEach(boat => boat.update(gameMap, this));

                // Commerce (bonus des marchés)
                this.handleTrade();

                // Attaque automatique des tours
                this.updateTowers(gameMap, allFactions);

                // Système militaire
                this.processTraining();

                // Système de guerre
                this.processWarState(gameMap, allFactions);

                // === NOUVEAUX SYSTÈMES ===

                // Mise à jour des bonus de bâtiments
                if (CONFIG.currentTick % 100 === 0) {
                    this.calculateBuildingBonuses();
                }

                // Vérifier expansion coloniale
                this.checkColonyExpansion(gameMap);

                // Construire des infrastructures (routes, murs, tours)
                this.buildInfrastructure(gameMap);

                // Mettre à jour la diplomatie
                updateDiplomacy(this, allFactions, gameMap);

                // Compter le territoire
                this.updateTerritoryCount(gameMap);

                // Mettre à jour les villageois
                this.villagers.forEach(v => v.update(gameMap, this, allFactions));
            }

            // Compte les cases de territoire
            updateTerritoryCount(gameMap) {
                let count = 0;
                for (let y = 0; y < gameMap.height; y++) {
                    for (let x = 0; x < gameMap.width; x++) {
                        if (gameMap.territory[y][x] === this.id) count++;
                    }
                }
                this.territorySize = count;
            }

            // Gestion des attaques automatiques des tours
            updateTowers(gameMap, allFactions) {
                const towerRange = 6;
                const towerDamage = 8;

                this.buildings.forEach(building => {
                    if (building.type !== BUILDING.TOWER && building.type !== BUILDING.WATCHTOWER) return;

                    // Chercher les ennemis à portée
                    allFactions.forEach(enemyFaction => {
                        if (enemyFaction.id === this.id) return;

                        enemyFaction.villagers.forEach(enemy => {
                            if (!enemy.isAlive) return;

                            const dx = enemy.x - building.x;
                            const dy = enemy.y - building.y;
                            const dist = Math.sqrt(dx * dx + dy * dy);

                            if (dist <= towerRange) {
                                // La tour attaque! (moins souvent pour équilibrer)
                                if (Math.random() < 0.02 * CONFIG.gameSpeed) {
