        `;

                document.body.appendChild(victoryDiv);
            }

            checkCriticalPopulation() {
                // Alertes désactivées - le jeu continue de tourner sans interruption
                return;
            }

            draw() {
                this.ctx.fillStyle = '#1a1410';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

                const cs = this.cellSize;

                for (let y = 0; y < CONFIG.mapHeight; y++) {
                    for (let x = 0; x < CONFIG.mapWidth; x++) {
                        const px = this.offsetX + x * cs;
                        const py = this.offsetY + y * cs;
                        const terrain = this.gameMap.terrain[y][x];
                        const elev = this.gameMap.elevation[y][x];
                        const territory = this.gameMap.territory[y][x];
                        const building = this.gameMap.buildings[y][x];

                        // Couleur de base selon terrain et élévation
                        let baseColor = this.getTerrainColor(terrain, elev);

                        if (territory >= 0) {
                            const faction = this.factions[territory];
                            this.ctx.fillStyle = this.blendColors(baseColor, faction.darkColor, 0.35);
                        } else {
                            this.ctx.fillStyle = baseColor;
                        }

                        this.ctx.fillRect(px, py, cs + 0.5, cs + 0.5);

                        // Dessiner les éléments visuels
                        if (terrain === TERRAIN.FOREST && building.type === BUILDING.NONE) {
                            this.drawTree(px, py, cs);
                        } else if (terrain === TERRAIN.STONE && building.type === BUILDING.NONE) {
                            this.drawStone(px, py, cs);
                        } else if (terrain === TERRAIN.IRON && building.type === BUILDING.NONE) {
                            this.drawIron(px, py, cs);
                        } else if (terrain === TERRAIN.GOLD && building.type === BUILDING.NONE) {
                            this.drawGold(px, py, cs);
                        } else if (terrain === TERRAIN.BERRIES && building.type === BUILDING.NONE) {
                            this.drawBerries(px, py, cs);
                        } else if (terrain === TERRAIN.WATER) {
                            this.drawWater(px, py, cs, elev);
                        } else if (terrain === TERRAIN.MOUNTAIN) {
                            this.drawMountain(px, py, cs, elev);
                        }

                        if (building.type !== BUILDING.NONE) {
                            this.drawBuilding(px, py, cs, building);
                        }
                    }
                }

                this.drawTerritoryBorders();
                this.drawAnimals();
                this.drawVillagers();
                this.drawBoats();
            }

            drawBoats() {
                this.factions.forEach(faction => {
                    faction.boats.forEach(boat => {
                        this.drawBoat(boat, faction);
                    });
                });
            }

            getTerrainColor(terrain, elev) {
                switch (terrain) {
                    case TERRAIN.GRASS: return '#3d5c3a';
                    case TERRAIN.FOREST: return '#2d4a2a';
                    case TERRAIN.STONE: return '#6b6b6b';
                    case TERRAIN.IRON: return '#8b6914';
                    case TERRAIN.GOLD: return '#b8860b';
                    case TERRAIN.BERRIES: return '#4a6b4a'; // Vert avec teinte de baies
                    case TERRAIN.WATER:
                        if (elev === ELEVATION.SHALLOW) return '#5a9fc8';  // Peu profond
                        if (elev === ELEVATION.MEDIUM) return '#3a7fa8';   // Profond
                        return '#1a5f88';  // Très profond
                    case TERRAIN.MOUNTAIN:
                        if (elev === 1) return '#7a7a7a';  // Normal
                        if (elev === 2) return '#5a5a5a';  // Haut
                        return '#3a3a3a';  // Très haut
                    default: return '#3d5c3a';
                }
            }

            blendColors(color1, color2, ratio) {
                const hex = (c) => parseInt(c.slice(1), 16);
                const r1 = (hex(color1) >> 16) & 255, g1 = (hex(color1) >> 8) & 255, b1 = hex(color1) & 255;
                const r2 = (hex(color2) >> 16) & 255, g2 = (hex(color2) >> 8) & 255, b2 = hex(color2) & 255;
                return `rgb(${Math.round(r1 * (1 - ratio) + r2 * ratio)}, ${Math.round(g1 * (1 - ratio) + g2 * ratio)}, ${Math.round(b1 * (1 - ratio) + b2 * ratio)})`;
            }

            drawTree(x, y, size) {
                const cx = x + size / 2, cy = y + size / 2, s = size * 0.4;
                this.ctx.fillStyle = '#5c4033';
                this.ctx.fillRect(cx - s * 0.15, cy, s * 0.3, s * 0.5);
                this.ctx.fillStyle = '#228b22';
                this.ctx.beginPath();
                this.ctx.arc(cx, cy - s * 0.1, s * 0.4, 0, Math.PI * 2);
                this.ctx.fill();
            }

            drawStone(x, y, size) {
                const cx = x + size / 2, cy = y + size / 2, s = size * 0.35;
                this.ctx.fillStyle = '#888';
                this.ctx.beginPath();
                this.ctx.ellipse(cx, cy + s * 0.2, s, s * 0.6, 0, 0, Math.PI * 2);
                this.ctx.fill();
            }

            drawIron(x, y, size) {
                const cx = x + size / 2, cy = y + size / 2, s = size * 0.3;
                this.ctx.fillStyle = '#8b4513';
                this.ctx.beginPath();
                this.ctx.arc(cx, cy, s, 0, Math.PI * 2);
                this.ctx.fill();
                this.ctx.fillStyle = '#cd853f';
                this.ctx.beginPath();
                this.ctx.arc(cx - s * 0.3, cy - s * 0.3, s * 0.3, 0, Math.PI * 2);
                this.ctx.fill();
            }

            drawGold(x, y, size) {
                const cx = x + size / 2, cy = y + size / 2, s = size * 0.3;
                this.ctx.fillStyle = '#ffd700';
                this.ctx.beginPath();
                this.ctx.arc(cx, cy, s, 0, Math.PI * 2);
                this.ctx.fill();
                this.ctx.fillStyle = '#ffec8b';
                this.ctx.beginPath();
                this.ctx.arc(cx - s * 0.2, cy - s * 0.2, s * 0.25, 0, Math.PI * 2);
                this.ctx.fill();
            }

            drawBerries(x, y, size) {
                const cx = x + size / 2, cy = y + size / 2, s = size * 0.35;
                // Buisson vert
                this.ctx.fillStyle = '#2e8b2e';
                this.ctx.beginPath();
                this.ctx.arc(cx, cy, s, 0, Math.PI * 2);
                this.ctx.fill();
                // Baies rouges
                this.ctx.fillStyle = '#dc143c';
                const berrySize = s * 0.25;
                this.ctx.beginPath();
                this.ctx.arc(cx - s * 0.3, cy - s * 0.2, berrySize, 0, Math.PI * 2);
                this.ctx.fill();
                this.ctx.beginPath();
                this.ctx.arc(cx + s * 0.3, cy, berrySize, 0, Math.PI * 2);
                this.ctx.fill();
                this.ctx.beginPath();
                this.ctx.arc(cx, cy + s * 0.3, berrySize, 0, Math.PI * 2);
                this.ctx.fill();
            }

            drawAnimals() {
                if (!this.gameMap.animals) return;
                const cs = this.cellSize;

                this.gameMap.animals.forEach(animal => {
                    if (!animal.isAlive) return;
                    const px = this.offsetX + animal.x * cs;
                    const py = this.offsetY + animal.y * cs;

                    // Ombre de l'animal
                    this.ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
                    this.ctx.beginPath();
                    this.ctx.ellipse(px, py + cs * 0.15, cs * 0.25, cs * 0.1, 0, 0, Math.PI * 2);
                    this.ctx.fill();

                    // Dessiner l'icône de l'animal avec ombre
                    this.ctx.font = `${cs * 0.7}px sans-serif`;
                    this.ctx.textAlign = 'center';
                    this.ctx.textBaseline = 'middle';

                    // Ombre du texte
                    this.ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
                    this.ctx.fillText(animal.typeData.icon, px + 1, py + 1);

                    // Icône principale
                    this.ctx.fillText(animal.typeData.icon, px, py);

                    // Barre de vie si blessé
                    if (animal.health < 100) {
                        const healthPct = animal.health / 100;
                        const barWidth = cs * 0.6;
                        const barHeight = 2;
                        const barX = px - barWidth / 2;
                        const barY = py - cs * 0.35;

                        // Fond
                        this.ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                        this.ctx.fillRect(barX, barY, barWidth, barHeight);

                        // Barre de vie
                        this.ctx.fillStyle = healthPct > 0.5 ? '#4ade80' : '#ef4444';
                        this.ctx.fillRect(barX, barY, barWidth * healthPct, barHeight);
                    }
                });
            }

            drawWater(x, y, size, level) {
                // Effet de vagues selon la profondeur
                const alpha = 0.3 + (level - 1) * 0.15;
                this.ctx.fillStyle = `rgba(255, 255, 255, ${alpha * 0.3})`;

                const waveOffset = (CONFIG.currentTick * 0.02) % size;
                for (let i = 0; i < 3; i++) {
                    const wy = y + (i * size / 3 + waveOffset) % size;
                    this.ctx.fillRect(x, wy, size, 1);
                }

                // Indicateur de profondeur
                if (level >= 2) {
                    this.ctx.fillStyle = 'rgba(0, 0, 50, 0.3)';
                    this.ctx.fillRect(x + 2, y + 2, size - 4, size - 4);
                }
            }

            drawMountain(x, y, size, level) {
                const cx = x + size / 2;
                const baseHeight = 0.3 + (level - 1) * 0.2;

                // Pic de montagne
                this.ctx.fillStyle = level === 3 ? '#ffffff' : (level === 2 ? '#9a9a9a' : '#7a7a7a');
                this.ctx.beginPath();
                this.ctx.moveTo(x + size * 0.1, y + size * 0.9);
                this.ctx.lineTo(cx, y + size * (0.9 - baseHeight));
                this.ctx.lineTo(x + size * 0.9, y + size * 0.9);
                this.ctx.fill();

                // Neige au sommet pour les hautes montagnes
                if (level >= 2) {
                    this.ctx.fillStyle = '#ffffff';
                    this.ctx.beginPath();
                    this.ctx.moveTo(cx - size * 0.15, y + size * (0.9 - baseHeight + 0.1));
                    this.ctx.lineTo(cx, y + size * (0.9 - baseHeight));
                    this.ctx.lineTo(cx + size * 0.15, y + size * (0.9 - baseHeight + 0.1));
                    this.ctx.fill();
                }
            }

            drawBuilding(x, y, size, building) {
                const config = BUILDING_CONFIG[building.type];
                if (!config || !config.icon) return;

                const cx = x + size / 2;
                const cy = y + size / 2;

                // Déterminer l'icône à utiliser
                let icon = config.icon;

                // Mur dynamique selon la tech maçonnerie
                if (building.type === BUILDING.WALL) {
                    const faction = building.faction >= 0 ? this.factions[building.faction] : null;
                    if (faction && faction.traits && faction.traits.masonryUnlocked) {
                        icon = '🧱'; // Mur de pierre
                    } else {
                        icon = '🪵'; // Palissade en bois
                    }
                }

                // Fond semi-transparent pour mieux voir le bâtiment
                const faction = building.faction >= 0 ? this.factions[building.faction] : null;
                if (faction && building.type !== BUILDING.ROAD) {
                    this.ctx.fillStyle = `rgba(0, 0, 0, 0.25)`;
                    this.ctx.beginPath();
                    this.ctx.roundRect(x + 1, y + 1, size - 2, size - 2, 3);
                    this.ctx.fill();

                    // Bordure de faction
                    this.ctx.strokeStyle = faction.color;
                    this.ctx.lineWidth = 1;
                    this.ctx.beginPath();
                    this.ctx.roundRect(x + 1, y + 1, size - 2, size - 2, 3);
                    this.ctx.stroke();
                }

                // Ombre du texte
                this.ctx.font = `${size * 0.7}px sans-serif`;
                this.ctx.textAlign = 'center';
                this.ctx.textBaseline = 'middle';

                // Ombre
                this.ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                this.ctx.fillText(icon, cx + 1, cy + 1);

                // Icône principale
                this.ctx.fillStyle = '#fff';
                this.ctx.fillText(icon, cx, cy);

                // Indicateur de santé si endommagé
                const maxHealth = config.health || 100;
                const currentHealth = building.health !== undefined ? building.health : maxHealth;
                if (currentHealth < maxHealth) {
                    const healthPct = currentHealth / maxHealth;
                    const barWidth = size - 4;
                    const barHeight = 2;

                    // Fond de la barre
                    this.ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                    this.ctx.fillRect(x + 2, y + size - 4, barWidth, barHeight);

                    // Barre de vie
                    this.ctx.fillStyle = healthPct > 0.5 ? '#4ade80' : healthPct > 0.25 ? '#fbbf24' : '#ef4444';
                    this.ctx.fillRect(x + 2, y + size - 4, barWidth * healthPct, barHeight);
                }
            }

            drawBoat(boat, faction) {
                const px = this.offsetX + boat.x * this.cellSize;
                const py = this.offsetY + boat.y * this.cellSize;
                const size = this.cellSize;

                // Coque du bateau
                this.ctx.fillStyle = '#8b4513';
                this.ctx.beginPath();
                this.ctx.moveTo(px - size * 0.3, py);
                this.ctx.lineTo(px - size * 0.4, py + size * 0.2);
                this.ctx.lineTo(px + size * 0.4, py + size * 0.2);
                this.ctx.lineTo(px + size * 0.3, py);
                this.ctx.closePath();
                this.ctx.fill();

                // Voile
                this.ctx.fillStyle = faction.lightColor;
                this.ctx.beginPath();
                this.ctx.moveTo(px, py + size * 0.1);
                this.ctx.lineTo(px, py - size * 0.4);
                this.ctx.lineTo(px + size * 0.25, py);
                this.ctx.closePath();
                this.ctx.fill();

                // Mât
                this.ctx.strokeStyle = '#5c3317';
                this.ctx.lineWidth = 2;
                this.ctx.beginPath();
                this.ctx.moveTo(px, py + size * 0.15);
                this.ctx.lineTo(px, py - size * 0.4);
                this.ctx.stroke();

                // Indicateur de poisson collecté
                if (boat.fishCollected > 0) {
                    this.ctx.fillStyle = 'rgba(0, 150, 255, 0.7)';
                    const fishRatio = boat.fishCollected / boat.capacity;
                    this.ctx.fillRect(px - size * 0.2, py + size * 0.25, size * 0.4 * fishRatio, size * 0.1);
                }
            }

            drawTerritoryBorders() {
                this.ctx.lineWidth = 2;
                for (let y = 0; y < CONFIG.mapHeight; y++) {
                    for (let x = 0; x < CONFIG.mapWidth; x++) {
                        const territory = this.gameMap.territory[y][x];
                        if (territory < 0) continue;

                        const faction = this.factions[territory];
                        const px = this.offsetX + x * this.cellSize;
                        const py = this.offsetY + y * this.cellSize;

                        [{ dx: 0, dy: -1, side: 'top' }, { dx: 0, dy: 1, side: 'bottom' }, { dx: -1, dy: 0, side: 'left' }, { dx: 1, dy: 0, side: 'right' }].forEach(n => {
                            const nx = x + n.dx, ny = y + n.dy;
                            let drawBorder = nx < 0 || nx >= CONFIG.mapWidth || ny < 0 || ny >= CONFIG.mapHeight || this.gameMap.territory[ny][nx] !== territory;

                            if (drawBorder) {
                                this.ctx.strokeStyle = faction.lightColor;
                                this.ctx.beginPath();
                                if (n.side === 'top') { this.ctx.moveTo(px, py); this.ctx.lineTo(px + this.cellSize, py); }
                                else if (n.side === 'bottom') { this.ctx.moveTo(px, py + this.cellSize); this.ctx.lineTo(px + this.cellSize, py + this.cellSize); }
                                else if (n.side === 'left') { this.ctx.moveTo(px, py); this.ctx.lineTo(px, py + this.cellSize); }
                                else { this.ctx.moveTo(px + this.cellSize, py); this.ctx.lineTo(px + this.cellSize, py + this.cellSize); }
                                this.ctx.stroke();
                            }
                        });
                    }
                }
            }

            drawVillagers() {
                // Debug: compter les villageois
                let totalAlive = 0;
                this.factions.forEach(faction => {
                    faction.villagers.forEach(villager => {
                        if (villager.isAlive) totalAlive++;
                    });
                });
                // Afficher le debug dans le coin
                this.ctx.fillStyle = 'white';
                this.ctx.font = '12px Arial';
                this.ctx.fillText(`Villageois vivants: ${totalAlive}`, 10, 20);

                this.factions.forEach(faction => {
                    faction.villagers.forEach(villager => {
                        if (!villager.isAlive) return;

                        const px = this.offsetX + villager.x * this.cellSize;
                        const py = this.offsetY + villager.y * this.cellSize;
                        const radius = this.cellSize * 0.3;

                        // Cercle de sélection
                        if (this.selectedVillager === villager) {
                            this.ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                            this.ctx.beginPath();
                            this.ctx.arc(px, py, radius * 1.8, 0, Math.PI * 2);
                            this.ctx.fill();
                        }

                        // Couleur selon état
                        let color = faction.lightColor;
                        if (villager.currentTask === 'combat') {
                            color = '#ff4444'; // Rouge en combat
                        } else if (villager.hunger > 50) {
                            color = '#ffaa00'; // Orange si faim
                        } else if (villager.unitType !== UNIT_TYPE.VILLAGER) {
                            color = '#4488ff'; // Bleu si soldat
                        }

                        this.ctx.fillStyle = color;
                        this.ctx.beginPath();
                        this.ctx.arc(px, py, radius, 0, Math.PI * 2);
                        this.ctx.fill();

                        this.ctx.strokeStyle = faction.darkColor;
                        this.ctx.lineWidth = 1;
                        this.ctx.stroke();

                        // Barre de vie si pas pleine
                        const healthPct = villager.combatStats.health / villager.combatStats.maxHealth;
                        if (healthPct < 1) {
                            const barWidth = this.cellSize * 0.8;
                            const barHeight = 3;
                            const barX = px - barWidth / 2;
                            const barY = py - radius - 5;

                            // Fond rouge
                            this.ctx.fillStyle = '#660000';
                            this.ctx.fillRect(barX, barY, barWidth, barHeight);

                            // Santé verte
                            this.ctx.fillStyle = healthPct > 0.5 ? '#00ff00' : (healthPct > 0.25 ? '#ffff00' : '#ff0000');
                            this.ctx.fillRect(barX, barY, barWidth * healthPct, barHeight);
                        }
                    });
                });
            }

            updateUI() {
                const year = Math.floor(CONFIG.currentTick / CONFIG.ticksPerYear) + 1;
                const monthName = CONFIG.monthNames[CONFIG.currentMonth];
                const dateDisplay = document.getElementById('dateDisplay');
                if (dateDisplay) {
                    dateDisplay.textContent = `${monthName}, An ${year}`;
                }

                // Génère le HTML pour une faction
                const generateFactionHTML = (faction) => {
                    const aliveVillagers = faction.villagers.filter(v => v.isAlive);
                    const males = aliveVillagers.filter(v => v.gender === 'male').length;
                    const females = aliveVillagers.filter(v => v.gender === 'female').length;
                    const factionClass = faction.id === 0 ? 'human' : 'elf';

                    // Calcul de la situation alimentaire
                    const foodPerVillager = aliveVillagers.length > 0 ? faction.resources.food / aliveVillagers.length : 999;
                    const yearsOfFood = Math.floor(foodPerVillager / (CONFIG.foodPerVillagerPerTick * CONFIG.ticksPerYear));

                    // Alertes
                    let alertHTML = '';
                    if (faction.resources.food < 50 && aliveVillagers.length > 0) {
                        alertHTML = `<div style="background: #ff4444; color: white; padding: 6px; border-radius: 4px; margin-bottom: 8px; text-align: center; font-weight: bold;">⚠️ FAMINE IMMINENTE!</div>`;
                    } else if (yearsOfFood < 3 && aliveVillagers.length > 0) {
                        alertHTML = `<div style="background: #ffaa00; color: black; padding: 6px; border-radius: 4px; margin-bottom: 8px; text-align: center;">⚠️ Nourriture basse (~${yearsOfFood} ans)</div>`;
                    }

                    // Statut de guerre
                    let warHTML = '';
                    if (faction.warState && faction.warState.isAtWar) {
                        warHTML = `<div style="background: #cc0000; color: white; padding: 6px; border-radius: 4px; margin-top: 6px; text-align: center;">⚔️ EN GUERRE!</div>`;
                    }

                    // Traités actifs
                    let diplomacyHTML = '';
                    if (faction.diplomacy && faction.diplomacy.treaties.length > 0) {
                        const treatyIcons = faction.diplomacy.treaties.map(t => TREATIES[t.type]?.icon || '📜').join(' ');
                        diplomacyHTML = `<div style="font-size: 10px; margin-top: 4px; opacity: 0.8;">Traités: ${treatyIcons}</div>`;
                    }

                    // Colonies
                    let coloniesHTML = '';
                    if (faction.colonies && faction.colonies.length > 0) {
                        coloniesHTML = `<div class="territory-info" style="margin-top: 6px">🏕️ Colonies: ${faction.colonies.length}/${faction.maxColonies}</div>`;
                    }

                    // Compteurs de bâtiments
                    const buildingCounts = {};
                    faction.buildings.forEach(b => {
                        buildingCounts[b.type] = (buildingCounts[b.type] || 0) + 1;
                    });

                    // Liste des bâtiments à afficher avec icônes
                    const buildingTypes = [
                        { type: BUILDING.CASTLE, icon: '🏰' },
                        { type: BUILDING.HOUSE, icon: '🏠' },
                        { type: BUILDING.FARM, icon: '🌾' },
                        { type: BUILDING.FORGE, icon: '🔥' },
                        { type: BUILDING.SAWMILL, icon: '🪚' },
                        { type: BUILDING.MINE, icon: '⛏️' },
                        { type: BUILDING.BARRACKS, icon: '⚔️' },
                        { type: BUILDING.PORT, icon: '⚓' },
                        { type: BUILDING.MARKET, icon: '🪙' },
                        { type: BUILDING.TEMPLE, icon: '⛪' },
                        { type: BUILDING.GRANARY, icon: '📦' },
                        { type: BUILDING.WATCHTOWER, icon: '🗼' },
                        { type: BUILDING.ARCHERY_RANGE, icon: '🎯' },
                        { type: BUILDING.TOWER, icon: '🏛️' },
                        { type: BUILDING.WALL, icon: faction.traits && faction.traits.masonryUnlocked ? '🧱' : '🪵' },
                        { type: BUILDING.ROAD, icon: '🟫' },
                        { type: BUILDING.COLONY, icon: '🏕️' }
                    ];

                    const buildingsHTML = buildingTypes
                        .filter(b => buildingCounts[b.type] > 0)
                        .map(b => `<span title="${BUILDING_CONFIG[b.type]?.name || ''}">${b.icon}${buildingCounts[b.type]}</span>`)
                        .join(' ');

                    return `
                ${alertHTML}
                <div class="population-counter">
                    <div class="pop-number">${aliveVillagers.length}</div>
                    <div class="pop-label">Villageois</div>
                    <div class="pop-ratio">
                        <span>👨 ${males}</span>
                        <span>👩 ${females}</span>
                    </div>
                    <div class="pop-max">Max: ${faction.maxPopulation}</div>
                    <div class="population-bar" style="margin-top: 8px">
                        <div class="population-fill ${factionClass}" style="width: ${Math.min(100, (aliveVillagers.length / faction.maxPopulation) * 100)}%"></div>
                    </div>
                </div>
                <div class="faction-card ${factionClass}">
                    <div class="territory-info" style="margin-bottom: 8px">🏰 Territoire: ${faction.territorySize} cases</div>
                    <div class="resource-grid">
                        <div class="resource-item"><span>🪵 Bois</span><span>${Math.floor(faction.resources.wood)}</span></div>
                        <div class="resource-item"><span>🪨 Pierre</span><span>${Math.floor(faction.resources.stone)}</span></div>
                        <div class="resource-item"><span>⛏️ Fer</span><span>${Math.floor(faction.resources.iron)}</span></div>
                        <div class="resource-item"><span>🌾 Nourriture</span><span>${Math.floor(faction.resources.food)}</span></div>
                        <div class="resource-item"><span>💰 Or</span><span>${Math.floor(faction.resources.gold)}</span></div>
                        <div class="resource-item"><span>🐟 Poisson</span><span>${Math.floor(faction.resources.fish || 0)}</span></div>
                    </div>
                    <div class="buildings-info" style="margin-top: 8px; padding: 6px; background: rgba(0,0,0,0.2); border-radius: 4px;">
                        <div style="font-size: 10px; opacity: 0.7; margin-bottom: 4px;">🏗️ Bâtiments</div>
                        <div style="font-size: 12px; display: flex; flex-wrap: wrap; gap: 6px;">${buildingsHTML || '<span style="opacity:0.5">Aucun</span>'}</div>
                    </div>
                    ${coloniesHTML}
                    ${faction.boats.length > 0 ? `<div class="territory-info" style="margin-top: 6px">⛵ Bateaux: ${faction.boats.length}</div>` : ''}
                    ${faction.currentResearch ? `<div class="territory-info" style="margin-top: 6px">🔬 Recherche: ${faction.currentResearch.name} (${Math.round(faction.researchProgress / faction.currentResearch.duration * 100)}%)</div>` : ''}
                    ${warHTML}
                    ${diplomacyHTML}
                </div>
            `;
                };

                // Génère le HTML des technologies pour une faction
                const generateTechHTML = (faction) => {
                    let html = '';
                    Object.entries(TECH_TREE).forEach(([catId, category]) => {
                        html += `<div class="tech-category"><div class="tech-category-title">${category.icon} ${category.name}</div>
                    ${category.techs.map(tech => {
                            const done = faction.completedTechs.includes(tech.id);
                            const researching = faction.currentResearch?.id === tech.id;
                            const status = done ? 'completed' : researching ? 'researching' : 'locked';
                            const statusText = done ? '✓' : researching ? `${Math.round(faction.researchProgress / tech.duration * 100)}%` : '';
                            return `<div class="tech-node">
                            <div class="tech-icon">${tech.icon}</div>
                            <div class="tech-info">
                                <div class="tech-name">${tech.name}</div>
                            </div>
                            <div class="tech-dot ${status}" style="border-color: ${faction.color}; width: 24px; height: 16px; border-radius: 4px; font-size: 9px; display: flex; align-items: center; justify-content: center;">${statusText}</div>
                        </div>`;
                        }).join('')}</div>`;
                    });
                    return html;
                };

                // Humains (faction 0) - panneau gauche
                const humanFaction = this.factions[0];
                const humanContainer = document.getElementById('humanFactionContainer');
                if (humanContainer) humanContainer.innerHTML = generateFactionHTML(humanFaction);
                const humanTechContainer = document.getElementById('humanTechContainer');
                if (humanTechContainer) humanTechContainer.innerHTML = generateTechHTML(humanFaction);

                // Elfes (faction 1) - panneau droit
                const elfFaction = this.factions[1];
                const elfContainer = document.getElementById('elfFactionContainer');
                if (elfContainer) elfContainer.innerHTML = generateFactionHTML(elfFaction);
                const elfTechContainer = document.getElementById('elfTechContainer');
                if (elfTechContainer) elfTechContainer.innerHTML = generateTechHTML(elfFaction);
            }

            gameLoop() {
                this.update();
                this.draw();
                // Mettre à jour l'UI toutes les 5 frames pour une mise à jour fluide
                this.frameCount = (this.frameCount || 0) + 1;
                if (this.frameCount % 5 === 0) this.updateUI();
                requestAnimationFrame(() => this.gameLoop());
            }
        }

        let game;
        window.addEventListener('load', () => { game = new Game(); });

    </script>
</body>

</html>
