<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eryndor : L'Aube des Royaumes</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Spectral:wght@300;400;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #1a1410;
            --bg-panel: #2d2419;
            --border-gold: #d4af37;
            --text-light: #f5e6d3;
            --text-gold: #ffd700;
            --human-color: #c9a227;
            --human-light: #e6c84a;
            --elf-color: #2d8a4e;
            --elf-light: #4ade80;
        }

        body {
            font-family: 'Spectral', serif;
            background: linear-gradient(135deg, var(--bg-dark) 0%, #0f0c09 100%);
            color: var(--text-light);
            overflow-x: hidden;
            min-height: 100vh;
        }

        #gameContainer {
            display: grid;
            grid-template-columns: 260px 1fr 280px;
            grid-template-rows: 60px 1fr;
            height: calc(100vh - 120px);
            gap: 8px;
            padding: 8px;
        }

        #header {
            grid-column: 1 / -1;
            background: var(--bg-panel);
            border: 2px solid var(--border-gold);
            border-radius: 8px;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(212, 175, 55, 0.3);
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 20px;
            color: var(--text-gold);
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            letter-spacing: 2px;
        }

        #timeControls {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .control-btn {
            background: linear-gradient(135deg, #3a2f1f 0%, #2d2419 100%);
            border: 2px solid var(--border-gold);
            color: var(--text-gold);
            padding: 5px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Cinzel', serif;
            font-size: 12px;
            transition: all 0.3s ease;
        }

        .control-btn:hover {
            background: linear-gradient(135deg, #4a3f2f 0%, #3d3429 100%);
            transform: translateY(-2px);
        }

        .control-btn.active {
            background: linear-gradient(135deg, var(--border-gold) 0%, #b8941f 100%);
            color: var(--bg-dark);
            font-weight: bold;
        }

        #leftPanel,
        #rightPanel {
            background: var(--bg-panel);
            border: 2px solid var(--border-gold);
            border-radius: 8px;
            padding: 12px;
            overflow-y: auto;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
        }

        #canvasContainer {
            position: relative;
            background: var(--bg-panel);
            border: 2px solid var(--border-gold);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
            cursor: pointer;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .panel-title {
            font-family: 'Cinzel', serif;
            font-size: 14px;
            color: var(--text-gold);
            margin-bottom: 10px;
            padding-bottom: 6px;
            border-bottom: 2px solid var(--border-gold);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .faction-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0.02) 100%);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 6px;
            padding: 10px;
            margin-bottom: 8px;
        }

        .faction-card.human {
            border-left: 4px solid var(--human-color);
        }

        .faction-card.elf {
            border-left: 4px solid var(--elf-color);
        }

        .faction-name {
            font-family: 'Cinzel', serif;
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 6px;
        }

        .faction-name.human {
            color: var(--human-light);
        }

        .faction-name.elf {
            color: var(--elf-light);
        }

        .resource-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px;
            margin-top: 6px;
        }

        .resource-item {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            padding: 3px 5px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 3px;
        }

        .population-bar {
            height: 6px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 3px;
            overflow: hidden;
            margin-top: 6px;
        }

        .population-fill {
            height: 100%;
            transition: width 0.5s ease;
        }

        .population-fill.human {
            background: linear-gradient(90deg, var(--human-color), var(--human-light));
        }

        .population-fill.elf {
            background: linear-gradient(90deg, var(--elf-color), var(--elf-light));
        }

        .tech-category {
            margin-bottom: 12px;
        }

        .tech-category-title {
            font-size: 12px;
            color: var(--text-gold);
            margin-bottom: 6px;
            opacity: 0.9;
        }

        .tech-node {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px;
            margin: 3px 0;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 4px;
            font-size: 10px;
        }

        .tech-icon {
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 3px;
        }

        .tech-info {
            flex: 1;
        }

        .tech-name {
            font-weight: 600;
            color: var(--text-light);
        }

        .tech-status {
            display: flex;
            gap: 3px;
            margin-top: 3px;
        }

        .tech-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .tech-dot.completed {
            background: #22c55e;
            border-color: #22c55e;
        }

        .tech-dot.researching {
            background: #f59e0b;
            border-color: #f59e0b;
            animation: pulse 1s infinite;
        }

        .tech-dot.locked {
            background: transparent;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        .date-display {
            font-family: 'Cinzel', serif;
            font-size: 14px;
            color: var(--text-gold);
            padding: 5px 15px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 6px;
            border: 1px solid var(--border-gold);
            min-width: 140px;
            text-align: center;
        }

        ::-webkit-scrollbar {
            width: 5px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.3);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-gold);
            border-radius: 3px;
        }

        .territory-info {
            font-size: 10px;
            opacity: 0.8;
            margin-top: 3px;
        }

        /* === FICHE VILLAGEOIS === */
        #villagerModal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, var(--bg-panel) 0%, #1a1410 100%);
            border: 3px solid var(--border-gold);
            border-radius: 12px;
            padding: 20px;
            z-index: 1000;
            min-width: 320px;
            max-width: 400px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8), 0 0 30px rgba(212, 175, 55, 0.3);
        }

        #villagerModal.show {
            display: block;
        }

        #modalOverlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 999;
        }

        #modalOverlay.show {
            display: block;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--border-gold);
        }

        .modal-title {
            font-family: 'Cinzel', serif;
            font-size: 18px;
            color: var(--text-gold);
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-light);
            font-size: 24px;
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.3s;
        }

        .modal-close:hover {
            opacity: 1;
        }

        .villager-portrait {
            text-align: center;
            margin-bottom: 15px;
        }

        .villager-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin: 0 auto 10px;
            border: 3px solid var(--border-gold);
        }

        .villager-avatar.human {
            background: linear-gradient(135deg, var(--human-color), var(--human-light));
        }

        .villager-avatar.elf {
            background: linear-gradient(135deg, var(--elf-color), var(--elf-light));
        }

        .villager-fullname {
            font-family: 'Cinzel', serif;
            font-size: 16px;
            color: var(--text-gold);
        }

        .villager-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 15px;
        }

        .info-box {
            background: rgba(0, 0, 0, 0.3);
            padding: 8px;
            border-radius: 6px;
            text-align: center;
        }

        .info-label {
            font-size: 10px;
            opacity: 0.7;
            margin-bottom: 3px;
        }

        .info-value {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-gold);
        }

        .skills-section,
        .family-section {
            margin-top: 12px;
        }

        .section-title {
            font-size: 12px;
            color: var(--text-gold);
            margin-bottom: 8px;
            opacity: 0.9;
        }

        .skill-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 5px 0;
            font-size: 11px;
        }

        .skill-name {
            width: 80px;
        }

        .skill-progress {
            flex: 1;
            height: 8px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 4px;
            overflow: hidden;
        }

        .skill-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--border-gold), var(--text-gold));
            transition: width 0.3s;
        }

        .skill-value {
            width: 30px;
            text-align: right;
            color: var(--text-gold);
        }

        .family-member {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 4px;
            margin: 4px 0;
            font-size: 11px;
        }

        .family-relation {
            color: var(--text-gold);
            width: 60px;
        }

        /* === BARRE D'OUTILS TERRAFORMING === */
        #toolbar {
            background: var(--bg-panel);
            border: 2px solid var(--border-gold);
            border-radius: 8px;
            padding: 12px 20px;
            margin: 8px;
            box-shadow: 0 4px 20px rgba(212, 175, 55, 0.3);
        }

        .toolbar-content {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .toolbar-section {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toolbar-label {
            font-family: 'Cinzel', serif;
            font-size: 12px;
            color: var(--text-gold);
            margin-right: 4px;
        }

        .tool-btn {
            width: 44px;
            height: 44px;
            border: 2px solid rgba(212, 175, 55, 0.4);
            border-radius: 8px;
            background: linear-gradient(135deg, #3a2f1f 0%, #2d2419 100%);
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            position: relative;
        }

        .tool-btn:hover {
            border-color: var(--border-gold);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(212, 175, 55, 0.3);
        }

        .tool-btn.active {
            border-color: var(--text-gold);
            background: linear-gradient(135deg, var(--border-gold) 0%, #b8941f 100%);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
        }

        .tool-btn .tool-level {
            position: absolute;
            bottom: 2px;
            right: 2px;
            font-size: 9px;
            background: rgba(0, 0, 0, 0.7);
            padding: 1px 4px;
            border-radius: 3px;
            color: var(--text-gold);
        }

        /* Boutons de mode de sélection */
        .select-mode-btn {
            width: 40px;
            height: 40px;
            border: 2px solid rgba(100, 149, 237, 0.4);
            border-radius: 8px;
            background: linear-gradient(135deg, #2a3a5a 0%, #1a2a4a 100%);
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .select-mode-btn:hover {
            border-color: #6495ed;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(100, 149, 237, 0.3);
        }

        .select-mode-btn.active {
            border-color: #87ceeb;
            background: linear-gradient(135deg, #4a6a9a 0%, #3a5a8a 100%);
            box-shadow: 0 0 15px rgba(100, 149, 237, 0.5);
        }

        .toolbar-divider {
            color: rgba(255, 255, 255, 0.3);
            margin: 0 8px;
            font-size: 20px;
        }

        .tool-btn[data-tool="grass"] {
            background: linear-gradient(135deg, #3d5c3a 0%, #2d4a2a 100%);
        }

        .tool-btn[data-tool="forest"] {
            background: linear-gradient(135deg, #228b22 0%, #1a6b1a 100%);
        }

        .tool-btn[data-tool="stone"] {
            background: linear-gradient(135deg, #808080 0%, #606060 100%);
        }

        .tool-btn[data-tool="iron"] {
            background: linear-gradient(135deg, #8b6914 0%, #6b4914 100%);
        }

        .tool-btn[data-tool="gold"] {
            background: linear-gradient(135deg, #ffd700 0%, #cc9900 100%);
        }

        .tool-btn[data-tool="water"] {
            background: linear-gradient(135deg, #4a90b8 0%, #2a6090 100%);
        }

        .tool-btn[data-tool="mountain"] {
            background: linear-gradient(135deg, #6b6b6b 0%, #4a4a4a 100%);
        }

        .tool-btn[data-tool="berries"] {
            background: linear-gradient(135deg, #6b3a6b 0%, #4a2a4a 100%);
        }

        .mode-indicator {
            background: rgba(0, 0, 0, 0.4);
            padding: 8px 16px;
            border-radius: 6px;
            border: 1px solid var(--border-gold);
            font-size: 12px;
            min-width: 150px;
            text-align: center;
        }

        .mode-indicator .mode-name {
            color: var(--text-gold);
            font-weight: bold;
        }

        .mode-indicator .mode-hint {
            font-size: 10px;
            opacity: 0.7;
            margin-top: 2px;
        }

        .stats-mini {
            display: flex;
            gap: 20px;
            margin-left: auto;
        }

        .stat-mini {
            text-align: center;
        }

        .stat-mini-value {
            font-size: 16px;
            font-weight: bold;
            color: var(--text-gold);
            font-family: 'Cinzel', serif;
        }

        .stat-mini-label {
            font-size: 9px;
            opacity: 0.7;
        }

        .brush-size {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .brush-size input {
            width: 60px;
            padding: 4px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border-gold);
            border-radius: 4px;
            color: var(--text-light);
            text-align: center;
        }

        /* === ACTIONS GOD MODE === */
        .god-actions {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-left: auto;
        }

        .action-btn {
            width: 44px;
            height: 44px;
            border: 2px solid rgba(212, 175, 55, 0.4);
            border-radius: 8px;
            background: linear-gradient(135deg, #3a2f1f 0%, #2d2419 100%);
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .action-btn:hover {
            border-color: var(--border-gold);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(212, 175, 55, 0.3);
        }

        .action-btn.active {
            border-color: var(--text-gold);
            background: linear-gradient(135deg, var(--border-gold) 0%, #b8941f 100%);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
        }

        /* === COMPTEURS POPULATION AMÉLIORÉS === */
        .population-counter {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
            text-align: center;
        }

        .pop-number {
            font-family: 'Cinzel', serif;
            font-size: 32px;
            font-weight: bold;
            color: var(--text-gold);
            line-height: 1;
        }

        .pop-label {
            font-size: 11px;
            opacity: 0.8;
            margin-top: 4px;
        }

        .pop-ratio {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 8px;
            font-size: 12px;
        }

        .pop-ratio span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .pop-max {
            font-size: 10px;
            opacity: 0.6;
            margin-top: 4px;
        }

        /* === MODAL TECHNOLOGIES === */
        #techModal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, var(--bg-panel) 0%, #1a1410 100%);
            border: 3px solid var(--border-gold);
            border-radius: 12px;
            padding: 20px;
            z-index: 1000;
            width: 85%;
            max-width: 900px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8), 0 0 30px rgba(212, 175, 55, 0.3);
        }

        #techModal.show {
            display: block;
        }

        .tech-factions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .tech-faction-panel {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 15px;
        }

        .tech-faction-panel.human-panel {
            border-left: 4px solid var(--human-color);
        }

        .tech-faction-panel.elf-panel {
            border-left: 4px solid var(--elf-color);
        }

        .tech-faction-title {
            font-family: 'Cinzel', serif;
            font-size: 16px;
            color: var(--text-gold);
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border-gold);
        }

        .tech-tree-category {
            margin-bottom: 15px;
        }

        .tech-tree-category-title {
            font-size: 13px;
            color: var(--text-gold);
            margin-bottom: 8px;
            opacity: 0.9;
        }

        .tech-tree-node {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            margin: 5px 0;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 6px;
            transition: all 0.3s ease;
        }

        .tech-tree-node:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .tech-tree-node.completed {
            border-left: 3px solid #22c55e;
        }

        .tech-tree-node.researching {
            border-left: 3px solid #f59e0b;
            animation: techPulse 1.5s infinite;
        }

        .tech-tree-node.locked {
            opacity: 0.6;
        }

        @keyframes techPulse {

            0%,
            100% {
                background: rgba(245, 158, 11, 0.1);
            }

            50% {
                background: rgba(245, 158, 11, 0.2);
            }
        }

        .tech-tree-icon {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 6px;
        }

        .tech-tree-info {
            flex: 1;
        }

        .tech-tree-name {
            font-weight: 600;
            color: var(--text-light);
            font-size: 13px;
        }

        .tech-tree-effect {
            font-size: 10px;
            opacity: 0.7;
            margin-top: 2px;
        }

        .tech-tree-status {
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 4px;
            background: rgba(0, 0, 0, 0.4);
        }

        .tech-tree-status.completed {
            color: #22c55e;
        }

        .tech-tree-status.researching {
            color: #f59e0b;
        }

        .tech-tree-status.locked {
            color: #888;
        }

        .tech-btn {
            background: linear-gradient(135deg, #2a4a3a 0%, #1a3a2a 100%) !important;
            margin-left: 10px !important;
        }

        .tech-btn:hover {
            background: linear-gradient(135deg, #3a5a4a 0%, #2a4a3a 100%) !important;
        }

        /* === RESSOURCES AMÉLIORÉES === */
        .resource-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            margin-top: 10px;
        }

        .resource-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            padding: 8px 10px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 6px;
            border-left: 3px solid var(--border-gold);
        }

        .resource-item span:first-child {
            font-size: 14px;
        }

        .resource-item span:last-child {
            font-weight: bold;
            color: var(--text-gold);
            font-size: 14px;
        }

        /* Symboles sexe */
        .gender-male {

        .gender-female {
            color: #ff6b9d;
            font-weight: bold;

        /* ============================================
   NOUVEAUX STYLES - Version 2.0
   ============================================ */

        /* Header info (date) */
        .header-info {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        /* Boutons save/load */
        .save-btn {
            font-size: 14px !important;
            padding: 5px 10px !important;
        }

        .save-btn:hover {
            background: linear-gradient(135deg, #2a5a2a 0%, #1a3a1a 100%) !important;
            border-color: #4ade80 !important;
        }

        /* Animation des notifications */
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes slideOut {
            from {
                transform: translateX(0);
                opacity: 1;
            }

            to {
                transform: translateX(100%);
                opacity: 0;
            }
        }

        /* Container de notifications */
        #notificationContainer {
            position: fixed;
            top: 80px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;

            pointer-events: none;

        #notificationContainer>div {

        /* Styles des notifications par type */

        .notification.warning {

        .notification.event {

        /* Effet de pulsation pour les événements spéciaux */

                transform: scale(1);

            }

        .notification.event {

        }

        /* Styles pour l'écran de victoire */

        @keyframes fadeIn {

        /* Amélioration des barres de progression */

        /* Style pour les traités */

            display: inline-block;
            padding: 2px 6px;

        /* Effet de saison sur le canvas (optionnel via overlay) */

        /* Tooltip pour les boutons */

            content: attr(title);

    <script>

        // ============================================
        // CONFIGURATION
        // ============================================
        const CONFIG = {
            mapWidth: 80,
            mapHeight: 45,
            cellSize: 12,
            gameSpeed: 1,
            isPaused: false,
            ticksPerYear: 1200, // Plus lent: 1200 ticks = 1 an (100 ticks = 1 mois)
            ticksPerMonth: 100,
            currentTick: 0,
            // Paramètres économie/survie (rééquilibrés)
            foodPerVillagerPerTick: 0.008, // Ajusté pour le nouveau rythme
            maxAge: {
                human: { average: 75, min: 60, max: 110 },
                elf: { average: 1200, min: 800, max: 1500 }
            },
            starvationDamage: 3,
            birthFoodThreshold: 10,

            // === SYSTÈME DE MOIS ===
            currentMonth: 0, // 0-11 (Janvier-Décembre)
            monthNames: ['Janvier', 'Février', 'Mars', 'Avril', 'Mai', 'Juin',
                'Juillet', 'Août', 'Septembre', 'Octobre', 'Novembre', 'Décembre'],
            // Saisons dérivées des mois (pour les modificateurs)
            // Hiver: Dec-Fév (11,0,1), Printemps: Mar-Mai (2,3,4), Été: Juin-Août (5,6,7), Automne: Sep-Nov (8,9,10)

            // Événements aléatoires
            eventChance: 0.0003, // Chance par tick d'un événement
            lastEventTick: 0,
            eventCooldown: 1000, // Ticks minimum entre événements

            // Victoire
            victoryTerritoryPercent: 75, // % du territoire pour victoire domination
            victoryPopulation: 100, // Population pour victoire démographique

            // Colonies
            colonyMinDistance: 20, // Distance minimum du château principal
            colonyMaxCount: 3, // Max colonies par faction

            // Diplomatie
            diplomacyEnabled: true
        };

        // ============================================
        // SYSTÈME DE NOTIFICATIONS
        // ============================================
        const NOTIFICATIONS = [];
        const MAX_NOTIFICATIONS = 5;
        const NOTIFICATION_DURATION = 8000; // ms

        function addNotification(message, type = 'info', icon = '📢') {
            // Notifications désactivées - interface simplifiée
            return;
        }

        function renderNotifications() {
            // Notifications désactivées - interface simplifiée
            return;
        }

        // ============================================
        // SYSTÈME D'ÉVÉNEMENTS ALÉATOIRES
        // ============================================
        const RANDOM_EVENTS = {
            // Événements positifs
            GOOD_HARVEST: {
                name: 'Récolte Abondante',
                icon: '🌾',
                type: 'success',
                description: 'Une récolte exceptionnelle!',
                effect: (faction) => {
                    const bonus = 100 + Math.random() * 150;
                    faction.resources.food += bonus;
                    return `+${Math.floor(bonus)} nourriture`;
                },
                chance: 0.15
            },
            GOLD_DISCOVERY: {
                name: 'Filon d\'Or',
                icon: '💰',
                type: 'success',
                description: 'Un filon d\'or a été découvert!',
                effect: (faction) => {
                    const bonus = 50 + Math.random() * 100;
                    faction.resources.gold += bonus;
                    return `+${Math.floor(bonus)} or`;
                },
                chance: 0.08
            },
            MIGRATION: {
                name: 'Vague de Migration',
                icon: '👥',
                type: 'success',
                description: 'Des réfugiés rejoignent votre royaume!',
                effect: (faction, gameMap) => {
                    const count = 2 + Math.floor(Math.random() * 4);
                    for (let i = 0; i < count; i++) {
                        faction.createNewVillager(gameMap);
                    }
                    return `+${count} villageois`;
                },
                chance: 0.10
            },
            TECH_BREAKTHROUGH: {
                name: 'Percée Technologique',
                icon: '💡',
                type: 'success',
                description: 'Vos chercheurs ont fait une découverte!',
                effect: (faction) => {
                    if (faction.currentResearch) {
                        const bonus = faction.currentResearch.duration * 0.3;
                        faction.researchProgress += bonus;
                        return `Recherche accélérée de 30%`;
                    }
                    return 'Aucune recherche en cours';
                },
                chance: 0.10
            },
            BLESSING: {
                name: 'Bénédiction Divine',
                icon: '✨',
                type: 'success',
                description: 'Les dieux sourient à votre peuple!',
                effect: (faction) => {
                    faction.villagers.forEach(v => {
                        if (v.isAlive) {
                            v.combatStats.health = v.combatStats.maxHealth;
                            v.hunger = 0;
                        }
                    });
                    return 'Tous les villageois sont soignés';
                },
                chance: 0.05
            },

            // Événements négatifs
            DROUGHT: {
                name: 'Sécheresse',
                icon: '🏜️',
                type: 'warning',
                description: 'Une sécheresse frappe vos terres!',
                effect: (faction) => {
                    const loss = Math.floor(faction.resources.food * 0.2);
                    faction.resources.food = Math.max(0, faction.resources.food - loss);
                    return `-${loss} nourriture`;
                },
                chance: 0.12
            },
            EPIDEMIC: {
                name: 'Épidémie',
                icon: '🦠',
                type: 'danger',
                description: 'Une maladie se répand!',
                effect: (faction) => {
                    let deaths = 0;
                    faction.villagers.forEach(v => {
                        if (v.isAlive && Math.random() < 0.15) {
                            v.combatStats.health -= 50;
                            if (v.combatStats.health <= 0) {
                                v.die('épidémie');
                                deaths++;
                            }
                        }
                    });
                    return deaths > 0 ? `${deaths} mort(s)` : 'Quelques malades';
                },
                chance: 0.08
            },
            EARTHQUAKE: {
                name: 'Tremblement de Terre',
                icon: '🌋',
                type: 'danger',
                description: 'La terre tremble!',
                effect: (faction) => {
                    let destroyed = 0;
                    faction.buildings = faction.buildings.filter(b => {
                        if (b.type !== BUILDING.CASTLE && Math.random() < 0.1) {
                            destroyed++;
                            return false;
                        }
                        return true;
                    });
                    return destroyed > 0 ? `${destroyed} bâtiment(s) détruit(s)` : 'Dégâts mineurs';
                },
                chance: 0.05
            },
            BANDIT_RAID: {
                name: 'Raid de Bandits',
                icon: '🗡️',
                type: 'warning',
                description: 'Des bandits pillent vos réserves!',
                effect: (faction) => {
                    const woodLoss = Math.floor(faction.resources.wood * 0.15);
                    const goldLoss = Math.floor(faction.resources.gold * 0.2);
                    faction.resources.wood = Math.max(0, faction.resources.wood - woodLoss);
                    faction.resources.gold = Math.max(0, faction.resources.gold - goldLoss);
                    return `-${woodLoss} bois, -${goldLoss} or`;
                },
                chance: 0.10
            },
            FIRE: {
                name: 'Incendie',
                icon: '🔥',
                type: 'danger',
                description: 'Un incendie se déclare!',
                effect: (faction) => {
                    const woodLoss = Math.floor(faction.resources.wood * 0.25);
                    faction.resources.wood = Math.max(0, faction.resources.wood - woodLoss);
                    // Chance de détruire une ferme
                    const farms = faction.buildings.filter(b => b.type === BUILDING.FARM);
                    if (farms.length > 0 && Math.random() < 0.3) {
                        faction.buildings = faction.buildings.filter(b => b !== farms[0]);
                        return `-${woodLoss} bois, 1 ferme détruite`;
                    }
                    return `-${woodLoss} bois`;
                },
                chance: 0.08
            },

            // Événements neutres/spéciaux
            ANIMAL_MIGRATION: {
                name: 'Migration Animale',
                icon: '🦌',
                type: 'info',
                description: 'Des animaux arrivent dans la région!',
                effect: (faction, gameMap) => {
                    const count = 5 + Math.floor(Math.random() * 8);
                    for (let i = 0; i < count; i++) {
                        const pos = gameMap.findRandomGrassPosition();
                        if (pos) {
                            const types = ['SHEEP', 'COW', 'DEER', 'PIG'];
                            const type = types[Math.floor(Math.random() * types.length)];
                            gameMap.animals.push(new Animal(type, pos.x, pos.y));
                        }
                    }
                    return `+${count} animaux`;
                },
                chance: 0.12
            },
            RESOURCE_DISCOVERY: {
                name: 'Gisement Découvert',
                icon: '⛏️',
                type: 'info',
                description: 'Un nouveau gisement a été trouvé!',
                effect: (faction, gameMap) => {
                    // Trouver une case herbe dans le territoire et la transformer
                    for (let y = 0; y < gameMap.height; y++) {
                        for (let x = 0; x < gameMap.width; x++) {
                            if (gameMap.territory[y][x] === faction.id &&
                                gameMap.terrain[y][x] === TERRAIN.GRASS &&
                                gameMap.buildings[y][x].type === BUILDING.NONE) {
                                const types = [TERRAIN.IRON, TERRAIN.STONE, TERRAIN.GOLD];
                                const type = types[Math.floor(Math.random() * types.length)];
                                gameMap.terrain[y][x] = type;
                                gameMap.resources[y][x] = { amount: 80 + Math.random() * 70, type };
                                const names = { [TERRAIN.IRON]: 'fer', [TERRAIN.STONE]: 'pierre', [TERRAIN.GOLD]: 'or' };
                                return `Gisement de ${names[type]}`;
                            }
                        }
                    }
                    return 'Aucun emplacement trouvé';
                },
                chance: 0.08
            },

            // Événement de renaissance (pour factions éteintes)
            FACTION_REBIRTH: {
                name: 'Renaissance',
                icon: '🌅',
                type: 'event',
                description: 'Des survivants émergent des ruines!',
                effect: (faction, gameMap) => {
                    // Créer 5-8 nouveaux villageois
                    const count = 5 + Math.floor(Math.random() * 4);
                    for (let i = 0; i < count; i++) {
                        faction.createNewVillager(gameMap);
                    }
                    // Donner des ressources de base
                    faction.resources.food = 500;
                    faction.resources.wood = 150;
                    faction.resources.stone = 75;
                    faction.resources.iron = 30;
                    faction.resources.gold = 50;
                    return `${count} survivants, ressources restaurées`;
                },
                chance: 1.0 // Toujours appliqué quand déclenché
            }
        };

        // Fonction pour déclencher un événement aléatoire
        function triggerRandomEvent(factions, gameMap) {
            if (CONFIG.currentTick - CONFIG.lastEventTick < CONFIG.eventCooldown) return;
            if (Math.random() > CONFIG.eventChance * CONFIG.gameSpeed) return;

            CONFIG.lastEventTick = CONFIG.currentTick;

            // Choisir une faction au hasard (qui a des villageois)
            const aliveFactions = factions.filter(f => f.villagers.filter(v => v.isAlive).length > 0);
            if (aliveFactions.length === 0) return;

            const faction = aliveFactions[Math.floor(Math.random() * aliveFactions.length)];

            // Choisir un événement au hasard (pondéré par chance)
            const events = Object.values(RANDOM_EVENTS).filter(e => e.name !== 'Renaissance');
            const totalChance = events.reduce((sum, e) => sum + e.chance, 0);
            let roll = Math.random() * totalChance;

            let selectedEvent = events[0];
            for (const event of events) {
                roll -= event.chance;
                if (roll <= 0) {
                    selectedEvent = event;
                    break;
                }
            }

            // Appliquer l'événement
            const result = selectedEvent.effect(faction, gameMap);

            // Notification
            const factionName = faction.type === 'human' ? 'Humains' : 'Elfes';
            addNotification(
                `${factionName}: ${selectedEvent.description} ${result}`,
                selectedEvent.type,
                selectedEvent.icon
            );
        }

        // Vérifier si une faction éteinte peut renaître
        function checkFactionRebirth(factions, gameMap) {
            factions.forEach(faction => {
                const aliveCount = faction.villagers.filter(v => v.isAlive).length;
                if (aliveCount === 0 && Math.random() < 0.001 * CONFIG.gameSpeed) {
                    // Chance de renaissance!
                    const event = RANDOM_EVENTS.FACTION_REBIRTH;
                    const result = event.effect(faction, gameMap);

                    const factionName = faction.type === 'human' ? 'Humains' : 'Elfes';
                    addNotification(
                        `${factionName}: ${event.description} ${result}`,
                        event.type,
                        event.icon
                    );
                }
            });
        }

        // ============================================
        // SYSTÈME DE SAISONS
        // ============================================
        function updateMonth() {
            const tickInYear = CONFIG.currentTick % CONFIG.ticksPerYear;
            const newMonth = Math.floor(tickInYear / CONFIG.ticksPerMonth);

            if (newMonth !== CONFIG.currentMonth && newMonth < 12) {
                CONFIG.currentMonth = newMonth;
            }
        }

        function getCurrentSeason() {
            // Retourne la saison basée sur le mois
            const month = CONFIG.currentMonth;
            if (month === 11 || month <= 1) return 3; // Hiver (Déc, Jan, Fév)
            if (month >= 2 && month <= 4) return 0;   // Printemps (Mar, Avr, Mai)
            if (month >= 5 && month <= 7) return 1;   // Été (Juin, Juil, Août)
            return 2;                                   // Automne (Sep, Oct, Nov)
        }

        function getSeasonModifiers() {
            const season = getCurrentSeason();
            switch (season) {
                case 0: // Printemps
                    return { foodProduction: 1.2, birthRate: 1.3, movementSpeed: 1.0 };
                case 1: // Été
                    return { foodProduction: 1.5, birthRate: 1.0, movementSpeed: 1.1 };
                case 2: // Automne
                    return { foodProduction: 1.3, birthRate: 0.8, movementSpeed: 1.0 };
                case 3: // Hiver
                    return { foodProduction: 0.5, birthRate: 0.5, movementSpeed: 0.8 };
                default:
                    return { foodProduction: 1.0, birthRate: 1.0, movementSpeed: 1.0 };
            }
        }

        // ============================================
        // SYSTÈME DE SAUVEGARDE/CHARGEMENT
        // ============================================

        function showSaveConfirmation() {
            // Créer un élément de confirmation visuelle
            const confirmDiv = document.createElement('div');
            confirmDiv.style.cssText = `
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: linear-gradient(135deg, #1a472a 0%, #0d2818 100%);
        border: 2px solid #4ade80;
        border-radius: 12px;
        padding: 20px 40px;
        color: #fff;
        font-size: 18px;
        font-weight: bold;
        z-index: 10000;
        box-shadow: 0 0 30px rgba(74, 222, 128, 0.5);
        text-align: center;
        animation: savePopup 2s ease-out forwards;
    `;
            confirmDiv.innerHTML = '💾 Partie Sauvegardée!';
            document.body.appendChild(confirmDiv);

            // Ajouter le style d'animation
            if (!document.getElementById('saveAnimStyle')) {
                const style = document.createElement('style');
                style.id = 'saveAnimStyle';
                style.textContent = `
            @keyframes savePopup {
                0% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
                20% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
                40% { transform: translate(-50%, -50%) scale(1); }

        // ============================================
        const SAVE_KEY = 'eryndor_save';

        function saveGame(game) {
            try {
                const saveData = {
                    version: '2.0',
                    timestamp: Date.now(),
                    config: {
                        currentTick: CONFIG.currentTick,
                        gameSpeed: CONFIG.gameSpeed,
                        currentMonth: CONFIG.currentMonth
                    },
                    factions: game.factions.map(f => serializeFaction(f, game.gameMap)),
                    map: serializeMap(game.gameMap),
                    animals: game.gameMap.animals.map(a => serializeAnimal(a))
                };

                const saveStr = JSON.stringify(saveData);
                localStorage.setItem(SAVE_KEY, saveStr);

                // Vérifier que la sauvegarde a été écrite
                const check = localStorage.getItem(SAVE_KEY);
                if (check) {
                    const year = Math.floor(CONFIG.currentTick / CONFIG.ticksPerYear) + 1;
                    const monthName = CONFIG.monthNames[CONFIG.currentMonth];
                    addNotification(`Partie sauvegardée! (${monthName}, An ${year})`, 'success', '💾');
                    showSaveConfirmation();
                    console.log('Sauvegarde réussie:', Math.round(saveStr.length / 1024) + ' Ko');
                    return true;
                } else {
                    addNotification('Erreur: sauvegarde non écrite', 'danger', '❌');
                    return false;
                }
            } catch (e) {
                console.error('Erreur de sauvegarde:', e);
                addNotification('Erreur de sauvegarde: ' + e.message, 'danger', '❌');
                return false;
            }
        }

        function loadGame(game) {
            try {
                const saveStr = localStorage.getItem(SAVE_KEY);
                if (!saveStr) {
                    addNotification('Aucune sauvegarde trouvée', 'warning', '📂');
                    return false;
                }

                console.log('Chargement de la sauvegarde:', Math.round(saveStr.length / 1024) + ' Ko');
                const saveData = JSON.parse(saveStr);
                console.log('Version:', saveData.version, '| Timestamp:', new Date(saveData.timestamp).toLocaleString());

                // Restaurer config
                CONFIG.currentTick = saveData.config.currentTick;
                CONFIG.gameSpeed = saveData.config.gameSpeed;
                CONFIG.currentMonth = saveData.config.currentMonth || 0;

                // Restaurer la carte
                deserializeMap(game.gameMap, saveData.map);
                console.log('Carte restaurée');

                // Restaurer les animaux
                game.gameMap.animals = (saveData.animals || []).map(a => deserializeAnimal(a));
                console.log('Animaux restaurés:', game.gameMap.animals.length);

                // Restaurer les factions
                saveData.factions.forEach((fData, idx) => {
                    if (game.factions[idx]) {
                        deserializeFaction(game.factions[idx], fData, game.gameMap);

                addNotification('Erreur de chargement: ' + e.message, 'danger', '❌');
                return false;

        function serializeFaction(faction, gameMap) {
            return {
                id: faction.id,
                resources: { ...faction.resources },
                completedTechs: [...faction.completedTechs],
                currentResearch: faction.currentResearch ? { ...faction.currentResearch } : null,
                researchProgress: faction.researchProgress,
                buildings: faction.buildings.map(b => {
                    const mapBuilding = gameMap.buildings[b.y] && gameMap.buildings[b.y][b.x];
                    return {
                        type: b.type,
                        x: b.x,
                        y: b.y,
                        health: mapBuilding ? mapBuilding.health : undefined
                    };
                }),
                villagers: faction.villagers.filter(v => v.isAlive).map(v => serializeVillager(v)),
                boats: faction.boats.map(b => ({
                    x: b.x, y: b.y, portX: b.portX, portY: b.portY,
                    fishCollected: b.fishCollected, returning: b.returning
                })),
                warState: { ...faction.warState },
                colonies: faction.colonies || [],
                diplomacy: faction.diplomacy || {},
                traits: faction.traits ? { ...faction.traits } : {}
            };
        }

        function deserializeFaction(faction, data, gameMap) {
            faction.resources = { ...data.resources };
            faction.completedTechs = [...data.completedTechs];
            faction.currentResearch = data.currentResearch;
            faction.researchProgress = data.researchProgress;
            faction.buildings = data.buildings.map(b => ({ ...b }));
            faction.warState = { ...data.warState };
            faction.colonies = data.colonies || [];
            faction.diplomacy = data.diplomacy || {};
            faction.traits = data.traits ? { ...data.traits } : {};

            // Restaurer les bâtiments sur la carte
            data.buildings.forEach(b => {
                if (b.x >= 0 && b.x < gameMap.width && b.y >= 0 && b.y < gameMap.height) {
                    const config = BUILDING_CONFIG[b.type];
                    const maxHealth = config ? config.health : 100;
                    gameMap.buildings[b.y][b.x] = {
                        type: b.type,
                        faction: faction.id,
                        health: b.health !== undefined ? b.health : maxHealth,
                        maxHealth: maxHealth
                    };
                }
            });

            // Restaurer les villageois
            faction.villagers = data.villagers.map(vData => deserializeVillager(vData, faction));

            // Restaurer les bateaux
            faction.boats = data.boats.map(bData => {
                const boat = new Boat(faction.id, bData.x, bData.y);
                boat.portX = bData.portX;
                boat.portY = bData.portY;
                boat.fishCollected = bData.fishCollected;
                boat.returning = bData.returning;
                return boat;
            });
        }

        function serializeVillager(v) {
            return {
                id: v.id,
                x: v.x, y: v.y,
                gender: v.gender,
                firstName: v.firstName,
                lastName: v.lastName,
                birthTick: v.birthTick,
                skills: { ...v.skills },
                unitType: v.unitType,
                combatStats: { ...v.combatStats },
                hunger: v.hunger,
                job: v.job,
                spouseId: v.spouse ? v.spouse.id : null
            };
        }

        function deserializeVillager(data, faction) {
            const v = new Villager(faction.id, faction.type, data.x, data.y);
            v.id = data.id;
            v.gender = data.gender;
            v.firstName = data.firstName;
            v.lastName = data.lastName;
            v.birthTick = data.birthTick;
            v.skills = { ...data.skills };
            v.unitType = data.unitType;
            v.combatStats = { ...data.combatStats };
            v.hunger = data.hunger;
            v.job = data.job;
            v._spouseId = data.spouseId; // Pour liaison après
            return v;
        }

        function serializeMap(gameMap) {
            return {
                terrain: gameMap.terrain.map(row => [...row]),
                elevation: gameMap.elevation.map(row => [...row]),
                territory: gameMap.territory.map(row => [...row]),

        function deserializeMap(gameMap, data) {
            gameMap.terrain = data.terrain.map(row => [...row]);
            gameMap.elevation = data.elevation.map(row => [...row]);
            gameMap.territory = data.territory.map(row => [...row]);
            gameMap.resources = data.resources.map(row => row.map(r => ({ ...r })));

            // Réinitialiser les bâtiments (ils seront restaurés via les factions)
            for (let y = 0; y < gameMap.height; y++) {
                for (let x = 0; x < gameMap.width; x++) {
                    gameMap.buildings[y][x] = { type: BUILDING.NONE, faction: -1 };
                }
            }

        function serializeAnimal(a) {
            return {
                type: a.type,
                x: a.x, y: a.y,

        function initDiplomacy(faction) {
            faction.diplomacy = {
                relations: {}, // { factionId: score (-100 à 100) }
                treaties: [],  // [{ type, targetFactionId, startTick, endTick }]
                tributePaid: 0,
                lastInteraction: 0
            };
        }

        function updateDiplomacy(faction, allFactions, gameMap) {
            if (!CONFIG.diplomacyEnabled) return;
            if (!faction.diplomacy) initDiplomacy(faction);

            allFactions.forEach(other => {
                if (other.id === faction.id) return;

                // Initialiser la relation si nécessaire
                if (faction.diplomacy.relations[other.id] === undefined) {
                    faction.diplomacy.relations[other.id] = 0; // Neutre
                }

                // Les relations évoluent naturellement
                const rel = faction.diplomacy.relations[other.id];

                // Si en guerre, la relation empire
                if (faction.warState.isAtWar && faction.warState.enemyId === other.id) {
                    faction.diplomacy.relations[other.id] = Math.max(-100, rel - 0.01 * CONFIG.gameSpeed);
                }
                // Sinon, lente amélioration vers la neutralité
                else if (rel < 0) {
                    faction.diplomacy.relations[other.id] = Math.min(0, rel + 0.001 * CONFIG.gameSpeed);
                }

                // Vérifier les traités expirés
                faction.diplomacy.treaties = faction.diplomacy.treaties.filter(t => {
                    if (CONFIG.currentTick > t.endTick) {
                        const treatyInfo = TREATIES[t.type];
                        addNotification(
                            `${treatyInfo.name} entre ${faction.name} et ${other.name} a expiré`,
                            'info',
                            '📜'
                        );
                        return false;
                    }
                    return true;
                });
            });

            // IA diplomatique: proposer des traités si relations bonnes
            if (Math.random() < 0.0001 * CONFIG.gameSpeed) {
                const bestRelation = Object.entries(faction.diplomacy.relations)
                    .filter(([id, score]) => score > 20 && !faction.warState.isAtWar)
                    .sort((a, b) => b[1] - a[1])[0];

                if (bestRelation) {
                    const [targetId, score] = bestRelation;
                    const target = allFactions.find(f => f.id === parseInt(targetId));
                    if (target && !hasActiveTreaty(faction, target.id, 'TRADE')) {
                        // Proposer un accord commercial
                        createTreaty(faction, target, 'TRADE');
                    }
                }
            }
        }

        function hasActiveTreaty(faction, targetId, treatyType) {
            return faction.diplomacy.treaties.some(t =>
                t.targetFactionId === targetId && t.type === treatyType
            );
        }

        function createTreaty(faction1, faction2, treatyType) {
            const treatyInfo = TREATIES[treatyType];
            const treaty = {
                type: treatyType,
                targetFactionId: faction2.id,
                startTick: CONFIG.currentTick,
                endTick: CONFIG.currentTick + treatyInfo.duration
            };

            faction1.diplomacy.treaties.push(treaty);
            faction2.diplomacy.treaties.push({
                ...treaty,
                targetFactionId: faction1.id
            });

            // Améliorer les relations
            faction1.diplomacy.relations[faction2.id] =
                Math.min(100, (faction1.diplomacy.relations[faction2.id] || 0) + 15);
            faction2.diplomacy.relations[faction1.id] =
                Math.min(100, (faction2.diplomacy.relations[faction1.id] || 0) + 15);

            addNotification(
                `${treatyInfo.name} signé entre ${faction1.name} et ${faction2.name}!`,
                'success',
                treatyInfo.icon
            );
        }

        // Classe Bateau
        class Boat {
            constructor(factionId, x, y) {
                this.id = Math.random().toString(36).substr(2, 9);
                this.factionId = factionId;
                this.x = x;
                this.y = y;
                this.targetX = x;
                this.targetY = y;
                this.fishingTimer = 0;
                this.fishCollected = 0;
                this.capacity = 20;
                this.returning = false;
                this.portX = x;
                this.portY = y;
            }

            update(gameMap, faction) {
                // Chercher du poisson ou retourner au port
                if (this.fishCollected >= this.capacity) {
                    this.returning = true;
                }

                if (this.returning) {
                    // Retourner vers le port
                    const dx = this.portX - this.x;
                    const dy = this.portY - this.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < 1.5) {
                        // Décharger le poisson
                        faction.resources.food += this.fishCollected;
                        this.fishCollected = 0;
                        this.returning = false;
                    } else {
                        this.targetX = this.portX;
                        this.targetY = this.portY;
                    }
                } else {
                    // Pêcher ou chercher un bon spot
                    this.fishingTimer += CONFIG.gameSpeed;

                    if (this.fishingTimer > 100) {
                        this.fishingTimer = 0;
                        const terrain = gameMap.terrain[Math.floor(this.y)];
                        const elev = gameMap.elevation[Math.floor(this.y)];

                        if (terrain && terrain[Math.floor(this.x)] === TERRAIN.WATER) {
                            const depth = elev ? elev[Math.floor(this.x)] : 1;
                            if (depth >= ELEVATION.MEDIUM) {
                                // Pêcher! Plus de poisson en eau profonde
                                this.fishCollected += depth;
                            }
                        }

                        // Se déplacer aléatoirement sur l'eau navigable
                        if (Math.random() < 0.3) {
                            const angle = Math.random() * Math.PI * 2;
                            const newX = this.x + Math.cos(angle) * 2;
                            const newY = this.y + Math.sin(angle) * 2;

                            if (gameMap.isNavigable(Math.floor(newX), Math.floor(newY))) {
                                this.targetX = newX;
                                this.targetY = newY;
                            }
                        }
                    }
                }

                // Mouvement fluide
                const speed = 0.03 * CONFIG.gameSpeed;
                this.x += (this.targetX - this.x) * speed;

            }

        // Classe Animal - animaux sauvages qui peuvent être chassés
        class Animal {
            constructor(type, x, y) {
                this.id = Math.random().toString(36).substr(2, 9);
                this.type = type;
                this.typeData = ANIMAL_TYPE[type];
                this.x = x;
                this.y = y;
                this.targetX = x;
                this.targetY = y;
                this.isAlive = true;
                this.health = 100;
                this.moveTimer = 0;
                this.fleeingFrom = null;
                this.productionTimer = 0; // Pour les ressources renouvelables (lait, œufs, laine)
            }

            update(gameMap, allFactions) {
                if (!this.isAlive) return;

                this.moveTimer += CONFIG.gameSpeed;
                this.productionTimer += CONFIG.gameSpeed;

                // Vérifier si un chasseur est proche (pour fuir)
                if (this.typeData.flees || this.typeData.passive) {
                    let nearestHunter = null;
                    let nearestDist = 8; // Distance de détection

                    allFactions.forEach(faction => {
                        faction.villagers.forEach(v => {
                            if (!v.isAlive) return;
                            if (v.job === 'hunter' || v.currentTask === 'hunt') {
                                const dx = v.x - this.x;
                                const dy = v.y - this.y;
                                const dist = Math.sqrt(dx * dx + dy * dy);
                                if (dist < nearestDist) {
                                    nearestDist = dist;
                                    nearestHunter = v;
                                }
                            }
                        });
                    });

                    if (nearestHunter && nearestDist < 5) {
                        // Fuir!
                        const dx = this.x - nearestHunter.x;
                        const dy = this.y - nearestHunter.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist > 0) {
                            const fleeX = this.x + (dx / dist) * 3;
                            const fleeY = this.y + (dy / dist) * 3;
                            if (this.canMoveTo(gameMap, fleeX, fleeY)) {
                                this.targetX = fleeX;
                                this.targetY = fleeY;
                            }
                        }
                    }
                }

                // Mouvement aléatoire
                if (this.moveTimer > 100 + Math.random() * 100) {
                    this.moveTimer = 0;
                    if (Math.random() < 0.3) {
                        const angle = Math.random() * Math.PI * 2;
                        const dist = 1 + Math.random() * 2;
                        const newX = this.x + Math.cos(angle) * dist;
                        const newY = this.y + Math.sin(angle) * dist;
                        if (this.canMoveTo(gameMap, newX, newY)) {
                            this.targetX = newX;
                            this.targetY = newY;
                        }
                    }
                }

                // Mouvement fluide
                const speed = this.typeData.speed * 0.02 * CONFIG.gameSpeed;
                this.x += (this.targetX - this.x) * speed;
                this.y += (this.targetY - this.y) * speed;
            }

            canMoveTo(gameMap, x, y) {
                const ix = Math.floor(x);
                const iy = Math.floor(y);
                if (ix < 0 || ix >= gameMap.width || iy < 0 || iy >= gameMap.height) return false;

                // Les animaux aquatiques restent dans l'eau
                if (this.typeData.aquatic) {
                    return gameMap.terrain[iy][ix] === TERRAIN.WATER;
                }
                // Les autres évitent l'eau et les montagnes hautes
                const terrain = gameMap.terrain[iy][ix];
                if (terrain === TERRAIN.WATER) return false;
                if (terrain === TERRAIN.MOUNTAIN && gameMap.elevation[iy][ix] > 1) return false;
                return true;
            }

            // Quand l'animal est tué par un chasseur
            kill() {
                this.isAlive = false;
                return {
                    food: this.typeData.food,
                    wool: this.typeData.wool || 0
                };
            }

            // Récolter des ressources renouvelables (sans tuer)
            harvest() {
                if (this.productionTimer < 500) return null;
                this.productionTimer = 0;
                return {
                    milk: this.typeData.milk || 0,
                    eggs: this.typeData.eggs || 0,
                    wool: this.typeData.wool ? Math.floor(this.typeData.wool / 2) : 0
                };
            }
        }

        // ============================================
        // CLASSE VILLAGEOIS
        // ============================================
        class Villager {
            constructor(factionId, factionType, x, y, parent1 = null, parent2 = null) {
                this.id = Math.random().toString(36).substr(2, 9);
                this.factionId = factionId;
                this.factionType = factionType;
                this.x = x;
                this.y = y;
                this.targetX = x;
                this.targetY = y;

                this.gender = Math.random() < 0.5 ? 'male' : 'female';
                this.firstName = this.generateFirstName();
                this.lastName = parent1 ? parent1.lastName : this.generateLastName();
                this.age = parent1 ? 0 : 18 + Math.floor(Math.random() * 15); // 18-33 ans pour avoir le temps de se reproduire
                this.birthTick = CONFIG.currentTick - (this.age * CONFIG.ticksPerYear);

                this.parent1 = parent1;
                this.parent2 = parent2;
                this.spouse = null;
                this.children = [];

                // Type d'unité (par défaut villageois)
                this.unitType = UNIT_TYPE.VILLAGER;

                // Stats de combat basées sur la faction
                const factionConfig = this.factionType === 'human' ? FACTIONS.HUMAN : FACTIONS.ELF;
                this.combatStats = {
                    attack: COMBAT_STATS[UNIT_TYPE.VILLAGER].attack,
                    defense: COMBAT_STATS[UNIT_TYPE.VILLAGER].defense,
                    range: COMBAT_STATS[UNIT_TYPE.VILLAGER].range,
                    health: 100,
                    maxHealth: 100
                };

                // État de vie
                this.isAlive = true;
                this.hunger = 0; // 0 = bien nourri, 100 = mort de faim
                this.deathCause = null;

                // Compétences avec bonus de faction
                const isHuman = this.factionType === 'human';
                this.skills = {
                    farming: 10 + Math.floor(Math.random() * 40),
                    building: 10 + Math.floor(Math.random() * 40) + (isHuman ? 15 : 0),  // Humains: bonus construction
                    combat: 10 + Math.floor(Math.random() * 40) + (isHuman ? 10 : 0),   // Humains: bonus combat
                    crafting: 10 + Math.floor(Math.random() * 40),
                    gathering: 10 + Math.floor(Math.random() * 40) + (isHuman ? 0 : 10), // Elfes: bonus collecte
                    archery: 10 + Math.floor(Math.random() * 40) + (isHuman ? 0 : 20),  // Elfes: bonus archerie
                    research: 10 + Math.floor(Math.random() * 40) + (isHuman ? 0 : 15)  // Elfes: bonus recherche
                };

                if (parent1 && parent2) {
                    Object.keys(this.skills).forEach(skill => {
                        const inherited = (parent1.skills[skill] + parent2.skills[skill]) / 2;
                        this.skills[skill] = Math.floor(inherited * 0.7 + Math.random() * 30);
                    });
                }

                // Déterminer le métier basé sur les compétences
                this.job = this.determineJob();
                this.jobChangeTimer = 0; // Timer pour ne pas changer de métier trop souvent

                this.moveTimer = 0;
                this.moveInterval = 50 + Math.random() * 100;

                // IA: objectif actuel
                this.currentTask = null;  // 'gather', 'build', 'patrol', 'attack', 'farm', 'fish', 'socialize'
                this.taskTarget = null;   // Position cible
                this.gatherTimer = 0;
            }

            generateFirstName() {
                const names = NAMES[this.factionType][this.gender];
                return names[Math.floor(Math.random() * names.length)];
            }

            generateLastName() {
                const surnames = NAMES[this.factionType].surnames;
                return surnames[Math.floor(Math.random() * surnames.length)];
            }

            get fullName() { return `${this.firstName} ${this.lastName}`; }
            get currentAge() { return Math.floor((CONFIG.currentTick - this.birthTick) / CONFIG.ticksPerYear); }

            // Déterminer le métier basé sur les compétences les plus élevées
            determineJob() {
                const skills = this.skills;
                const age = this.currentAge;

                // Les jeunes (< 16 ans) et les vieux (> 60 pour humains, > 120 pour elfes) sont "breeders"
                // Âge de retraite : 55 ans pour humains, 700 ans pour elfes
                const maxWorkAge = this.factionType === 'human' ? 55 : 700;
                if (age < 16 || age > maxWorkAge) {
                    return JOB.BREEDER;
                }

                // Calculer le score pour chaque métier
                const jobScores = {
                    [JOB.GATHERER]: skills.gathering * 1.5 + skills.crafting * 0.5,
                    [JOB.FARMER]: skills.farming * 1.5 + skills.gathering * 0.3,
                    [JOB.BUILDER]: skills.building * 1.5 + skills.crafting * 0.8,
                    [JOB.WARRIOR]: skills.combat * 1.5 + skills.building * 0.3,
                    [JOB.HUNTER]: skills.archery * 1.5 + skills.gathering * 0.5,
                    [JOB.FISHER]: skills.farming * 0.8 + skills.gathering * 0.8 + Math.random() * 20,
                    [JOB.BREEDER]: (100 - skills.combat) * 0.5 + Math.random() * 30
                };

                // Trouver le métier avec le score le plus élevé
                let bestJob = JOB.GATHERER;
                let bestScore = 0;
                Object.entries(jobScores).forEach(([job, score]) => {
                    if (score > bestScore) {
                        bestScore = score;
                        bestJob = job;
                    }
                });

                return bestJob;
            }

            // Nom du métier en français
            getJobName() {
                const names = {
                    [JOB.GATHERER]: 'Collecteur',
                    [JOB.FARMER]: 'Fermier',
                    [JOB.BUILDER]: 'Constructeur',
                    [JOB.WARRIOR]: 'Guerrier',
                    [JOB.HUNTER]: 'Chasseur',
                    [JOB.FISHER]: 'Pêcheur',
                    [JOB.BREEDER]: this.currentAge < 16 ? 'Enfant' : 'Ancien'
                };
                return names[this.job] || 'Villageois';
            }

            // Promouvoir en unité militaire
            promote(unitType) {
                this.unitType = unitType;
                const stats = COMBAT_STATS[unitType];
                const factionConfig = this.factionType === 'human' ? FACTIONS.HUMAN : FACTIONS.ELF;

                this.combatStats = {
                    attack: stats.attack * (stats.range > 1 ? factionConfig.traits.rangeBonus : factionConfig.traits.meleeBonus),
                    defense: stats.defense * factionConfig.traits.defenseBonus,
                    range: stats.range * (this.factionType === 'elf' ? 1.3 : 1),  // Elfes: +30% portée
                    health: 100 + (unitType === UNIT_TYPE.SOLDIER ? 50 : 0),
                    maxHealth: 100 + (unitType === UNIT_TYPE.SOLDIER ? 50 : 0)
                };
            }

            // Recevoir des dégâts
            takeDamage(amount, source = 'unknown') {
                if (!this.isAlive) return;
                this.combatStats.health -= amount;
                if (this.combatStats.health <= 0) {
                    this.die(source);
                }
            }

            // Mort du villageois
            die(cause) {
                this.isAlive = false;
                this.deathCause = cause;
                // Notifier le conjoint
                if (this.spouse) {
                    this.spouse.spouse = null;
                }
            }

            // Vérifier la mort naturelle (vieillesse) avec variations réalistes
            checkNaturalDeath() {
                if (!this.isAlive) return;
                const ageConfig = CONFIG.maxAge[this.factionType] || { average: 70, min: 55, max: 90 };
                const age = this.currentAge;

                // Mort impossible avant l'âge minimum
                if (age < ageConfig.min) return;

                // Mort certaine à l'âge maximum
                if (age >= ageConfig.max) {
                    this.die('vieillesse');
                    return;
                }

                // Entre min et max : probabilité croissante
                // La probabilité augmente progressivement de min vers average, puis plus rapidement vers max
                const progressToAverage = (age - ageConfig.min) / (ageConfig.average - ageConfig.min);
                const progressToMax = (age - ageConfig.average) / (ageConfig.max - ageConfig.average);

                let deathChance;
                if (age < ageConfig.average) {
                    // Avant la moyenne : faible chance (0.01% à 0.1%)
                    deathChance = 0.0001 + progressToAverage * 0.0009;
                } else {
                    // Après la moyenne : chance croissante plus rapide (0.1% à 2%)
                    deathChance = 0.001 + progressToMax * 0.019;
                }

                deathChance *= CONFIG.gameSpeed;

                if (Math.random() < deathChance) {
                    this.die('vieillesse');
                }
            }

            // Gérer la faim
            updateHunger(hasFood, famineResistance = 1) {
                if (!this.isAlive) return;
                if (!hasFood) {
                    // La résistance à la famine réduit la vitesse d'augmentation de la faim
                    this.hunger += CONFIG.gameSpeed * 0.5 / famineResistance;
                    if (this.hunger >= 100) {
                        this.die('famine');
                    } else if (this.hunger > 50) {
                        // Dégâts de faim (réduits par la résistance)
                        this.takeDamage(CONFIG.starvationDamage * CONFIG.gameSpeed * 0.01 / famineResistance, 'famine');
                    }
                } else {
                    // Récupération si nourri
                    this.hunger = Math.max(0, this.hunger - CONFIG.gameSpeed * 0.3);
                    // Régénération lente de la santé si bien nourri
                    if (this.hunger < 20 && this.combatStats.health < this.combatStats.maxHealth) {
                        this.combatStats.health = Math.min(
                            this.combatStats.maxHealth,
                            this.combatStats.health + CONFIG.gameSpeed * 0.05
                        );
                    }
                }
            }

            // Trouver l'ennemi le plus proche
            findNearestEnemy(allFactions) {
                if (!this.isAlive) return null;
                let nearestEnemy = null;
                let nearestDist = Infinity;
                const detectionRange = this.unitType === UNIT_TYPE.VILLAGER ? 5 : 10;

                allFactions.forEach(faction => {
                    if (faction.id === this.factionId) return; // Pas notre faction

                    faction.villagers.forEach(enemy => {
                        if (!enemy.isAlive) return;
                        const dx = enemy.x - this.x;
                        const dy = enemy.y - this.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);

                        if (dist < detectionRange && dist < nearestDist) {
                            nearestDist = dist;
                            nearestEnemy = enemy;
                        }
                    });
                });

                return nearestEnemy ? { enemy: nearestEnemy, distance: nearestDist } : null;
            }

            // Attaquer un ennemi
            attack(target) {
                if (!this.isAlive || !target || !target.isAlive) return;

                const dx = target.x - this.x;
                const dy = target.y - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                // Vérifier si à portée
                if (dist > this.combatStats.range + 1) return;

                // Calculer les dégâts
                const baseDamage = this.combatStats.attack;
                const defense = target.combatStats.defense;
                const damage = Math.max(1, baseDamage - defense * 0.5) * 0.1 * CONFIG.gameSpeed;

                target.takeDamage(damage, 'combat');

                // Améliorer la compétence de combat
                if (this.combatStats.range > 1) {
                    this.skills.archery = Math.min(100, this.skills.archery + 0.05);
                } else {
                    this.skills.combat = Math.min(100, this.skills.combat + 0.05);
                }
            }

            // Comportement de combat
            handleCombat(allFactions, gameMap) {
                if (!this.isAlive) return false;

                const enemyInfo = this.findNearestEnemy(allFactions);
                if (!enemyInfo) return false;

                const { enemy, distance } = enemyInfo;

                // Comportement selon le type d'unité
                if (this.unitType === UNIT_TYPE.VILLAGER) {
                    // Villageois: fuir si ennemi proche, sauf si compétence combat haute
                    if (this.skills.combat < 50) {
                        // Fuir!
                        const dx = this.x - enemy.x;
                        const dy = this.y - enemy.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist > 0) {
                            const fleeX = this.x + (dx / dist) * 3;
                            const fleeY = this.y + (dy / dist) * 3;
                            if (gameMap.isWalkable(Math.floor(fleeX), Math.floor(fleeY))) {
                                this.targetX = fleeX;
                                this.targetY = fleeY;
                            }
                        }
                        return true;
                    }
                }
