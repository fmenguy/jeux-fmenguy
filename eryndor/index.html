                                    const damage = towerDamage * (building.type === BUILDING.TOWER ? 1.5 : 1);
                                    enemy.takeDamage(damage, 'tower');
                                }
                            }
                        });
                    });
                });
            }

            // Système de commerce: utiliser l'or pour acheter des ressources
            handleTrade() {
                // Seulement commercer de temps en temps
                if (Math.random() > 0.005 * CONFIG.gameSpeed) return;

                const goldThreshold = 50; // Minimum d'or pour commercer
                const tradeCost = 20; // Coût en or

                if (this.resources.gold < goldThreshold) return;

                // Priorité: acheter ce qui manque le plus
                const needs = [
                    { resource: 'food', threshold: 30, amount: 25, priority: this.resources.food < 30 ? 3 : 0 },
                    { resource: 'wood', threshold: 50, amount: 30, priority: this.resources.wood < 50 ? 2 : 0 },
                    { resource: 'stone', threshold: 30, amount: 20, priority: this.resources.stone < 30 ? 1 : 0 },
                    { resource: 'iron', threshold: 20, amount: 15, priority: this.resources.iron < 20 ? 1 : 0 }
                ];

                // Trier par priorité
                needs.sort((a, b) => b.priority - a.priority);

                // Acheter la ressource la plus nécessaire
                const mostNeeded = needs[0];
                if (mostNeeded.priority > 0 && this.resources[mostNeeded.resource] < mostNeeded.threshold) {
                    this.resources.gold -= tradeCost;
                    this.resources[mostNeeded.resource] += mostNeeded.amount;
                }
                // Si on a assez de tout, utiliser l'or pour booster la recherche
                else if (this.currentResearch && this.resources.gold > 100) {
                    this.resources.gold -= 10;
                    this.researchProgress += 5 * CONFIG.gameSpeed; // Bonus de recherche
                }
                // Ou pour recruter des mercenaires (améliorer les stats de combat)
                else if (this.resources.gold > 150 && Math.random() < 0.3) {
                    this.resources.gold -= 30;
                    // Bonus temporaire aux villageois existants
                    this.villagers.forEach(v => {
                        if (v.isAlive) {
                            v.combatStats.attack += 0.5;
                            v.combatStats.defense += 0.3;
                        }
                    });
                }
            }

            // Essayer de construire un port si les conditions sont remplies
            tryBuildPort(gameMap) {
                // Ne pas construire si on a déjà un port
                const hasPort = this.buildings.some(b => b.type === BUILDING.PORT);
                if (hasPort) {
                    // Si on a un port mais pas assez de bateaux, en construire
                    if (this.boats.length < 3 && this.resources.wood >= 80) {
                        const port = this.buildings.find(b => b.type === BUILDING.PORT);
                        if (port) {
                            const waterSpot = gameMap.findNearbyNavigableWater(port.x, port.y);
                            if (waterSpot) {
                                const boat = new Boat(this.id, waterSpot.x, waterSpot.y);
                                boat.portX = port.x;
                                boat.portY = port.y;
                                this.boats.push(boat);
                                this.resources.wood -= 80;
                            }
                        }
                    }
                    return;
                }

                // Chercher un emplacement valide pour un port
                if (this.resources.wood < 150 || this.resources.stone < 100) return;

                for (let y = 0; y < gameMap.height; y++) {
                    for (let x = 0; x < gameMap.width; x++) {
                        if (gameMap.canBuildPort(x, y, this.id)) {
                            // Construire le port
                            gameMap.buildings[y][x] = createBuilding(BUILDING.PORT, this.id);
                            this.buildings.push({ type: BUILDING.PORT, x, y });
                            this.resources.wood -= 150;
                            this.resources.stone -= 100;

                            // Créer le premier bateau de pêche
                            const waterSpot = gameMap.findNearbyNavigableWater(x, y);
                            if (waterSpot) {
                                const boat = new Boat(this.id, waterSpot.x, waterSpot.y);
                                boat.portX = x;
                                boat.portY = y;
                                this.boats.push(boat);
                            }

                            return;
                        }
                    }
                }
            }

            createNewVillager(gameMap, parent1 = null, parent2 = null) {
                const validPos = [];
                for (let y = 0; y < gameMap.height; y++) {
                    for (let x = 0; x < gameMap.width; x++) {
                        if (gameMap.territory[y][x] === this.id && gameMap.isWalkable(x, y)) {
                            validPos.push({ x, y });
                        }
                    }
                }

                if (validPos.length > 0) {
                    const pos = validPos[Math.floor(Math.random() * validPos.length)];
                    const villager = new Villager(this.id, this.type, pos.x, pos.y, parent1, parent2);
                    this.villagers.push(villager);
                    if (parent1) parent1.children.push(villager);
                    if (parent2) parent2.children.push(villager);
                }
            }

            // Système de mariage: villageois adultes célibataires peuvent se marier
            processMarriages() {
                const minMarriageAge = this.type === 'human' ? 18 : 30; // Elfes se marient plus tard
                const maxMarriageAge = this.type === 'human' ? 50 : 100;

                // Trouver les célibataires éligibles
                const eligibleMales = this.villagers.filter(v =>
                    v.isAlive && v.gender === 'male' && !v.spouse &&
                    v.currentAge >= minMarriageAge && v.currentAge <= maxMarriageAge
                );
                const eligibleFemales = this.villagers.filter(v =>
                    v.isAlive && v.gender === 'female' && !v.spouse &&
                    v.currentAge >= minMarriageAge && v.currentAge <= maxMarriageAge
                );

                // Marier aléatoirement (chance fortement augmentée)
                if (eligibleMales.length > 0 && eligibleFemales.length > 0) {
                    if (Math.random() < 0.03 * CONFIG.gameSpeed) {
                        const male = eligibleMales[Math.floor(Math.random() * eligibleMales.length)];
                        // Éviter les mariages entre frères/sœurs
                        const validFemales = eligibleFemales.filter(f => !this.areSiblings(male, f));

                        if (validFemales.length > 0) {
                            const female = validFemales[Math.floor(Math.random() * validFemales.length)];
                            male.spouse = female;
                            female.spouse = male;
                            // La femme prend le nom du mari
                            female.lastName = male.lastName;
                        }
                    }
                }
            }

            // Vérifie si deux villageois sont frères/sœurs
            areSiblings(v1, v2) {
                if (!v1.parent1 || !v2.parent1) return false;
                return (v1.parent1 === v2.parent1 || v1.parent1 === v2.parent2 ||
                    v1.parent2 === v2.parent1 || v1.parent2 === v2.parent2);
            }

            // Système de reproduction: femmes mariées peuvent avoir des enfants
            processReproduction(gameMap) {
                const minBirthAge = this.type === 'human' ? 18 : 30;
                const maxBirthAge = this.type === 'human' ? 45 : 100;

                // Trouver les femmes mariées en âge de procréer
                const fertileFemales = this.villagers.filter(v =>
                    v.isAlive && v.gender === 'female' && v.spouse && v.spouse.isAlive &&
                    v.currentAge >= minBirthAge && v.currentAge <= maxBirthAge
                );

                // Chance de naissance pour chaque couple (fortement augmentée)
                fertileFemales.forEach(female => {
                    // Moins de chances si déjà beaucoup d'enfants
                    const childrenCount = female.children.filter(c => c.isAlive).length;
                    const birthChance = Math.max(0.003, 0.015 - childrenCount * 0.002) * CONFIG.gameSpeed;

                    if (Math.random() < birthChance) {
                        // Vérifier qu'il y a de la place (maison)
                        const houseCount = this.buildings.filter(b => b.type === BUILDING.HOUSE).length;
                        const housingCapacity = 10 + houseCount * 5; // 10 de base + 5 par maison

                        if (this.villagers.length < housingCapacity) {
                            this.createNewVillager(gameMap, female, female.spouse);
                        }
                    }
                });
            }

            // Coûts d'entraînement par type d'unité
            getTrainingCost(unitType) {
                const costs = {
                    [UNIT_TYPE.SOLDIER]: { food: 50, iron: 30, duration: 200 },
                    [UNIT_TYPE.ARCHER]: { food: 40, wood: 20, duration: 180 },
                    [UNIT_TYPE.CAVALRY]: { food: 100, iron: 50, gold: 20, duration: 300 },
                    [UNIT_TYPE.SCOUT]: { food: 30, wood: 10, duration: 120 }
                };
                return costs[unitType] || { food: 30, duration: 100 };
            }

            // Vérifier si on peut entraîner un type d'unité
            canTrain(unitType) {
                // Vérifier les technologies requises
                if (unitType === UNIT_TYPE.ARCHER && !this.traits.archerUnlocked) return false;
                if (unitType === UNIT_TYPE.CAVALRY && !this.traits.cavalryUnlocked) return false;

                // Vérifier les bâtiments requis
                const hasBarracks = this.buildings.some(b => b.type === BUILDING.BARRACKS);
                const hasArcheryRange = this.buildings.some(b => b.type === BUILDING.ARCHERY_RANGE);

                if (unitType === UNIT_TYPE.SOLDIER || unitType === UNIT_TYPE.CAVALRY) {
                    if (!hasBarracks) return false;
                }
                if (unitType === UNIT_TYPE.ARCHER || unitType === UNIT_TYPE.SCOUT) {
                    if (!hasArcheryRange) return false;
                }

                // Vérifier les ressources
                const cost = this.getTrainingCost(unitType);
                for (const [resource, amount] of Object.entries(cost)) {
                    if (resource === 'duration') continue;
                    if ((this.resources[resource] || 0) < amount) return false;
                }

                return true;
            }

            // Commencer l'entraînement d'un villageois
            startTraining(villager, unitType) {
                if (!this.canTrain(unitType)) return false;
                if (villager.unitType !== UNIT_TYPE.VILLAGER) return false; // Déjà militaire

                const cost = this.getTrainingCost(unitType);

                // Déduire les ressources
                for (const [resource, amount] of Object.entries(cost)) {
                    if (resource === 'duration') continue;
                    this.resources[resource] -= amount;
                }

                // Ajouter à la file d'entraînement
                this.trainingQueue.push({
                    villagerId: villager.id,
                    targetType: unitType,
                    progress: 0,
                    duration: cost.duration
                });

                villager.currentTask = 'training';
                return true;
            }

            // Processus d'entraînement automatique
            processTraining() {
                // Mettre à jour la file d'entraînement
                this.trainingQueue = this.trainingQueue.filter(training => {
                    training.progress += CONFIG.gameSpeed;

                    if (training.progress >= training.duration) {
                        // Entraînement terminé: promouvoir le villageois
                        const villager = this.villagers.find(v => v.id === training.villagerId);
                        if (villager && villager.isAlive) {
                            villager.promote(training.targetType);
                            villager.currentTask = null;
                            this.militaryUnits++;
                        }
                        return false; // Retirer de la file
                    }
                    return true;
                });

                // IA: décider d'entraîner automatiquement des unités
                const aliveVillagers = this.villagers.filter(v => v.isAlive);
                const militaryRatio = this.militaryUnits / Math.max(1, aliveVillagers.length);

                // Vouloir au moins 20% de militaires, plus si en guerre
                const targetRatio = this.warState.isAtWar ? 0.4 : 0.2;

                if (militaryRatio < targetRatio && this.trainingQueue.length < 2) {
                    // Trouver un villageois à entraîner (préférer les guerriers)
                    const candidates = this.villagers.filter(v =>
                        v.isAlive && v.unitType === UNIT_TYPE.VILLAGER &&
                        v.currentAge >= 16 && v.currentAge <= 50 &&
                        v.currentTask !== 'training'
                    ).sort((a, b) => b.skills.combat - a.skills.combat);

                    if (candidates.length > 0 && Math.random() < 0.01 * CONFIG.gameSpeed) {
                        const candidate = candidates[0];

                        // Choisir le type d'unité selon la faction
                        let unitType;
                        if (this.type === 'human') {
                            // Humains: soldats et cavaliers
                            unitType = this.canTrain(UNIT_TYPE.CAVALRY) && Math.random() < 0.3
                                ? UNIT_TYPE.CAVALRY : UNIT_TYPE.SOLDIER;
                        } else {
                            // Elfes: archers et scouts
                            unitType = this.canTrain(UNIT_TYPE.ARCHER)
                                ? UNIT_TYPE.ARCHER : UNIT_TYPE.SCOUT;
                        }

                        this.startTraining(candidate, unitType);
                    }
                }
            }

            // Vérifier et gérer l'état de guerre
            processWarState(gameMap, allFactions) {
                // Trouver les factions ennemies adjacentes
                const adjacentEnemies = new Set();

                for (let y = 0; y < gameMap.height; y++) {
                    for (let x = 0; x < gameMap.width; x++) {
                        if (gameMap.territory[y][x] !== this.id) continue;

                        // Vérifier les voisins
                        const neighbors = [{ x: x - 1, y }, { x: x + 1, y }, { x, y: y - 1 }, { x, y: y + 1 }];
                        neighbors.forEach(n => {
                            if (n.x >= 0 && n.x < gameMap.width && n.y >= 0 && n.y < gameMap.height) {
                                const neighborTerritory = gameMap.territory[n.y][n.x];
                                if (neighborTerritory !== -1 && neighborTerritory !== this.id) {
                                    adjacentEnemies.add(neighborTerritory);
                                }
                            }
                        });
                    }
                }

                // Si pas en guerre mais territoire adjacent à un ennemi
                if (!this.warState.isAtWar && adjacentEnemies.size > 0) {
                    // Chance de déclarer la guerre (augmente avec le temps)
                    if (Math.random() < 0.0001 * CONFIG.gameSpeed) {
                        const enemyId = Array.from(adjacentEnemies)[0];
                        this.declareWar(enemyId, allFactions);
                    }
                }

                // Vérifier les conditions de fin de guerre
                if (this.warState.isAtWar) {
                    const enemy = allFactions.find(f => f.id === this.warState.enemyId);
                    if (!enemy) {
                        this.endWar('victory');
                        return;
                    }

                    // Vérifier si l'ennemi est vaincu (0 villageois ou château détruit)
                    const enemyVillagers = enemy.villagers.filter(v => v.isAlive);
                    const enemyCastle = enemy.buildings.find(b => b.type === BUILDING.CASTLE);

                    if (enemyVillagers.length === 0 || !enemyCastle) {
                        this.endWar('victory');
                        // Conquérir le territoire ennemi
                        this.conquerTerritory(gameMap, enemy);
                    }
                }
            }

            declareWar(enemyId, allFactions) {
                this.warState = {
                    isAtWar: true,
                    enemyId: enemyId,
                    warStartTick: CONFIG.currentTick
                };

                // L'ennemi est aussi en guerre avec nous
                const enemy = allFactions.find(f => f.id === enemyId);
                if (enemy) {
                    enemy.warState = {
                        isAtWar: true,
                        enemyId: this.id,
                        warStartTick: CONFIG.currentTick
                    };
                }
            }

            endWar(result) {
                this.warState = {
                    isAtWar: false,
                    enemyId: null,
                    warStartTick: 0
                };
            }

            // Conquérir le territoire d'un ennemi vaincu
            conquerTerritory(gameMap, enemy) {
                for (let y = 0; y < gameMap.height; y++) {
                    for (let x = 0; x < gameMap.width; x++) {
                        if (gameMap.territory[y][x] === enemy.id) {
                            gameMap.territory[y][x] = this.id;
                            this.territorySize++;

                            // Capturer les bâtiments
                            if (gameMap.buildings[y][x].faction === enemy.id) {
                                gameMap.buildings[y][x].faction = this.id;
                                const building = enemy.buildings.find(b => b.x === x && b.y === y);
                                if (building) {
                                    this.buildings.push(building);
                                    enemy.buildings = enemy.buildings.filter(b => b.x !== x || b.y !== y);
                                }
                            }
                        }
                    }
                }
            }

            // Étend le territoire uniquement à partir des constructions (maisons, fermes, routes, murs, etc.)
            expandTerritoryFromBuildings(gameMap) {
                const frontier = [];
                const buildingRadius = 3; // Rayon d'influence des bâtiments

                // Collecter les positions des bâtiments
                const buildingPositions = new Set();
                this.buildings.forEach(b => {
                    buildingPositions.add(`${b.x},${b.y}`);
                });

                // Chercher les cases à la frontière, adjacentes aux bâtiments
                for (let y = 0; y < gameMap.height; y++) {
                    for (let x = 0; x < gameMap.width; x++) {
                        if (gameMap.territory[y][x] === this.id) {
                            // Vérifier si cette case est proche d'un bâtiment
                            let nearBuilding = false;
                            for (const building of this.buildings) {
                                const dist = Math.abs(building.x - x) + Math.abs(building.y - y);
                                if (dist <= buildingRadius) {
                                    nearBuilding = true;
                                    break;
                                }
                            }

                            if (!nearBuilding) continue;

                            // Chercher les voisins non occupés
                            const neighbors = [
                                { x: x - 1, y }, { x: x + 1, y },
                                { x, y: y - 1 }, { x, y: y + 1 }
                            ];
                            neighbors.forEach(n => {
                                if (n.x >= 0 && n.x < gameMap.width && n.y >= 0 && n.y < gameMap.height) {
                                    if (gameMap.territory[n.y][n.x] === -1 && gameMap.isWalkable(n.x, n.y)) {
                                        frontier.push(n);
                                    }
                                }
                            });
                        }
                    }
                }

                if (frontier.length > 0) {
                    const cell = frontier[Math.floor(Math.random() * frontier.length)];
                    gameMap.territory[cell.y][cell.x] = this.id;
                    this.territorySize++;
                }
            }

            tryBuildSomething(gameMap) {
                const validLocations = [];
                const frontierLocations = [];

                for (let y = 0; y < gameMap.height; y++) {
                    for (let x = 0; x < gameMap.width; x++) {
                        if (gameMap.territory[y][x] === this.id && gameMap.isValidBuildLocation(x, y)) {
                            validLocations.push({ x, y });

                            // Vérifier si c'est une case frontière
                            const neighbors = [
                                { x: x - 1, y }, { x: x + 1, y },
                                { x, y: y - 1 }, { x, y: y + 1 }
                            ];
                            const isFrontier = neighbors.some(n => {
                                if (n.x < 0 || n.x >= gameMap.width || n.y < 0 || n.y >= gameMap.height) return true;
                                const neighborTerritory = gameMap.territory[n.y][n.x];
                                return neighborTerritory !== -1 && neighborTerritory !== this.id;
                            });
                            if (isFrontier) {
                                frontierLocations.push({ x, y });
                            }
                        }
                    }
                }

                if (validLocations.length === 0) return;

                // Comptage des bâtiments existants
                const houseCount = this.buildings.filter(b => b.type === BUILDING.HOUSE).length;
                const farmCount = this.buildings.filter(b => b.type === BUILDING.FARM).length;
                const watchtowerCount = this.buildings.filter(b => b.type === BUILDING.WATCHTOWER).length;
                const archeryCount = this.buildings.filter(b => b.type === BUILDING.ARCHERY_RANGE).length;
                const wallCount = this.buildings.filter(b => b.type === BUILDING.WALL).length;
                const towerCount = this.buildings.filter(b => b.type === BUILDING.TOWER).length;
                const roadCount = this.buildings.filter(b => b.type === BUILDING.ROAD).length;
                const barracksCount = this.buildings.filter(b => b.type === BUILDING.BARRACKS).length;
                const forgeCount = this.buildings.filter(b => b.type === BUILDING.FORGE).length;
                const marketCount = this.buildings.filter(b => b.type === BUILDING.MARKET).length;
                const granaryCount = this.buildings.filter(b => b.type === BUILDING.GRANARY).length;
                const aliveCount = this.villagers.filter(v => v.isAlive).length;

                // Décider quoi construire
                let buildType = BUILDING.HOUSE;
                let woodCost = 30;
                let stoneCost = 20;
                let ironCost = 0;
                let goldCost = 0;
                let loc = validLocations[Math.floor(Math.random() * validLocations.length)];

                // Priorité 0: FERMES si nourriture critique
                if (this.resources.food < aliveCount * 20 && farmCount < houseCount && this.resources.wood >= 40) {
                    buildType = BUILDING.FARM;
                    woodCost = 40;
                    stoneCost = 5;
                }
                // Priorité 1: Routes vers le château (plus fréquent)
                else if (roadCount < this.buildings.length * 0.4 && this.resources.stone >= 5 && Math.random() < 0.4) {
                    const roadLoc = this.findRoadLocation(gameMap);
                    if (roadLoc) {
                        buildType = BUILDING.ROAD;
                        woodCost = 2;
                        stoneCost = 5;
                        loc = roadLoc;
                    }
                }
                // Priorité 2: Murs aux frontières (même sans guerre, si masonry ou après 50 ans)
                else if ((this.traits.masonryUnlocked || CONFIG.currentTick > 25000) && frontierLocations.length > 0 && wallCount < frontierLocations.length * 0.5 && this.resources.stone >= 15 && Math.random() < 0.35) {
                    buildType = BUILDING.WALL;
                    woodCost = 5;
                    stoneCost = 15;
                    loc = frontierLocations[Math.floor(Math.random() * frontierLocations.length)];
                }
                // Priorité 3: Tours de défense (plus tôt, pas besoin de murs)
                else if (towerCount < Math.max(3, wallCount / 3) && this.resources.stone >= 40 && this.resources.iron >= 10 && Math.random() < 0.25) {
                    buildType = BUILDING.TOWER;
                    woodCost = 10;
                    stoneCost = 40;
                    ironCost = 10;
                    // Placer la tour près des murs ou aux frontières
                    const nearWallOrFrontier = validLocations.find(l => {
                        return this.buildings.some(b => b.type === BUILDING.WALL && Math.abs(b.x - l.x) <= 2 && Math.abs(b.y - l.y) <= 2);
                    }) || frontierLocations[Math.floor(Math.random() * frontierLocations.length)];
                    if (nearWallOrFrontier) loc = nearWallOrFrontier;
                }
                // Autres bâtiments
                else if (this.resources.wood >= 40 && this.resources.stone >= 20) {
                    const rand = Math.random();

                    // Fermes si besoin de nourriture
                    if (farmCount < Math.max(3, houseCount / 2) && rand < 0.25) {
                        buildType = BUILDING.FARM;
                        woodCost = 40;
                        stoneCost = 5;
                    }
                    // Greniers pour stocker la nourriture
                    else if (granaryCount < farmCount / 2 && this.resources.wood >= 70 && rand < 0.15) {
                        buildType = BUILDING.GRANARY;
                        woodCost = 70;
                        stoneCost = 30;
                    }
                    // Forges si technologie débloquée
                    else if (forgeCount < 3 && this.completedTechs.includes('ironWorking') && rand < 0.2) {
                        buildType = BUILDING.FORGE;
                        woodCost = 50;
                        stoneCost = 30;
                        ironCost = 10;
                    }
                    // Casernes
                    else if (barracksCount < 4 && rand < 0.2) {
                        buildType = BUILDING.BARRACKS;
                        woodCost = 60;
                        stoneCost = 40;
                        ironCost = 20;
                    }
                    // Marchés pour l'économie
                    else if (marketCount < 2 && this.resources.gold >= 30 && rand < 0.15) {
                        buildType = BUILDING.MARKET;
                        woodCost = 80;
                        stoneCost = 40;
                        goldCost = 30;
                    }
                    // Bâtiments spécifiques aux factions - LIMITES AUGMENTÉES
                    else if (this.type === 'human' && watchtowerCount < 8 && rand < 0.35 && this.resources.stone >= 60) {
                        buildType = BUILDING.WATCHTOWER;
                        stoneCost = 60;
                        woodCost = 40;
                    } else if (this.type === 'elf' && archeryCount < 8 && rand < 0.35 && this.resources.wood >= 60) {
                        buildType = BUILDING.ARCHERY_RANGE;
                        woodCost = 70;
                        stoneCost = 30;
                    }
                    // Maisons par défaut
                    else if (houseCount < aliveCount / 3 && rand < 0.3) {
                        buildType = BUILDING.HOUSE;
                        woodCost = 30;
                        stoneCost = 10;
                    }
                }

                // Vérifier si on a les ressources et construire
                if (this.resources.wood >= woodCost && this.resources.stone >= stoneCost &&
                    this.resources.iron >= ironCost && this.resources.gold >= goldCost) {
                    gameMap.buildings[loc.y][loc.x] = createBuilding(buildType, this.id);
                    this.buildings.push({ type: buildType, x: loc.x, y: loc.y });

                    this.resources.wood -= woodCost;
                    this.resources.stone -= stoneCost;
                    this.resources.iron -= ironCost;
                    this.resources.gold -= goldCost;

                    // Effets des bâtiments
                    if (buildType === BUILDING.HOUSE) this.maxPopulation += 5;
                    else if (buildType === BUILDING.FARM) this.production.food += 0.8; // Augmenté
                    else if (buildType === BUILDING.FORGE) this.production.iron += 0.5;
                    else if (buildType === BUILDING.WATCHTOWER) {
                        this.traits.defenseBonus = (this.traits.defenseBonus || 1) + 0.1;
                    } else if (buildType === BUILDING.ARCHERY_RANGE) {
                        this.traits.rangeBonus = (this.traits.rangeBonus || 1) + 0.1;
                    } else if (buildType === BUILDING.TOWER) {
                        this.traits.defenseBonus = (this.traits.defenseBonus || 1) + 0.15;
                    } else if (buildType === BUILDING.MARKET) {
                        this.traits.tradeBonus = (this.traits.tradeBonus || 1) + 0.2;
                    } else if (buildType === BUILDING.GRANARY) {
                        this.buildingBonuses.foodStorage += 200;
                        this.buildingBonuses.foodPreservation *= 0.95; // -5% perte
                    } else if (buildType === BUILDING.BARRACKS) {
                        this.traits.combatBonus = (this.traits.combatBonus || 1) + 0.1;
                    }

                    this.stats.buildingsConstructed++;
                }
            }

            // Trouve un bon emplacement pour une route (vers le château ou entre bâtiments)
            findRoadLocation(gameMap) {
                const castle = this.buildings.find(b => b.type === BUILDING.CASTLE);
                if (!castle) return null;

                // Trouver un bâtiment qui n'a pas de route vers le château
                const targetBuilding = this.buildings.find(b => {
                    if (b.type === BUILDING.ROAD || b.type === BUILDING.CASTLE || b.type === BUILDING.WALL) return false;
                    const dist = Math.abs(b.x - castle.x) + Math.abs(b.y - castle.y);
                    return dist > 3;
                });

                if (!targetBuilding) return null;

                // Trouver un point sur le chemin
                const dx = castle.x - targetBuilding.x;
                const dy = castle.y - targetBuilding.y;
                const steps = Math.max(Math.abs(dx), Math.abs(dy));
                if (steps === 0) return null;

                for (let i = 1; i < steps; i++) {
                    const x = Math.floor(targetBuilding.x + (dx / steps) * i);
                    const y = Math.floor(targetBuilding.y + (dy / steps) * i);

                    if (gameMap.territory[y] && gameMap.territory[y][x] === this.id &&
                        gameMap.buildings[y][x].type === BUILDING.NONE &&
                        gameMap.terrain[y][x] === TERRAIN.GRASS) {
                        return { x, y };
                    }
                }

                return null;
            }

            startNewResearch() {
                const allTechs = [];
                Object.values(TECH_TREE).forEach(category => {
                    category.techs.forEach(tech => {
                        if (!this.completedTechs.includes(tech.id) && this.resources.gold >= tech.cost * 0.5) {
                            allTechs.push(tech);
                        }
                    });
                });

                if (allTechs.length > 0) {
                    this.currentResearch = allTechs[Math.floor(Math.random() * allTechs.length)];
                    this.researchProgress = 0;
                    this.resources.gold -= this.currentResearch.cost * 0.3;
                }
            }

            completeTech() {
                if (this.currentResearch) {
                    this.completedTechs.push(this.currentResearch.id);
                    switch (this.currentResearch.id) {
                        // Économie - bonus aux compétences des villageois
                        case 'agriculture':
                            // +50% efficacité farming pour tous les villageois
                            this.traits.farmingBonus = (this.traits.farmingBonus || 1) * 1.5;
                            this.villagers.forEach(v => {
                                v.skills.farming = Math.min(100, v.skills.farming * 1.3);
                            });
                            break;
                        case 'mining':
                            // +50% efficacité collecte pierre/fer
                            this.traits.miningBonus = (this.traits.miningBonus || 1) * 1.5;
                            this.villagers.forEach(v => {
                                v.skills.gathering = Math.min(100, v.skills.gathering * 1.3);
                            });
                            break;
                        case 'trade':
                            // Commerce plus efficace, bonus d'or
                            this.traits.tradeBonus = (this.traits.tradeBonus || 1) * 2;
                            this.resources.gold += 50; // Bonus immédiat
                            break;

                        // Militaire
                        case 'ironWorking':
                            // Bonus d'attaque et défense pour tous les villageois
                            this.villagers.forEach(v => {
                                v.combatStats.attack *= 1.2;
                                v.combatStats.defense *= 1.15;
                            });
                            this.traits.ironWorkingBonus = true;
                            break;
                        case 'archery':
                            // +50% dégâts à distance, débloque ARCHER
                            this.traits.rangeBonus = (this.traits.rangeBonus || 1) * 1.5;
                            this.traits.archerUnlocked = true;
                            this.villagers.forEach(v => {
                                v.skills.archery = Math.min(100, v.skills.archery * 1.3);
                            });
                            break;
                        case 'cavalry':
                            // +50% vitesse, débloque CAVALRY
                            this.traits.cavalryBonus = (this.traits.cavalryBonus || 1) * 1.5;
                            this.traits.cavalryUnlocked = true;
                            break;

                        // Culture
                        case 'writing':
                            // +30% vitesse recherche
                            this.traits.researchSpeed = (this.traits.researchSpeed || 1) * 1.3;
                            break;
                        case 'philosophy':
                            // +20% résistance famine (moins de dégâts de faim)
                            this.traits.famineResistance = (this.traits.famineResistance || 1) * 1.2;
                            this.traits.researchSpeed = (this.traits.researchSpeed || 1) * 1.2;
                            break;
                        case 'masonry':
                            // Débloque WALL, +50% durabilité bâtiments, bonus construction
                            this.traits.buildSpeed = (this.traits.buildSpeed || 1) * 1.3;
                            this.traits.defenseBonus = (this.traits.defenseBonus || 1) * 1.5;
                            this.traits.masonryUnlocked = true;
                            break;
                    }
                    this.currentResearch = null;
                    this.researchProgress = 0;
                }
            }

            initializeTerritory(gameMap) {
                const radius = 6;
                for (let dy = -radius; dy <= radius; dy++) {
                    for (let dx = -radius; dx <= radius; dx++) {
                        const x = this.startX + dx;
                        const y = this.startY + dy;
                        if (x >= 0 && x < gameMap.width && y >= 0 && y < gameMap.height) {
                            const dist = Math.sqrt(dx * dx + dy * dy);
                            if (dist <= radius && gameMap.isWalkable(x, y)) {
                                gameMap.territory[y][x] = this.id;
                                this.territorySize++;
                            }
                        }
                    }
                }

                gameMap.buildings[this.startY][this.startX] = createBuilding(BUILDING.CASTLE, this.id);
                this.buildings.push({ type: BUILDING.CASTLE, x: this.startX, y: this.startY });

                // Ajouter 2 fermes initiales à côté du château
                const farmPositions = [
                    { x: this.startX + 2, y: this.startY + 1 },
                    { x: this.startX + 2, y: this.startY - 1 }
                ];
                farmPositions.forEach(pos => {
                    if (gameMap.isWalkable(pos.x, pos.y)) {
                        gameMap.buildings[pos.y][pos.x] = createBuilding(BUILDING.FARM, this.id);
                        this.buildings.push({ type: BUILDING.FARM, x: pos.x, y: pos.y });
                        this.production.food += 0.8;
                    }
                });

                // Ajouter 2 maisons initiales
                const housePositions = [
                    { x: this.startX - 2, y: this.startY + 1 },
                    { x: this.startX - 2, y: this.startY - 1 }
                ];
                housePositions.forEach(pos => {
                    if (gameMap.isWalkable(pos.x, pos.y)) {
                        gameMap.buildings[pos.y][pos.x] = createBuilding(BUILDING.HOUSE, this.id);
                        this.buildings.push({ type: BUILDING.HOUSE, x: pos.x, y: pos.y });
                        this.maxPopulation += 5;
                    }
                });

                // Commencer avec 12 villageois (au lieu de 8)
                for (let i = 0; i < 12; i++) {
                    this.createNewVillager(gameMap);
                }
            }
        }

        // ============================================
        // CLASSE GAME
        // ============================================
        class Game {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');

                this.gameMap = new GameMap(CONFIG.mapWidth, CONFIG.mapHeight);

                this.factions = [
                    new Faction(FACTIONS.HUMAN, 15, Math.floor(CONFIG.mapHeight / 2)),
                    new Faction(FACTIONS.ELF, CONFIG.mapWidth - 15, Math.floor(CONFIG.mapHeight / 2))
                ];

                this.factions.forEach(f => f.initializeTerritory(this.gameMap));

                this.selectedVillager = null;
                this.currentTool = 'select';
                this.brushSize = 1;
                this.isMouseDown = false;

                // Flags pour ne pas réafficher les alertes de population critique
                this.criticalAlertShown = { 0: false, 1: false };
                this.extinctionAlertShown = { 0: false, 1: false };

                this.resizeCanvas();
                this.setupControls();
                this.setupToolbar();
                this.gameLoop();
            }

            resizeCanvas() {
                const container = document.getElementById('canvasContainer');
                this.canvas.width = container.clientWidth;
                this.canvas.height = container.clientHeight;

                this.cellWidth = this.canvas.width / CONFIG.mapWidth;
                this.cellHeight = this.canvas.height / CONFIG.mapHeight;
                this.cellSize = Math.min(this.cellWidth, this.cellHeight);

                this.offsetX = (this.canvas.width - CONFIG.mapWidth * this.cellSize) / 2;
                this.offsetY = (this.canvas.height - CONFIG.mapHeight * this.cellSize) / 2;
            }

            setupControls() {
                document.getElementById('pauseBtn').addEventListener('click', () => {
                    CONFIG.isPaused = !CONFIG.isPaused;
                    document.getElementById('pauseBtn').textContent = CONFIG.isPaused ? '▶️' : '⏸️';
                });

                ['speed1', 'speed2', 'speed4', 'speed10', 'speed20'].forEach(id => {
                    document.getElementById(id).addEventListener('click', (e) => {
                        document.querySelectorAll('#timeControls .control-btn:not(#pauseBtn):not(.tech-btn):not(.save-btn)').forEach(btn => {
                            btn.classList.remove('active');
                        });
                        e.target.classList.add('active');
                        CONFIG.gameSpeed = parseInt(id.replace('speed', ''));
                    });
                });

                // Bouton Technologies
                document.getElementById('techBtn').addEventListener('click', () => {
                    this.openTechModal();
                });

                // Boutons Sauvegarde/Chargement
                const saveBtn = document.getElementById('saveBtn');
                const loadBtn = document.getElementById('loadBtn');

                if (saveBtn) {
                    saveBtn.addEventListener('click', () => saveGame(this));
                }
                if (loadBtn) {
                    loadBtn.addEventListener('click', () => loadGame(this));
                }

                // Actions divines (dans la toolbar)
                this.setupGodActions();

                this.canvas.addEventListener('mousedown', (e) => {
                    this.isMouseDown = true;
                    this.handleCanvasClick(e);
                });

                this.canvas.addEventListener('mousemove', (e) => {
                    if (this.isMouseDown && this.currentTool !== 'select') {
                        this.handleCanvasClick(e);
                    }
                });

                this.canvas.addEventListener('mouseup', () => {
                    this.isMouseDown = false;
                });

                this.canvas.addEventListener('mouseleave', () => {
                    this.isMouseDown = false;
                });

                window.addEventListener('resize', () => this.resizeCanvas());

                // Raccourcis clavier
                window.addEventListener('keydown', (e) => {
                    if (e.key === ' ') {
                        e.preventDefault();
                        CONFIG.isPaused = !CONFIG.isPaused;
                        document.getElementById('pauseBtn').textContent = CONFIG.isPaused ? '▶️' : '⏸️';
                    }
                    if (e.key === 's' && e.ctrlKey) {
                        e.preventDefault();
                        saveGame(this);
                    }
                    if (e.key === 'l' && e.ctrlKey) {
                        e.preventDefault();
                        loadGame(this);
                    }
                });
            }

            // Configure les actions divines
            setupGodActions() {
                const actions = {
                    'actionDisaster': () => {
                        const faction = this.factions[Math.floor(Math.random() * this.factions.length)];
                        const event = RANDOM_EVENTS.EARTHQUAKE;
                        const result = event.effect(faction, this.gameMap);
                        addNotification(`Catastrophe divine! ${result}`, 'danger', '🌋');
                    },
                    'actionBlessing': () => {
                        const faction = this.factions[Math.floor(Math.random() * this.factions.length)];
                        const event = RANDOM_EVENTS.BLESSING;
                        const result = event.effect(faction, this.gameMap);
                        addNotification(`Bénédiction divine! ${result}`, 'success', '✨');
                    },
                    'actionPlague': () => {
                        const faction = this.factions[Math.floor(Math.random() * this.factions.length)];
                        const event = RANDOM_EVENTS.EPIDEMIC;
                        const result = event.effect(faction, this.gameMap);
                        addNotification(`Peste divine! ${result}`, 'danger', '☠️');
                    },
                    'actionFertility': () => {
                        this.factions.forEach(faction => {
                            const event = RANDOM_EVENTS.MIGRATION;
                            event.effect(faction, this.gameMap);
                        });
                        addNotification('Fertilité divine! Nouvelles naissances partout!', 'success', '🌸');
                    }
                };

                    const btn = document.getElementById(id);

                        btn.addEventListener('click', action);

                });

            setupToolbar() {
                // Mode de sélection (villageois ou bâtiments)
                this.selectMode = 'villager'; // 'villager' ou 'building'

                document.querySelectorAll('.select-mode-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        document.querySelectorAll('.select-mode-btn').forEach(b => b.classList.remove('active'));
                        document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        this.selectMode = btn.dataset.select;
                        this.currentTool = 'select';
                        this.updateModeIndicator();
                    });
                });

                document.querySelectorAll('.tool-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
                        document.querySelectorAll('.select-mode-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        this.currentTool = btn.dataset.tool;
                        this.updateModeIndicator();
                    });
                });

                document.getElementById('brushSize').addEventListener('change', (e) => {
                    this.brushSize = parseInt(e.target.value) || 1;
                });

                // Initialiser l'indicateur de mode
                this.updateModeIndicator();

            updateModeIndicator() {
                const modeName = document.getElementById('modeName');
                const modeHint = document.getElementById('modeHint');

                if (this.currentTool === 'select') {
                    if (this.selectMode === 'villager') {
                        modeName.textContent = '👤 Mode Villageois';
                        modeHint.textContent = 'Cliquez sur un villageois';
                    } else {
                        modeName.textContent = '🏠 Mode Bâtiment';
                        modeHint.textContent = 'Cliquez sur un bâtiment ou terrain';
                    }
                } else {
                    const tool = TOOLS[this.currentTool];
                    if (tool) {
                        modeName.textContent = `${tool.icon} ${tool.name}`;
                        modeHint.textContent = tool.hint;
                    }
                }
            }

            handleCanvasClick(e) {
                const rect = this.canvas.getBoundingClientRect();
                const clickX = Math.floor((e.clientX - rect.left - this.offsetX) / this.cellSize);
                const clickY = Math.floor((e.clientY - rect.top - this.offsetY) / this.cellSize);

                if (clickX < 0 || clickX >= CONFIG.mapWidth || clickY < 0 || clickY >= CONFIG.mapHeight) return;

                if (this.currentTool === 'select') {
                    if (this.selectMode === 'villager') {
                        // Mode villageois: chercher uniquement les villageois
                        let closestVillager = null;
                        let closestDist = 2;

                        this.factions.forEach(faction => {
                            faction.villagers.forEach(villager => {
                                const dist = Math.sqrt(Math.pow(villager.x - clickX - 0.5, 2) + Math.pow(villager.y - clickY - 0.5, 2));
                                if (dist < closestDist) {
                                    closestDist = dist;
                                    closestVillager = villager;
                                }
                            });
                        });

                        if (closestVillager) {
                            this.showVillagerModal(closestVillager);
                        }
                    } else {
                        // Mode bâtiment: chercher bâtiments ou animaux ou terrain
                        const building = this.gameMap.buildings[clickY][clickX];
                        if (building && building.type !== BUILDING.NONE) {
                            this.showBuildingModal(building, clickX, clickY);
                        } else {
                            // Chercher un animal
                            const animal = this.findAnimalAt(clickX, clickY);
                            if (animal) {
                                this.showAnimalModal(animal);
                            } else {
                                // Sinon afficher info terrain
                                this.showTerrainModal(clickX, clickY);
                            }
                        }
                    }
                } else {
                    // Mode terraforming
                    const tool = TOOLS[this.currentTool];
                    if (tool && tool.terrain !== undefined) {
                        this.gameMap.setTerrain(clickX, clickY, tool.terrain, this.brushSize);
                    }
                }
            }

            findAnimalAt(x, y) {
                if (!this.gameMap.animals) return null;
                for (const animal of this.gameMap.animals) {
                    if (!animal.isAlive) continue;
                    const dx = Math.abs(animal.x - x - 0.5);
                    const dy = Math.abs(animal.y - y - 0.5);
                    if (dx < 1 && dy < 1) {
                        return animal;
                    }
                }
                return null;
            }

            checkRoadConnection(x, y) {
                // Vérifier si une route est adjacente à cette position (4 directions)
                const directions = [
                    { dx: 0, dy: -1 },  // haut
                    { dx: 0, dy: 1 },   // bas
                    { dx: -1, dy: 0 },  // gauche
                    { dx: 1, dy: 0 }    // droite
                ];

                for (const dir of directions) {
                    const nx = x + dir.dx;
                    const ny = y + dir.dy;

                    // Vérifier les limites
                    if (nx < 0 || nx >= CONFIG.MAP_WIDTH || ny < 0 || ny >= CONFIG.MAP_HEIGHT) continue;

                    const building = this.gameMap.buildings[ny][nx];
                    if (building && building.type === BUILDING.ROAD) {
                        return true;
                    }
                }
                return false;
            }

                        category.techs.forEach(tech => {
                            const done = faction.completedTechs.includes(tech.id);
                            const researching = faction.currentResearch?.id === tech.id;
                            const status = done ? 'completed' : researching ? 'researching' : 'locked';
                            const statusText = done ? '✓ Terminé' :
                                researching ? `⏳ ${Math.round(faction.researchProgress / tech.duration * 100)}%` :
                                    '🔒 Non recherché';

                            html += `<div class="tech-tree-node ${status}">
                        <div class="tech-tree-icon">${tech.icon}</div>
                        <div class="tech-tree-info">
                            <div class="tech-tree-name">${tech.name}</div>
                            <div class="tech-tree-effect">${techEffects[tech.id] || ''}</div>
                        </div>
                        <div class="tech-tree-status ${status}">${statusText}</div>
                    </div>`;
                        });

                        html += '</div>';
                    });
                    return html;
                };

                document.getElementById('humanTechTree').innerHTML = generateTechTreeHTML(this.factions[0]);
                document.getElementById('elfTechTree').innerHTML = generateTechTreeHTML(this.factions[1]);
            }

            getSkillName(skill) {
                const names = {
                    farming: '🌾 Agriculture',
                    building: '🏗️ Construction',
                    combat: '⚔️ Combat',
                    crafting: '🔨 Artisanat',
                    gathering: '🧺 Collecte',
                    archery: '🏹 Archerie',
                    research: '📚 Recherche'
                };
                return names[skill] || skill;
            }

            update() {
                if (CONFIG.isPaused) return;
                CONFIG.currentTick += CONFIG.gameSpeed;

                // === MISE À JOUR DES SAISONS ===
                updateMonth();

                // === MISE À JOUR DES FACTIONS ===
                this.factions.forEach(faction => faction.update(this.gameMap, this.factions));

                // === MISE À JOUR DES ANIMAUX ===
                if (this.gameMap.animals) {
                    this.gameMap.animals.forEach(animal => animal.update(this.gameMap, this.factions));
                    this.gameMap.animals = this.gameMap.animals.filter(a => a.isAlive);

                    // Reproduction/Respawn d'animaux
                    this.gameMap.spawnNewAnimals();
                }

                // === ÉVÉNEMENTS ALÉATOIRES ===
                triggerRandomEvent(this.factions, this.gameMap);

                // === RENAISSANCE DES FACTIONS ÉTEINTES ===
                checkFactionRebirth(this.factions, this.gameMap);

                // === ALERTES POPULATION CRITIQUE ===
                this.checkCriticalPopulation();

                // === AUTO-SAVE ===
                checkAutoSave(this);
            }

            // Vérifie les conditions de victoire
            checkVictoryConditions() {
                const totalCells = CONFIG.mapWidth * CONFIG.mapHeight;

                for (const faction of this.factions) {
                    // Victoire par domination territoriale
                    const territoryPercent = (faction.territorySize / totalCells) * 100;
                    if (territoryPercent >= CONFIG.victoryTerritoryPercent) {
                        this.showVictoryScreen(faction, 'domination',
                            `Contrôle ${Math.floor(territoryPercent)}% du territoire!`);
                        return;
                    }

                    // Victoire par population
                    const pop = faction.villagers.filter(v => v.isAlive).length;
                    if (pop >= CONFIG.victoryPopulation) {
                        this.showVictoryScreen(faction, 'démographie',
                            `Population de ${pop} villageois!`);
                        return;
                    }

                    // Victoire par élimination
                    const otherFactions = this.factions.filter(f => f.id !== faction.id);
                    const allOthersExtinct = otherFactions.every(f =>
                        f.villagers.filter(v => v.isAlive).length === 0
                    );
                    if (allOthersExtinct && faction.villagers.filter(v => v.isAlive).length > 0) {
                        // Attendre un peu avant de déclarer victoire (laisser chance de renaissance)
                        if (!this.extinctionTimer) {
                            this.extinctionTimer = CONFIG.currentTick;
                        } else if (CONFIG.currentTick - this.extinctionTimer > 2000) {
                            this.showVictoryScreen(faction, 'conquête',
                                `Toutes les autres factions ont été éliminées!`);
                            return;
                        }
                    } else {
                        this.extinctionTimer = null;
                    }
                }
            }

            // Affiche l'écran de victoire
            showVictoryScreen(faction, victoryType, description) {

                this.victoryShown = true;

                CONFIG.isPaused = true;
                document.getElementById('pauseBtn').textContent = '▶️';

                const factionName = faction.type === 'human' ? 'Humains' : 'Elfes';
                const factionColor = faction.color;

                const victoryDiv = document.createElement('div');
                victoryDiv.id = 'victoryScreen';
                victoryDiv.style.cssText = `
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            display: flex; align-items: center; justify-content: center;
            z-index: 10001;
        `;
                victoryDiv.innerHTML = `
            <div style="
                background: linear-gradient(135deg, ${factionColor}, #1a1a1a);
                padding: 50px 80px; border-radius: 20px;
                text-align: center; border: 4px solid ${factionColor};
                box-shadow: 0 0 50px ${factionColor};
            ">
                <div style="font-size: 60px; margin-bottom: 20px;">🏆</div>
                <div style="font-size: 36px; font-weight: bold; color: #ffd700; margin-bottom: 10px;">
                    VICTOIRE!
                </div>
                <div style="font-size: 28px; color: white; margin-bottom: 20px;">
                    Les ${factionName} triomphent!
                </div>
                <div style="font-size: 18px; color: #ccc; margin-bottom: 10px;">
                    Victoire par ${victoryType}
                </div>
                <div style="font-size: 16px; color: #aaa; margin-bottom: 30px;">
                    ${description}
                </div>
                <div style="
                    background: rgba(0,0,0,0.5); padding: 20px; border-radius: 10px;
                    margin-bottom: 30px; text-align: left; color: #ddd;
                ">
                    <div style="font-weight: bold; margin-bottom: 10px;">📊 Statistiques:</div>
                    <div>🏰 Territoire: ${faction.territorySize} cases</div>
                    <div>👥 Population max: ${faction.stats.peakPopulation}</div>
                    <div>🏗️ Bâtiments: ${faction.buildings.length}</div>
                    <div>🔬 Technologies: ${faction.completedTechs.length}</div>
                    <div>🏕️ Colonies: ${faction.colonies.length}</div>
                    <div>⚔️ Guerres gagnées: ${faction.stats.warsWon}</div>
                </div>
                <div style="display: flex; gap: 20px; justify-content: center;">
                    <button onclick="location.reload()" style="
                        padding: 15px 40px; font-size: 18px;
                        background: #4ade80; color: #000; border: none; border-radius: 10px;
                        cursor: pointer; font-weight: bold;
                    ">🔄 Nouvelle Partie</button>
                    <button onclick="this.parentElement.parentElement.parentElement.remove(); game.victoryShown = false;" style="
                        padding: 15px 40px; font-size: 18px;
                        background: ${factionColor}; color: #fff; border: none; border-radius: 10px;
                        cursor: pointer; font-weight: bold;
