<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eryndor : Duel d'IA</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <!-- Setup overlay : saisie clé API + choix modèles -->
    <div id="setupOverlay" class="setup-overlay"></div>

    <!-- Bannière victoire -->
    <div id="victoryBanner" class="victory-banner" style="display:none"></div>

    <div id="app">
        <div id="header">
            <h1>Eryndor</h1>
            <div class="header-center">
                <div class="date-display" id="dateDisplay">Janvier, An 1</div>
                <div class="speed-control">
                    <button class="btn btn-icon" id="pauseBtn" title="Pause (Espace)">⏸</button>
                    <input type="range" id="speedSlider" min="1" max="50" value="1" step="1">
                    <span class="speed-value" id="speedValue">x1</span>
                </div>
                <div class="turn-control">
                    <label for="turnIntervalInput">Tour tous les</label>
                    <input type="number" id="turnIntervalInput" min="100" max="1500" step="50" value="300" />
                    <span>cycles</span>
                </div>
            </div>
            <div class="header-controls">
                <button class="btn" id="stopDuelBtn">Stopper le duel</button>
                <button class="btn" id="techBtn">🔬 Tech</button>
                <button class="btn" id="statsBtn">📊 Stats</button>
                <button class="btn" id="helpBtn" title="Aide et légende">❔ Aide</button>
                <a class="hub-link" href="https://jeux.fmenguy.fr/" title="Retour à l'arcade">↩ arcade</a>
            </div>
        </div>

        <div id="leftPanel">
            <div class="panel-title human">Humains</div>
            <div id="humanInfo"></div>
        </div>

        <div id="canvasContainer">
            <canvas id="gameCanvas"></canvas>
            <canvas id="minimap"></canvas>
            <div id="tooltip" class="tooltip"></div>
        </div>

        <div id="rightPanel">
            <div class="panel-title elf">Elfes</div>
            <div id="elfInfo"></div>
        </div>

        <!-- Journal des agents en bas -->
        <div id="agentLog" class="agent-log"></div>
    </div>

    <!-- Event Log legacy -->
    <div id="eventLog" style="display:none"></div>

    <div id="modalOverlay" class="modal-overlay"></div>
    <div id="detailModal" class="modal">
        <div class="modal-header">
            <span class="modal-title" id="modalTitle">Détails</span>
            <button class="modal-close" id="modalClose">&times;</button>
        </div>
        <div class="modal-body" id="modalBody"></div>
    </div>
    <div id="techModal" class="modal" style="min-width:700px">
        <div class="modal-header">
            <span class="modal-title">🔬 Technologies</span>
            <button class="modal-close" id="techModalClose">&times;</button>
        </div>
        <div class="modal-body" id="techModalBody">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
                <div>
                    <div class="panel-title human" style="margin-bottom:12px">Humains</div>
                    <div id="humanTechTree"></div>
                </div>
                <div>
                    <div class="panel-title elf" style="margin-bottom:12px">Elfes</div>
                    <div id="elfTechTree"></div>
                </div>
            </div>
        </div>
    </div>
    <div id="statsModal" class="modal" style="min-width:600px">
        <div class="modal-header">
            <span class="modal-title">📊 Statistiques</span>
            <button class="modal-close" id="statsModalClose">&times;</button>
        </div>
        <div class="modal-body" id="statsModalBody">
            <div class="stats-grid" id="statsGrid"></div>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
