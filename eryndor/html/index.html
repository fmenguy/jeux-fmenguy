<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eryndor : L'Aube des Royaumes</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <div id="header">
            <h1>Eryndor</h1>
            <div class="header-center">
                <div class="date-display" id="dateDisplay">Janvier, An 1</div>
                <div class="speed-control">
                    <button class="btn btn-icon" id="pauseBtn" title="Pause (Espace)">⏸</button>
                    <input type="range" id="speedSlider" min="1" max="50" value="1" step="1">
                    <span class="speed-value" id="speedValue">x1</span>
                </div>
            </div>
            <div class="header-controls">
                <button class="btn" id="saveBtn" title="Sauvegarder (Ctrl+S)">💾 Sauver</button>
                <button class="btn" id="loadBtn" title="Charger (Ctrl+L)">📂 Charger</button>
                <button class="btn" id="techBtn">🔬 Tech</button>
                <button class="btn" id="statsBtn">📊 Stats</button>
            </div>
        </div>

        <!-- Left Panel - Humans -->
        <div id="leftPanel">
            <div class="panel-title human">Humains</div>
            <div id="humanInfo"></div>
        </div>

        <!-- Canvas -->
        <div id="canvasContainer">
            <canvas id="gameCanvas"></canvas>
            <canvas id="minimap"></canvas>
            <div id="tooltip" class="tooltip"></div>
        </div>

        <!-- Right Panel - Elves -->
        <div id="rightPanel">
            <div class="panel-title elf">Elfes</div>
            <div id="elfInfo"></div>
        </div>

        <!-- Toolbar -->
        <div id="toolbar">
            <div class="toolbar-section">
                <span class="toolbar-label">Sélection</span>
                <button class="btn btn-icon active" data-select="villager" title="Villageois">👤</button>
                <button class="btn btn-icon" data-select="building" title="Bâtiments">🏠</button>
            </div>
            <div class="toolbar-divider"></div>
            <div class="toolbar-section">
                <span class="toolbar-label">Terrain</span>
                <button class="tool-btn" data-tool="grass" title="Herbe">🌿</button>
                <button class="tool-btn" data-tool="forest" title="Forêt">🌲</button>
                <button class="tool-btn" data-tool="stone" title="Pierre">🪨</button>
                <button class="tool-btn" data-tool="iron" title="Fer">⛏</button>
                <button class="tool-btn" data-tool="gold" title="Or">💎</button>
                <button class="tool-btn" data-tool="berries" title="Baies">🫐</button>
                <button class="tool-btn" data-tool="water" title="Eau">💧</button>
                <button class="tool-btn" data-tool="mountain" title="Montagne">⛰</button>
            </div>
            <div class="toolbar-divider"></div>
            <div class="toolbar-section">
                <span class="toolbar-label">Taille</span>
                <input type="range" id="brushSize" min="1" max="5" value="1" style="width:60px">
            </div>
            <div style="flex:1"></div>
            <div class="toolbar-section">
                <span class="toolbar-label">Dieu</span>
                <button class="god-btn" id="actionDisaster" title="Catastrophe">🌋</button>
                <button class="god-btn" id="actionBlessing" title="Bénédiction">✨</button>
                <button class="god-btn" id="actionPlague" title="Peste">☠</button>
                <button class="god-btn" id="actionFertility" title="Fertilité">🌸</button>
            </div>
        </div>
    </div>

    <!-- Event Log -->
    <div id="eventLog" style="display:none"></div>

    <!-- Modal Overlay -->
    <div id="modalOverlay" class="modal-overlay"></div>

    <!-- Villager/Building Modal -->
    <div id="detailModal" class="modal">
        <div class="modal-header">
            <span class="modal-title" id="modalTitle">Détails</span>
            <button class="modal-close" id="modalClose">&times;</button>
        </div>
        <div class="modal-body" id="modalBody"></div>
    </div>

    <!-- Tech Modal -->
    <div id="techModal" class="modal" style="min-width:700px">
        <div class="modal-header">
            <span class="modal-title">🔬 Technologies</span>
            <button class="modal-close" id="techModalClose">&times;</button>
        </div>
        <div class="modal-body" id="techModalBody">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
                <div>
                    <div class="panel-title human" style="margin-bottom:12px">Humains</div>
                    <div id="humanTechTree"></div>
                </div>
                <div>
                    <div class="panel-title elf" style="margin-bottom:12px">Elfes</div>
                    <div id="elfTechTree"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Stats Modal -->
    <div id="statsModal" class="modal" style="min-width:600px">
        <div class="modal-header">
            <span class="modal-title">📊 Statistiques</span>
            <button class="modal-close" id="statsModalClose">&times;</button>
        </div>
        <div class="modal-body" id="statsModalBody">
            <div class="stats-grid" id="statsGrid"></div>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
