<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Strates, proto 4, designer et observer</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #0b0d12; overflow: hidden; font-family: system-ui, sans-serif; color: #f3ecdd; }
    #app { position: fixed; inset: 0; }

    #toolbar {
      position: fixed; left: 50%; transform: translateX(-50%); bottom: 18px;
      display: flex; gap: 8px;
      background: rgba(20, 24, 30, 0.7);
      padding: 8px 10px; border-radius: 12px;
      backdrop-filter: blur(8px);
      box-shadow: 0 4px 18px rgba(0,0,0,0.35);
      z-index: 10;
    }
    #toolbar button {
      background: rgba(60, 66, 78, 0.85);
      border: 1px solid rgba(255,255,255,0.08);
      color: #f3ecdd;
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      letter-spacing: 0.02em;
      transition: background 0.15s ease, border-color 0.15s ease;
    }
    #toolbar button:hover { background: rgba(90, 100, 116, 0.9); }
    #toolbar button.active {
      background: #c66a3a;
      border-color: #ffd98a;
      color: #fff;
    }
    #toolbar .sep { width: 1px; background: rgba(255,255,255,0.12); margin: 0 4px; }
    #toolbar label { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #c7b98c; padding: 0 6px; }

    #hud {
      position: fixed; left: 16px; top: 16px;
      background: rgba(20, 24, 30, 0.6);
      padding: 12px 16px; border-radius: 10px;
      backdrop-filter: blur(8px);
      font-size: 13px; line-height: 1.55;
      letter-spacing: 0.02em;
      pointer-events: none;
      max-width: 340px;
      z-index: 10;
    }
    #hud b { color: #ffd98a; }
    #hud .row { display: flex; justify-content: space-between; gap: 18px; }
    #hud .key { color: #c7b98c; }
    #hud .val { color: #fff; font-variant-numeric: tabular-nums; }

    #help {
      position: fixed; right: 16px; top: 16px;
      background: rgba(20, 24, 30, 0.55);
      padding: 10px 14px; border-radius: 10px;
      backdrop-filter: blur(6px);
      font-size: 12px; line-height: 1.5;
      max-width: 260px;
      color: #c7b98c;
      pointer-events: none;
      z-index: 10;
    }
    #help b { color: #ffd98a; }

    #loader {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      background: #0b0d12; color: #c7b98c; font-size: 14px; letter-spacing: 0.1em;
      z-index: 100;
    }
    #loader.hidden { display: none; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.161.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.161.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="loader">generation du monde...</div>
  <div id="app"></div>

  <div id="hud">
    <div><b>Strates</b>, proto 4 designer et observer</div>
    <div class="row"><span class="key">FPS</span><span class="val" id="fps">0</span></div>
    <div class="row"><span class="key">Jobs en attente</span><span class="val" id="jobs">0</span></div>
    <div class="row"><span class="key">Colons IDLE</span><span class="val" id="idle">0</span></div>
    <div class="row"><span class="key">Colons MOVING</span><span class="val" id="moving">0</span></div>
    <div class="row"><span class="key">Colons WORKING</span><span class="val" id="working">0</span></div>
    <div class="row"><span class="key">Colons qui parlent</span><span class="val" id="talking">0</span></div>
  </div>

  <div id="help">
    <div><b>Naviguer</b> clic gauche orbite, droit pan, molette zoom</div>
    <div><b>Designer Miner</b> peint des colonnes a miner</div>
    <div><b>Annuler</b> retire la designation</div>
  </div>

  <div id="toolbar">
    <button id="tool-nav" class="active" title="Naviguer">Naviguer</button>
    <button id="tool-mine" title="Designer Miner">Designer Miner</button>
    <button id="tool-cancel" title="Annuler">Annuler</button>
    <div class="sep"></div>
    <label>Pinceau</label>
    <button id="brush-1" class="active">1</button>
    <button id="brush-3">3</button>
    <button id="brush-5">5</button>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
