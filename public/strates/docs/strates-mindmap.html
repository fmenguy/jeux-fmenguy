<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root {
    --paper: #f4efe4;
    --paper-2: #ece4d1;
    --paper-3: #e3d9c2;
    --ink: #1f1a14;
    --ink-soft: #3a3026;
    --ink-faint: #7a6d5c;
    --rule: #c9bfa6;
    --fog: #d9cfb9;
    --accent-tech: #2f6b5a;        /* vert forêt */
    --accent-build: #b05a2c;       /* terracotta */
    --accent-comm: #3d5a99;        /* bleu encre */
    --accent-core: #8a5a2b;
    --accent-time: #6a4a8a;
    --accent-night: #1b2540;
    --accent-day: #d9a441;
    --wood: #8b5a2b;
    --stone: #6b6b68;
    --food: #9b7a2c;
    --hl: #d94a2c;
    --shadow: 0 1px 0 rgba(31,26,20,.08), 0 2px 6px rgba(31,26,20,.06);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--paper); color: var(--ink); font-family: 'Kalam', system-ui, sans-serif; }

  /* Paper texture */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(circle at 20% 10%, rgba(139,90,43,.06), transparent 40%),
      radial-gradient(circle at 80% 90%, rgba(61,90,153,.05), transparent 40%),
      repeating-linear-gradient(0deg, transparent 0 28px, rgba(31,26,20,.02) 28px 29px),
      repeating-linear-gradient(90deg, transparent 0 28px, rgba(31,26,20,.015) 28px 29px);
    pointer-events: none;
    z-index: 0;
  }

  #root { position: relative; z-index: 1; }

  /* Typography */
  .h-hand { font-family: 'Caveat', cursive; font-weight: 700; }
  .mono { font-family: 'JetBrains Mono', monospace; }

  /* Sketchy borders via filter=url(#squiggle) on inline SVGs or box with dashed */
  .sketch-box {
    border: 1.5px solid var(--ink);
    border-radius: 6px 10px 8px 12px / 10px 6px 12px 8px;
    background: var(--paper);
    box-shadow: var(--shadow), 2px 3px 0 rgba(31,26,20,.06);
    padding: 10px 12px;
    position: relative;
  }
  .sketch-box.tight { padding: 6px 9px; border-radius: 5px 8px 6px 9px / 8px 5px 9px 6px; }
  .sketch-box.dashed { border-style: dashed; }
  .sketch-box.ghost { opacity: .45; }

  /* Header */
  header.top {
    position: sticky; top: 0; z-index: 10;
    background: linear-gradient(180deg, var(--paper) 70%, rgba(244,239,228,.85));
    backdrop-filter: blur(4px);
    border-bottom: 1.5px solid var(--ink);
    padding: 14px 28px 10px;
  }
  .brandrow { display:flex; align-items: baseline; gap: 14px; flex-wrap: wrap; }
  .brand { font-family: 'Caveat', cursive; font-size: 40px; font-weight: 700; letter-spacing: .5px; line-height: 1; }
  .brand .strata { display: inline-block; }
  .brand .strata span { display:inline-block; }
  .sub { font-family: 'Kalam'; font-size: 14px; color: var(--ink-faint); }

  .tabs {
    display: flex; gap: 4px; margin-top: 10px; flex-wrap: wrap;
    align-items: flex-end;
  }
  .tab {
    font-family: 'Caveat', cursive; font-weight: 600; font-size: 22px;
    padding: 6px 14px 4px; cursor: pointer;
    border: 1.5px solid var(--ink); border-bottom: none;
    background: var(--paper-2); color: var(--ink-soft);
    border-radius: 10px 14px 0 0 / 14px 10px 0 0;
    transform: translateY(1.5px);
    transition: background .15s, transform .1s;
    user-select: none;
  }
  .tab:hover { background: var(--paper-3); }
  .tab.active { background: var(--paper); color: var(--ink); border-bottom: 1.5px solid var(--paper); transform: translateY(1.5px); font-weight: 700; }
  .tab .num { font-family: 'JetBrains Mono'; font-size: 12px; color: var(--ink-faint); margin-right: 6px; }

  /* Controls */
  .ctrlbar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-top: 8px; }
  .chip {
    font-family:'Kalam'; font-size: 13px; padding: 2px 10px;
    border:1.5px solid var(--ink); border-radius: 999px;
    background: var(--paper); cursor: pointer; user-select:none;
    display:inline-flex; align-items:center; gap: 6px;
  }
  .chip.on { background: var(--ink); color: var(--paper); }
  .chip .dot { width:8px; height:8px; border-radius: 50%; background: currentColor; display:inline-block; }

  /* Main frame */
  main { padding: 22px 28px 80px; }

  /* Ages grid */
  .ages-head {
    display: grid;
    grid-template-columns: 140px repeat(var(--n, 7), minmax(180px, 1fr));
    gap: 10px;
    align-items: end;
    margin-bottom: 4px;
  }
  .age-col-head { text-align: center; padding-bottom: 6px; border-bottom: 1.5px dashed var(--ink); }
  .age-col-head .roman { font-family:'Caveat'; font-size: 28px; font-weight: 700; line-height: 1; }
  .age-col-head .name { font-family:'Kalam'; font-size: 14px; color: var(--ink-soft); }
  .age-col-head.fog { color: var(--ink-faint); border-bottom-color: var(--rule); }
  .age-col-head.fog .roman { color: var(--ink-faint); }

  .row-head { font-family:'Caveat'; font-size: 22px; font-weight: 700; padding-top: 8px;
    writing-mode: vertical-rl; transform: rotate(180deg); text-align: center;
    border-right: 1.5px dashed var(--ink); }

  .row-head .sub { display:block; writing-mode: horizontal-tb; transform: none; font-family:'Kalam'; font-size: 11px; color: var(--ink-faint); margin-top: 4px; }

  /* Strata row */
  .strata-row {
    display: grid;
    grid-template-columns: 140px repeat(var(--n, 7), minmax(180px, 1fr));
    gap: 10px;
    padding: 10px 0;
    border-top: 1.5px solid var(--ink);
    position: relative;
  }
  .strata-row:first-of-type { border-top: none; }
  .strata-row.tech    { background: linear-gradient(90deg, rgba(47,107,90,.05), transparent 20%); }
  .strata-row.build   { background: linear-gradient(90deg, rgba(176,90,44,.05), transparent 20%); }
  .strata-row.comm    { background: linear-gradient(90deg, rgba(61,90,153,.05), transparent 20%); }

  .strata-label {
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    gap: 6px; padding: 8px 4px;
  }
  .strata-label .icon {
    width: 42px; height: 42px; border-radius: 50%;
    border: 1.5px solid var(--ink);
    display:grid; place-items:center;
    font-family:'Caveat'; font-weight: 700; font-size: 22px;
    background: var(--paper);
  }
  .strata-label .name { font-family:'Caveat'; font-size: 22px; font-weight: 700; line-height: 1; text-align: center; }
  .strata-label .tag { font-family:'JetBrains Mono'; font-size: 10px; color: var(--ink-faint); text-transform: uppercase; letter-spacing: 1px; }

  .tech  .icon { background: var(--accent-tech); color: var(--paper); border-color: var(--accent-tech); }
  .build .icon { background: var(--accent-build); color: var(--paper); border-color: var(--accent-build); }
  .comm  .icon { background: var(--accent-comm); color: var(--paper); border-color: var(--accent-comm); }

  /* Age cell */
  .age-cell {
    min-height: 110px;
    padding: 6px 4px;
    display: flex; flex-direction: column; gap: 6px;
    position: relative;
  }
  .age-cell.fog {
    position: relative;
  }
  .age-cell.fog::after {
    content: ''; position: absolute; inset: 0;
    background: repeating-linear-gradient(45deg, rgba(217,207,185,.7) 0 6px, rgba(217,207,185,.4) 6px 12px);
    border-radius: 6px;
    pointer-events: none;
  }
  .age-cell.fog .fog-label {
    position: absolute; inset: 0; display:grid; place-items:center;
    font-family:'Caveat'; font-size: 20px; color: var(--ink-faint);
    z-index: 2; pointer-events: none;
    transform: rotate(-4deg);
  }

  /* Node card */
  .node {
    background: var(--paper);
    border: 1.5px solid var(--ink);
    border-radius: 5px 9px 6px 10px / 9px 5px 10px 6px;
    padding: 5px 8px;
    font-size: 14px;
    line-height: 1.15;
    display: flex; align-items: center; gap: 6px;
    cursor: pointer;
    transition: transform .08s, box-shadow .08s, background .15s;
    box-shadow: 1px 2px 0 rgba(31,26,20,.06);
  }
  .node:hover { transform: translate(-1px, -1px); box-shadow: 2px 3px 0 rgba(31,26,20,.1); }
  .node .bullet {
    font-family:'Caveat'; font-size: 16px; font-weight:700;
    width: 18px; text-align: center; flex-shrink: 0;
  }
  .node .lbl { flex: 1; }
  .node .meta { font-family:'JetBrains Mono'; font-size: 10px; color: var(--ink-faint); }
  .node.tech  { border-left: 4px solid var(--accent-tech); }
  .node.build { border-left: 4px solid var(--accent-build); }
  .node.comm  { border-left: 4px solid var(--accent-comm); }
  .node.night { background: var(--accent-night); color: var(--paper); border-color: var(--accent-night); }
  .node.night .meta { color: rgba(244,239,228,.6); }
  .node.dimmed { opacity: .25; filter: grayscale(.6); }
  .node.chain-hl { background: #fff6c9; border-color: var(--hl); box-shadow: 0 0 0 2px rgba(217,74,44,.3); }
  .node.job-hl { background: #e6f2ec; border-color: var(--accent-tech); }

  /* Dep arrows container */
  .deps-svg { position: absolute; inset: 0; pointer-events: none; z-index: 3; }

  /* Two column splits */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }

  /* Section heading */
  h2.sec { font-family:'Caveat'; font-weight:700; font-size: 34px; margin: 0 0 4px; line-height: 1; }
  h2.sec .n { font-family:'JetBrains Mono'; font-size: 14px; color: var(--ink-faint); margin-right: 8px; vertical-align: middle; }
  .sec-desc { font-family:'Kalam'; color: var(--ink-soft); font-size: 14px; margin: 0 0 16px; max-width: 820px; }

  .pill {
    display: inline-block; padding: 1px 8px; border: 1.5px solid var(--ink);
    border-radius: 999px; font-family:'JetBrains Mono'; font-size: 10px; text-transform: uppercase; letter-spacing: 1px;
    background: var(--paper);
  }
  .pill.tech  { border-color: var(--accent-tech); color: var(--accent-tech); }
  .pill.build { border-color: var(--accent-build); color: var(--accent-build); }
  .pill.comm  { border-color: var(--accent-comm); color: var(--accent-comm); }
  .pill.core  { border-color: var(--accent-core); color: var(--accent-core); }
  .pill.night { background: var(--accent-night); color: var(--paper); border-color: var(--accent-night); }
  .pill.day   { background: var(--accent-day); color: var(--ink); border-color: var(--ink); }

  /* Chain track */
  .chain {
    display:flex; align-items:center; gap:8px; flex-wrap: wrap;
    padding: 10px 12px; border: 1.5px solid var(--ink); border-radius: 8px 12px 10px 14px / 12px 8px 14px 10px;
    background: var(--paper);
    margin-bottom: 12px;
    cursor: pointer;
  }
  .chain:hover { background: #fff6c9; }
  .chain .link { font-family:'Caveat'; font-size: 22px; }
  .chain .step {
    padding: 3px 9px; border: 1.5px solid var(--ink); border-radius: 4px 8px 5px 9px / 8px 4px 9px 5px;
    font-family:'Kalam'; font-size: 14px; background: var(--paper-2);
  }
  .chain .step.res  { background: #f1e7cf; }
  .chain .step.tech { background: #d9ebe3; }
  .chain .step.build{ background: #f1dcc9; }
  .chain .step.job  { background: #d9e0f1; }
  .chain .step.need { background: #f7dcd4; }
  .chain-title { font-family:'Caveat'; font-weight:700; font-size: 22px; margin: 0 0 8px; }
  .chain-title .ic { margin-right: 8px; }

  /* Villager card */
  .vill-card { padding: 14px; }
  .vill-state { display:flex; align-items:flex-start; gap: 10px; padding: 8px 0; border-bottom: 1px dashed var(--rule); }
  .vill-state:last-child { border-bottom: none; }
  .vill-state .icon { font-family:'Caveat'; font-size: 22px; width: 34px; text-align: center; }

  /* Day/Night toggle */
  .daynight {
    display: inline-flex; border: 1.5px solid var(--ink); border-radius: 999px; overflow: hidden;
    font-family:'Kalam'; font-size: 13px; cursor: pointer; user-select:none;
  }
  .daynight > div { padding: 3px 14px; }
  .daynight .d { background: var(--accent-day); }
  .daynight .n { background: var(--accent-night); color: var(--paper); }
  .daynight.night .d { background: var(--paper); }
  .daynight.night .n { background: var(--accent-night); color: var(--paper); }
  .daynight.day .d { background: var(--accent-day); color: var(--ink); }
  .daynight.day .n { background: var(--paper); color: var(--ink); }

  /* Season wheel */
  .season-wheel { width: 280px; height: 280px; margin: 0 auto; }

  /* Legend */
  .legend {
    display: flex; gap: 14px; flex-wrap: wrap; font-family:'Kalam'; font-size: 12px; color: var(--ink-soft);
    padding: 8px 12px; border: 1.5px dashed var(--ink); border-radius: 8px;
    background: var(--paper-2);
    margin-bottom: 14px;
  }
  .legend .item { display:inline-flex; align-items:center; gap: 6px; }
  .legend .sw { width: 14px; height: 14px; border: 1.5px solid var(--ink); border-radius: 3px; }

  /* small helpers */
  .muted { color: var(--ink-faint); }
  .nowrap { white-space: nowrap; }
  hr.wavy {
    border: none; height: 8px; background-image:
      radial-gradient(circle at 4px 4px, var(--ink) 1px, transparent 2px);
    background-size: 8px 8px; background-repeat: repeat-x; opacity: .3;
    margin: 18px 0;
  }

  /* Arrow deco in headers */
  .arrow-future {
    font-family:'Caveat'; font-size: 18px; color: var(--ink-faint);
    display:inline-flex; align-items:center; gap:6px;
  }

  /* Hand-drawn underline */
  .ul-hand {
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 10'><path d='M2 6 C 20 2, 40 9, 60 5 S 95 3, 98 7' stroke='%231f1a14' stroke-width='1.5' fill='none' stroke-linecap='round'/></svg>");
    background-repeat: no-repeat; background-position: 0 100%; background-size: 100% 6px;
    padding-bottom: 6px;
  }

  /* Tweaks panel */
  #tweaks {
    position: fixed; right: 18px; bottom: 18px; z-index: 50;
    width: 300px; background: var(--paper);
    border: 1.5px solid var(--ink);
    border-radius: 8px 14px 10px 16px / 14px 8px 16px 10px;
    box-shadow: 4px 6px 0 rgba(31,26,20,.1);
    padding: 12px 14px; display:none;
    font-family:'Kalam'; font-size: 13px;
  }
  #tweaks.open { display: block; }
  #tweaks h3 { font-family:'Caveat'; font-size: 22px; margin: 0 0 4px; }
  #tweaks .row { display:flex; justify-content: space-between; align-items:center; padding: 4px 0; }
  #tweaks label { cursor: pointer; }
  #tweaks select, #tweaks input[type=range] { font-family:'Kalam'; }

  /* POC gallery for dep styles */
  .poc-card { padding: 12px; min-height: 260px; position: relative; }
  .poc-card h4 { font-family:'Caveat'; font-size: 22px; margin: 0 0 6px; }

  /* Responsive */
  @media (max-width: 900px) {
    .ages-head, .strata-row { grid-template-columns: 110px repeat(var(--n,7), minmax(140px, 1fr)); }
    .grid-2 { grid-template-columns: 1fr; }
    .grid-3 { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>

<div id="pw-gate" style="position:fixed;inset:0;z-index:9999;background:#f4efe4;display:flex;align-items:center;justify-content:center;font-family:system-ui,sans-serif;">
  <div style="text-align:center;display:flex;flex-direction:column;gap:12px;align-items:center;">
    <div style="font-size:1.1rem;color:#3a3026;font-weight:500;">Accès privé</div>
    <input id="pw-input" type="password" placeholder="Mot de passe" autofocus
      style="padding:8px 14px;border:1px solid #c9bfa6;border-radius:6px;font-size:1rem;background:#fff;outline:none;width:200px;">
    <div id="pw-error" style="color:#a63d3d;font-size:0.85rem;min-height:1.2em;"></div>
  </div>
</div>
<script>
  (function(){
    var gate = document.getElementById('pw-gate');
    var input = document.getElementById('pw-input');
    var error = document.getElementById('pw-error');
    function check() {
      if (input.value === 'mengmengf') { gate.remove(); }
      else { error.textContent = 'Mot de passe incorrect.'; input.value = ''; input.focus(); }
    }
    input.addEventListener('keydown', function(e){ if (e.key === 'Enter') check(); });
  })();
</script>

  <script type="text/babel" data-presets="react">
  /* ============================================================
     Strates — Mindmap de conception
     Document à onglets, low-fi sketchy
     ============================================================ */

  const DATA = JSON.parse(document.getElementById('game-data').textContent);
  const { useState, useMemo, useEffect, useRef } = React;

  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "revealAges": true,
    "orientation": "horizontal",
    "dayNight": "day"
  }/*EDITMODE-END*/;

  // ---- small helpers
  const cls = (...xs) => xs.filter(Boolean).join(' ');

  // ---- Top header with tabs
  function Header({ tab, setTab }) {
    const TABS = [
      ["overview",   "Vue d'ensemble"],
      ["trees",      "Les 3 arbres"],
      ["core",       "Systèmes core"],
      ["villagers",  "Villageois IA"],
      ["jobs",       "Métiers & chaînes"],
      ["time",       "Temps & saisons"],
      ["pocs",       "POCs dépendances"]
    ];
    return (
      <header className="top">
        <div className="brandrow">
          <div className="brand"><span className="strata">STRATES</span></div>
          <div className="sub">— mindmap de conception · jeu de colonisation voxel · v0.1</div>
        </div>
        <div className="tabs">
          {TABS.map(([id, name], i) => (
            <div key={id} className={cls('tab', tab===id && 'active')} onClick={()=>setTab(id)}>
              <span className="num">{String(i+1).padStart(2,'0')}</span>{name}
            </div>
          ))}
        </div>
      </header>
    );
  }

  // ---- AgeHeader row
  function AgeHeader({ revealAges, nVisible, n }) {
    return (
      <div className="ages-head" style={{ '--n': n }}>
        <div className="row-head" style={{ border: 'none' }}>
          <span className="h-hand" style={{ fontSize: 22 }}>arbres ↓</span>
          <span className="sub">âges →</span>
        </div>
        {DATA.ages.slice(0, n).map((a, i) => {
          const fog = !revealAges && i >= nVisible;
          return (
            <div key={i} className={cls('age-col-head', fog && 'fog')}>
              <div className="roman">Âge {a.roman}</div>
              <div className="name ul-hand">{a.name}</div>
              <div className="sub">{fog ? '≈ à découvrir' : a.era}</div>
            </div>
          );
        })}
      </div>
    );
  }

  // ---- Node card
  function Node({ kind, label, dimmed, highlighted, jobHl, night, onClick, small }) {
    const bullet = label[0].toUpperCase();
    return (
      <div
        className={cls('node', kind, dimmed && 'dimmed', highlighted && 'chain-hl', jobHl && 'job-hl', night && 'night')}
        onClick={onClick}
      >
        <span className="bullet">{bullet}</span>
        <span className="lbl">{label}</span>
      </div>
    );
  }

  // ---- Strata row (= one tree branch spanning all ages)
  function StrataRow({ treeKey, treeData, rowName, iconLetter, n, nVisible, revealAges, filter, activeChain, jobsMode }) {
    const rows = treeData[rowName] || [];
    const kind = treeKey;
    const dimBranch = filter && filter !== kind;
    const chainNodes = activeChain ? chainNodeSet(activeChain) : null;

    return (
      <div className={cls('strata-row', kind)}>
        <div className="strata-label">
          <div className="icon">{iconLetter}</div>
          <div className="name">{rowName}</div>
          <div className="tag">{kind}</div>
        </div>
        {Array.from({length: n}).map((_, ageIdx) => {
          const fog = !revealAges && ageIdx >= nVisible;
          const items = rows[ageIdx] || [];
          return (
            <div key={ageIdx} className={cls('age-cell', fog && 'fog')}>
              {items.map((it, j) => {
                const isNight = /\*/.test(it) || rowName.includes('nuit') || rowName.includes('Nocturne');
                const hl = chainNodes && chainNodes.has(normalize(it));
                return (
                  <Node key={j}
                    kind={kind}
                    label={it.replace(/\*$/,'').replace(/†$/,'')}
                    dimmed={dimBranch}
                    highlighted={hl}
                    night={isNight}
                  />
                );
              })}
              {fog && <div className="fog-label">?</div>}
            </div>
          );
        })}
      </div>
    );
  }

  // Normalize a label for chain match (very loose)
  function normalize(s) { return s.toLowerCase().replace(/[^a-zà-ú]/g,'').replace(/[éèê]/g,'e'); }
  function chainNodeSet(chain) {
    const set = new Set();
    chain.steps.forEach(s => set.add(normalize(s.l)));
    // seed with fuzzy keywords
    if (chain.key === 'bois')   ['bois','hachepierre','scierie','bricoleur','planches'].forEach(x=>set.add(x));
    if (chain.key === 'ble')    ['champdeble','moulin','boulangerie','boulanger'].forEach(x=>set.add(x));
    if (chain.key === 'chasse') ['chasseur','viande','peau','os'].forEach(x=>set.add(x));
    if (chain.key === 'metal')  ['foyer','forge','fonderie','forgeron','hachebronze','piochebronze','piochefer','piocheor'].forEach(x=>set.add(x));
    if (chain.key === 'mer')    ['eclaireur','cartographie','port','pecheur','navigation','portcommercial'].forEach(x=>set.add(x));
    if (chain.key === 'nuit')   ['promontoire','observatoire','grandtelescope','radiotelescope','astronome','portailorbital'].forEach(x=>set.add(x));
    return set;
  }

  // ---- Overview tab: the big strata diagram

  function SeasonWheel() {
    const seasons = [
      ['Printemps', 'plantation', 'var(--accent-tech)'],
      ['Été', 'récolte max', 'var(--accent-day)'],
      ['Automne', 'stockage', 'var(--accent-build)'],
      ['Hiver', 'survie', 'var(--accent-comm)']
    ];
    return (
      <svg viewBox="-150 -150 300 300" className="season-wheel">
        {seasons.map((s, i) => {
          const a0 = (i*90 - 45) * Math.PI/180;
          const a1 = (i*90 + 45) * Math.PI/180;
          const r = 120;
          const x0 = Math.cos(a0)*r, y0 = Math.sin(a0)*r;
          const x1 = Math.cos(a1)*r, y1 = Math.sin(a1)*r;
          const mx = Math.cos(i*90 * Math.PI/180) * 80;
          const my = Math.sin(i*90 * Math.PI/180) * 80;
          return (
            <g key={i}>
              <path d={`M 0 0 L ${x0} ${y0} A ${r} ${r} 0 0 1 ${x1} ${y1} Z`}
                    fill={s[2]} fillOpacity="0.18" stroke="#1f1a14" strokeWidth="1.5" />
              <text x={mx} y={my-4} textAnchor="middle" fontFamily="Caveat" fontSize="20" fontWeight="700">{s[0]}</text>
              <text x={mx} y={my+12} textAnchor="middle" fontFamily="Kalam" fontSize="11" fill="var(--ink-faint)">{s[1]}</text>
            </g>
          );
        })}
        <circle r="24" fill="var(--paper)" stroke="#1f1a14" strokeWidth="1.5"/>
        <text y="5" textAnchor="middle" fontFamily="Caveat" fontSize="18">an 1</text>
      </svg>
    );
  }

  // ---- Tweaks panel
  function TweaksPanel({ state, setState, open, setOpen }) {
    useEffect(() => {
      const onMsg = (e) => {
        if (!e.data) return;
        if (e.data.type === '__activate_edit_mode') setOpen(true);
        if (e.data.type === '__deactivate_edit_mode') setOpen(false);
      };
      window.addEventListener('message', onMsg);
      // announce after listener
      window.parent.postMessage({ type: '__edit_mode_available' }, '*');
      return () => window.removeEventListener('message', onMsg);
    }, []);
    return (
      <div id="tweaks" className={open ? 'open' : ''}>
        <h3>Tweaks</h3>
        <div className="muted" style={{ fontSize: 11, marginBottom: 8 }}>expérimente des modes de visualisation</div>

        <div className="row">
          <label><input type="checkbox" checked={state.revealAges}
            onChange={e=>{ setState(s=>({...s, revealAges: e.target.checked})); persist({ revealAges: e.target.checked }); }} /> Tout révéler les âges</label>
        </div>
        <div className="row">
          <label>Orientation</label>
          <select value={state.orientation} onChange={e=>{ setState(s=>({...s, orientation:e.target.value})); persist({orientation:e.target.value}); }}>
            <option value="horizontal">Horizontale →</option>
            <option value="vertical">Verticale ↓ (WIP)</option>
          </select>
        </div>
        <div className="row">
          <label>Cycle</label>
          <select value={state.dayNight} onChange={e=>{ setState(s=>({...s, dayNight:e.target.value})); persist({dayNight:e.target.value}); }}>
            <option value="day">☀ Jour</option>
            <option value="night">☾ Nuit</option>
          </select>
        </div>
        <hr style={{ border:'none', borderTop:'1.5px dashed var(--rule)', margin:'8px 0' }}/>
        <div className="row">
          <label>Filtre arbre</label>
          <select value={state.filter||''} onChange={e=>setState(s=>({...s, filter:e.target.value||null}))}>
            <option value="">Tout</option>
            <option value="tech">Technologie</option>
            <option value="build">Bâtiments</option>
            <option value="comm">Communauté</option>
          </select>
        </div>
        <div className="row">
          <label>Chaîne</label>
          <select value={state.activeChain?.key||''}
                  onChange={e=>{
                    const c = DATA.chains.find(x=>x.key===e.target.value);
                    setState(s=>({...s, activeChain: c || null}));
                  }}>
            <option value="">aucune</option>
            {DATA.chains.map(c => <option key={c.key} value={c.key}>{c.icon} {c.title}</option>)}
          </select>
        </div>
        <div className="row" style={{ marginTop: 6 }}>
          <small className="muted">toggle ces options depuis la barre en haut aussi</small>
        </div>
      </div>
    );
  }
  function persist(edits) {
    try { window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*'); } catch(e){}
  }

  // ---- App
  function App() {
    const stored = (() => { try { return JSON.parse(localStorage.getItem('strates-state')||'{}'); } catch { return {}; } })();
    const [tab, setTab] = useState(stored.tab || 'overview');
    const [state, setState] = useState({
      revealAges: TWEAK_DEFAULTS.revealAges,
      orientation: TWEAK_DEFAULTS.orientation,
      dayNight: TWEAK_DEFAULTS.dayNight,
      filter: null,
      activeChain: null
    });
    const [tweaksOpen, setTweaksOpen] = useState(false);

    useEffect(()=>{
      localStorage.setItem('strates-state', JSON.stringify({ tab }));
    }, [tab]);

    // If JobsTab asks to go to overview with a chain
    useEffect(()=>{
      if (state._goto) {
        setTab(state._goto);
        setState(s=>{ const x={...s}; delete x._goto; return x; });
      }
    }, [state._goto]);

    return (
      <>
        <Header tab={tab} setTab={setTab} />
        <main>
          {tab==='overview'  && <OverviewTab state={state} setState={setState}/>}
          {tab==='trees'     && <TreesTab    state={state} setState={setState}/>}
          {tab==='core'      && <CoreTab/>}
          {tab==='villagers' && <VillagersTab/>}
          {tab==='jobs'      && <JobsTab    state={state} setState={setState}/>}
          {tab==='time'      && <TimeTab    state={state} setState={setState}/>}
          {tab==='pocs'      && <PocsTab/>}
        </main>
        <TweaksPanel state={state} setState={setState} open={tweaksOpen} setOpen={setTweaksOpen} />
      </>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
