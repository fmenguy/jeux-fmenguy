<style>
  :root {
    --paper: #f4efe4; --paper-2: #ece4d1; --paper-3: #e3d9c2;
    --ink: #1f1a14; --ink-soft: #3a3026; --ink-faint: #7a6d5c;
    --rule: #c9bfa6; --hl: #d94a2c;
    --tech: #2f6b5a; --build: #b05a2c; --comm: #3d5a99;
    --done: #4a7d4a; --todo: #b0874a; --blocked: #a63d3d; --wip: #6a4a8a;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--paper); color: var(--ink); font-family: 'Kalam', system-ui, sans-serif; }
  body::before {
    content: ''; position: fixed; inset: 0;
    background:
      radial-gradient(circle at 20% 10%, rgba(139,90,43,.06), transparent 40%),
      radial-gradient(circle at 80% 90%, rgba(61,90,153,.05), transparent 40%),
      repeating-linear-gradient(0deg, transparent 0 28px, rgba(31,26,20,.02) 28px 29px),
      repeating-linear-gradient(90deg, transparent 0 28px, rgba(31,26,20,.015) 28px 29px);
    pointer-events: none; z-index: 0;
  }
  #root { position: relative; z-index: 1; }
  .h-hand { font-family: 'Caveat', cursive; font-weight: 700; }
  .mono { font-family: 'JetBrains Mono', monospace; }

  header.top {
    position: sticky; top: 0; z-index: 10;
    background: linear-gradient(180deg, var(--paper) 70%, rgba(244,239,228,.85));
    backdrop-filter: blur(4px);
    border-bottom: 1.5px solid var(--ink);
    padding: 14px 28px 10px;
  }
  .brandrow { display:flex; align-items: baseline; gap: 14px; flex-wrap: wrap; }
  .brand { font-family: 'Caveat', cursive; font-size: 40px; font-weight: 700; letter-spacing: .5px; line-height: 1; }
  .sub { font-family: 'Kalam'; font-size: 14px; color: var(--ink-faint); }
  .breadcrumb { font-family:'JetBrains Mono'; font-size: 11px; color: var(--ink-faint); text-transform: uppercase; letter-spacing: 1.5px; }
  .breadcrumb a { color: var(--comm); text-decoration: none; border-bottom: 1px dashed var(--comm); }
  .breadcrumb a:hover { color: var(--hl); border-color: var(--hl); }

  .tabs { display: flex; gap: 4px; margin-top: 10px; flex-wrap: wrap; align-items: flex-end; }
  .tab {
    font-family: 'Caveat', cursive; font-weight: 600; font-size: 22px;
    padding: 6px 14px 4px; cursor: pointer;
    border: 1.5px solid var(--ink); border-bottom: none;
    background: var(--paper-2); color: var(--ink-soft);
    border-radius: 10px 14px 0 0 / 14px 10px 0 0;
    transform: translateY(1.5px); user-select: none;
  }
  .tab:hover { background: var(--paper-3); }
  .tab.active { background: var(--paper); color: var(--ink); border-bottom: 1.5px solid var(--paper); font-weight: 700; }
  .tab .num { font-family: 'JetBrains Mono'; font-size: 12px; color: var(--ink-faint); margin-right: 6px; }

  main { padding: 22px 28px 80px; max-width: 1400px; margin: 0 auto; }

  h2.sec { font-family:'Caveat'; font-weight:700; font-size: 36px; margin: 0 0 4px; line-height: 1; }
  h2.sec .n { font-family:'JetBrains Mono'; font-size: 14px; color: var(--ink-faint); margin-right: 8px; vertical-align: middle; }
  h3.hh { font-family:'Caveat'; font-weight:700; font-size: 26px; margin: 18px 0 6px; }
  h4.hh { font-family:'Caveat'; font-weight:700; font-size: 22px; margin: 14px 0 4px; }
  .sec-desc { font-family:'Kalam'; color: var(--ink-soft); font-size: 14px; margin: 0 0 16px; max-width: 900px; }

  .sketch-box {
    border: 1.5px solid var(--ink);
    border-radius: 6px 10px 8px 12px / 10px 6px 12px 8px;
    background: var(--paper);
    box-shadow: 2px 3px 0 rgba(31,26,20,.06);
    padding: 14px 16px;
    position: relative;
  }
  .sketch-box.dashed { border-style: dashed; }
  .sketch-box.tight { padding: 10px 12px; border-radius: 5px 8px 6px 9px / 8px 5px 9px 6px; }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }

  .pill {
    display: inline-block; padding: 1px 8px; border: 1.5px solid var(--ink);
    border-radius: 999px; font-family:'JetBrains Mono'; font-size: 10px;
    text-transform: uppercase; letter-spacing: 1px; background: var(--paper);

  .pill.tech  { border-color: var(--tech); color: var(--tech); }
  .pill.build { border-color: var(--build); color: var(--build); }
  .pill.comm  { border-color: var(--comm); color: var(--comm); }
  .pill.done  { background: var(--done); color: var(--paper); border-color: var(--done); }
  .pill.todo  { background: var(--todo); color: var(--paper); border-color: var(--todo); }
  .pill.wip   { background: var(--wip); color: var(--paper); border-color: var(--wip); }
  .pill.blocked { background: var(--blocked); color: var(--paper); border-color: var(--blocked); }
  .pill.lotA { background: #d9ebe3; color: var(--tech); border-color: var(--tech); }
  .pill.lotB { background: #f1dcc9; color: var(--build); border-color: var(--build); }
  .pill.lotC { background: #d9e0f1; color: var(--comm); border-color: var(--comm); }
  .pill.lotD { background: #f1e7cf; color: #8a5a2b; border-color: #8a5a2b; }

  hr.wavy {
    border: none; height: 8px;
    background-image: radial-gradient(circle at 4px 4px, var(--ink) 1px, transparent 2px);
    background-size: 8px 8px; background-repeat: repeat-x; opacity: .3;
    margin: 22px 0;

  .chk { display:flex; gap: 8px; padding: 6px 0; border-bottom: 1px dashed var(--rule); align-items: flex-start; }
  .chk:last-child { border-bottom: none; }
  .chk .box {
    width: 20px; height: 20px; border: 1.5px solid var(--ink); border-radius: 4px;
    display:grid; place-items:center; font-family:'Caveat'; font-weight:700; font-size: 20px; flex-shrink: 0;
    background: var(--paper); margin-top: 1px;
  }
  .chk.done .box { background: var(--done); color: var(--paper); border-color: var(--done); }
  .chk.done .lbl { text-decoration: line-through; color: var(--ink-faint); }
  .chk.wip .box { background: var(--wip); color: var(--paper); border-color: var(--wip); }
  .chk.todo .box { background: var(--paper); }
  .chk.blocked .box { background: var(--blocked); color: var(--paper); border-color: var(--blocked); }

  .chk .lbl small { display: block; color: var(--ink-faint); font-size: 12px; margin-top: 2px; }

  .kv { display: grid; grid-template-columns: 130px 1fr; gap: 4px 10px; font-size: 13px; }
  .kv dt { font-family:'JetBrains Mono'; font-size: 11px; color: var(--ink-faint); text-transform: uppercase; letter-spacing: 1px; padding-top: 2px; }

  .ticket.lotA { border-left: 6px solid var(--tech); }
  .ticket.lotB { border-left: 6px solid var(--build); }
  .ticket.lotC { border-left: 6px solid var(--comm); }
  .ticket.lotD { border-left: 6px solid #8a5a2b; }

  .ticket .meta { font-size: 12px; color: var(--ink-faint); margin-bottom: 8px; }

  .code {
    font-family:'JetBrains Mono'; font-size: 12px; background: var(--paper-2);
    padding: 2px 6px; border: 1px solid var(--rule); border-radius: 4px;

  pre.code-block {
    font-family:'JetBrains Mono'; font-size: 12px; line-height: 1.5;
    background: #1f1a14; color: #e3d9c2; padding: 14px 16px;
    border-radius: 6px; overflow-x: auto; margin: 8px 0;
    border: 1.5px solid var(--ink);
  }
  pre.code-block .k { color: #8ac4a4; }
  pre.code-block .s { color: #d9a441; }
  pre.code-block .c { color: #7a6d5c; font-style: italic; }
  pre.code-block .n { color: #c48aa4; }

  .flow {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 10px; align-items: stretch;
  }
  .flow .step {
    padding: 10px 12px; border: 1.5px solid var(--ink);
    border-radius: 6px 10px 8px 12px / 10px 6px 12px 8px;
    background: var(--paper); position: relative;
    font-size: 13px;
  }
  .flow .step .idx { font-family:'Caveat'; font-size: 28px; font-weight:700; line-height: 1; color: var(--ink-faint); }
  .flow .step .t { font-family:'Caveat'; font-size: 20px; font-weight:700; margin: 2px 0; }

  table.t { width: 100%; border-collapse: collapse; font-size: 13px; }
  table.t th, table.t td { text-align: left; padding: 6px 10px; border-bottom: 1px dashed var(--rule); vertical-align: top; }
  table.t th { font-family:'JetBrains Mono'; font-size: 11px; color: var(--ink-faint); text-transform: uppercase; letter-spacing: 1px; border-bottom: 1.5px solid var(--ink); }
  table.t tr:last-child td { border-bottom: none; }

  .legend-inline { display:inline-flex; gap:10px; flex-wrap:wrap; font-size: 12px; color: var(--ink-soft); margin: 4px 0 12px; }
  .legend-inline .it { display:inline-flex; align-items:center; gap: 5px; }

  .callout {
    background: #fff6c9; border: 1.5px dashed var(--hl);
    padding: 12px 14px; border-radius: 6px;
    font-size: 14px; margin: 10px 0;
  }
  .callout .lbl { font-family:'Caveat'; font-weight: 700; font-size: 20px; color: var(--hl); display: block; margin-bottom: 4px; }

  .ul-hand {
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 10'><path d='M2 6 C 20 2, 40 9, 60 5 S 95 3, 98 7' stroke='%231f1a14' stroke-width='1.5' fill='none' stroke-linecap='round'/></svg>");
    background-repeat: no-repeat; background-position: 0 100%; background-size: 100% 6px;
    padding-bottom: 6px;
  }

  .arrow { font-family:'Caveat'; font-size: 22px; color: var(--ink-faint); margin: 0 6px; }

  .bar {
    height: 10px; background: var(--paper-2); border: 1.5px solid var(--ink);
    border-radius: 999px; overflow: hidden; margin: 4px 0;
  }
  .bar > div { height: 100%; background: var(--done); transition: width .3s; }

  .strate-card { padding: 14px; }
  .strate-card .head { display:flex; justify-content:space-between; align-items:baseline; margin-bottom: 6px; }
  .strate-card .head .t { font-family:'Caveat'; font-size: 24px; font-weight:700; }

  details.faq { padding: 10px 14px; border: 1.5px dashed var(--ink); border-radius: 6px; background: var(--paper); margin: 8px 0; }
  details.faq summary { font-family:'Caveat'; font-size: 20px; font-weight: 700; cursor: pointer; }
  details.faq[open] summary { margin-bottom: 8px; }

  @media (max-width: 900px) {
    .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
  }
</style>

function StatusPill({ s }) {
  const map = { done: 'LIVRÉ', partial: 'PARTIEL', todo: 'À FAIRE', later: 'REPOUSSÉ', blocked: 'BLOQUÉ', wip: 'EN COURS' };
  const cls2 = s === 'done' ? 'done' : s === 'partial' ? 'wip' : s === 'todo' ? 'todo' : s === 'later' ? '' : s === 'blocked' ? 'blocked' : 'wip';
  return <span className={cls('pill', cls2)}>{map[s] || s}</span>;
}

// ---------- App ---------- //
function App() {
  const stored = (() => { try { return JSON.parse(localStorage.getItem('pilotage-age1-state')||'{}'); } catch { return {}; } })();
  const [tab, setTab] = useState(stored.tab || 'overview');
  useEffect(()=>{ localStorage.setItem('pilotage-age1-state', JSON.stringify({ tab })); }, [tab]);

  return (
    <>
      <Header tab={tab} setTab={setTab}/>
      <main>
        {tab==='overview'   && <OverviewTab/>}
        {tab==='definition' && <DefinitionTab/>}
        {tab==='strates'    && <StratesTab/>}
        {tab==='quests'     && <QuestsTab/>}
        {tab==='contract'   && <ContractTab/>}
        {tab==='bronze'     && <BronzeTab/>}
        {tab==='order'      && <OrderTab/>}
        {tab==='later'      && <LaterTab/>}
        {tab==='advice'     && <AdviceTab/>}
      </main>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
