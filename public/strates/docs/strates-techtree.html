  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ols:#8a8078;\n  --br-agri:#b38a3a;\n  --br-build:#a56a34;\n  --br-know:#5a77b8;\n  --br-expl:#3f8a74;\n  --br-night:#6a7cb8;\n  --br-age:#d4b870;\n  --serif:\"Fraunces\",\"Iowan Old Style\",Georgia,serif;\n  --sans:\"Inter\",ui-sans-serif,system-ui,sans-serif;\n  --mono:\"JetBrains Mono\",ui-monospace,Menlo,monospace;\n}\n*{box-sizing:border-box}\nhtml,body{margin:0;padding:0;height:100%;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:13.5px;overflow:hidden}\n\n/* ============ TOPBAR ============ */\n.topbar{\n  position:fixed;top:0;left:0;right:0;height:54px;z-index:50;\n  background:linear-gradient(180deg,rgba(20,18,14,.98),rgba(20,18,14,.92));\n  border-bottom:1px solid var(--rule);\n  display:flex;align-items:center;padding:0 22px;gap:14px;backdrop-filter:blur(10px);\n}\n.topbar h1{margin:0;font-family:var(--serif);font-weight:500;font-size:18px}\n.topbar h1 small{font-family:var(--mono);font-size:10px;letter-spacing:.14em;color:var(--ink-3);text-transform:uppercase;margin-left:10px;font-weight:400}\n.crumb{display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:10px;letter-spacing:.14em;color:var(--ink-3);text-transform:uppercase}\n.crumb .sep{opacity:.5}\n.crumb .cur{color:var(--gold);font-family:var(--serif);font-size:13px;letter-spacing:0;text-transform:none;font-weight:500}\n.btn-back{display:none;align-items:center;gap:6px;padding:6px 12px;background:var(--panel-2);border:1px solid var(--rule);border-radius:3px;color:var(--ink-2);cursor:pointer;font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase}\n.btn-back:hover{color:var(--gold);border-color:var(--gold-2)}\nbody.detail-mode .btn-back{display:inline-flex}\n.age-pill{display:flex;align-items:center;gap:10px;padding:6px 14px;background:rgba(212,184,112,.08);border:1px solid rgba(212,184,112,.25);border-radius:100px;font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold)}\n.age-pill b{font-family:var(--serif);font-size:14px;font-weight:500;text-transform:none}\n.topbar .res{display:flex;gap:16px;margin-left:auto;align-items:center;font-family:var(--mono);font-size:11px;color:var(--ink-2)}\n.topbar .res b{font-family:var(--serif);font-size:15px;color:var(--ink);font-weight:500;margin-right:4px;font-variant-numeric:tabular-nums}\n.topbar .close{width:32px;height:32px;border:1px solid var(--rule);border-radius:3px;background:transparent;color:var(--ink-2);cursor:pointer;font-size:14px;margin-left:8px}\n\n/* ============ SEARCH (vue globale) ============ */\n.search-top{\n  position:fixed;top:72px;left:50%;transform:translateX(-50%);z-index:30;\n  display:flex;align-items:center;gap:8px;background:rgba(27,25,20,.92);backdrop-filter:blur(10px);\n  border:1px solid var(--rule);border-radius:100px;padding:8px 18px;min-width:340px;\n  transition:opacity .4s, transform .4s;\n}\n.search-top input{background:transparent;border:none;outline:none;color:var(--ink);font-family:var(--sans);font-size:13px;width:100%}\n.search-top input::placeholder{color:var(--ink-3)}\nbody.detail-mode .search-top{opacity:0;pointer-events:none;transform:translateX(-50%) translateY(-10px)}\n\n/* ============ STAGE ============ */\n.stage{\n  position:fixed;top:54px;left:0;right:0;bottom:0;\n  background:\n    radial-gradient(circle at 50% 48%, rgba(212,184,112,.09) 0%, transparent 55%),\n    radial-gradient(circle at 50% 48%, transparent 35%, rgba(0,0,0,.4) 80%),\n    var(--bg);\n  overflow:hidden;\n}\n.stage::before{\n  content:\"\";position:absolute;inset:0;pointer-events:none;\n  background-image:radial-gradient(circle at 1px 1px, rgba(212,184,112,.06) 1px, transparent 1px);\n  background-size:32px 32px;opacity:.35;\n}\n\n/* ============ CONSTELLATION (vue globale) ============ */\n.constellation{\n  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);\n  width:820px;height:820px;\n  transition:opacity .5s cubic-bezier(.2,.8,.3,1), transform .5s cubic-bezier(.2,.8,.3,1);\n  transform-origin:center;\n}\nbody.detail-mode .constellation{opacity:0;transform:translate(-50%,-50%) scale(1.6);pointer-events:none}\n\n.center{\n  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);\n  width:240px;height:240px;z-index:5;\n  display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;\n}\n.center .ring{position:absolute;inset:0;border-radius:50%;border:1px solid rgba(212,184,112,.3);background:radial-gradient(circle,rgba(212,184,112,.1) 0%,rgba(27,25,20,.9) 70%);box-shadow:0 0 80px rgba(212,184,112,.1), inset 0 0 40px rgba(212,184,112,.06)}\n.center .ring.r2{inset:-30px;border-color:rgba(212,184,112,.15);background:transparent;box-shadow:none}\n.center .ring.r3{inset:-60px;border-color:rgba(212,184,112,.08);background:transparent;box-shadow:none;border-style:dashed}\n.center .lbl{position:relative;font-family:var(--mono);font-size:10px;letter-spacing:.2em;color:var(--gold-2);text-transform:uppercase;margin-bottom:6px}\n.center .name{position:relative;font-family:var(--serif);font-size:44px;font-weight:500;color:var(--gold);letter-spacing:-.015em;line-height:1}\n.center .name em{font-style:italic}\n.center .sub{position:relative;font-family:var(--serif);font-size:13px;color:var(--ink-2);font-style:italic;margin-top:10px;max-width:180px;line-height:1.4}\n.center .progress{position:relative;margin-top:14px;display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:9.5px;letter-spacing:.12em;color:var(--ink-3);text-transform:uppercase}\n.center .progress b{font-family:var(--serif);font-size:15px;color:var(--ink);font-weight:500;font-variant-numeric:tabular-nums;letter-spacing:0}\n\n.branch{\n  position:absolute;width:180px;transform:translate(-50%,-50%);cursor:pointer;z-index:4;\n  transition:transform .2s cubic-bezier(.2,.8,.3,1);\n}\n.branch:hover{z-index:10;transform:translate(-50%,-50%) scale(1.04)}\n.branch .card{\n  background:linear-gradient(180deg,var(--panel-2),var(--panel));\n  border:1px solid var(--rule);border-radius:4px;padding:14px 14px 12px;position:relative;overflow:hidden;transition:all .15s;\n}\n.branch:hover .card{border-color:var(--bc);box-shadow:0 16px 40px rgba(0,0,0,.5), 0 0 24px color-mix(in srgb, var(--bc) 30%, transparent)}\n.branch .card::before{content:\"\";position:absolute;top:0;left:0;right:0;height:2px;background:var(--bc);opacity:.7}\n.branch .head{display:flex;align-items:center;gap:9px;margin-bottom:6px}\n.branch .emblem{width:30px;height:34px;flex-shrink:0;clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0 75%,0 25%);background:linear-gradient(180deg,var(--bc),color-mix(in srgb, var(--bc) 60%, #000));display:flex;align-items:center;justify-content:center;font-size:14px;color:#1a1510}\n.branch .nm{font-family:var(--serif);font-size:16px;font-weight:500;line-height:1;color:var(--ink)}\n.branch .count{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;color:var(--ink-3)}\n.branch .count b{font-family:var(--serif);font-weight:500;color:var(--ink);font-size:13px;font-variant-numeric:tabular-nums}\n.branch .bar{height:2.5px;background:rgba(0,0,0,.4);border-radius:2px;overflow:hidden;margin-top:6px}\n.branch .bar i{display:block;height:100%;background:var(--bc);border-radius:2px;width:var(--p,0%)}\n.branch .chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:9px}\n.branch .chips .chip{display:inline-flex;align-items:center;gap:3px;padding:2px 6px;font-family:var(--mono);font-size:9px;background:var(--panel-3);border:1px solid var(--rule);border-radius:2px;color:var(--ink-2);white-space:nowrap}\n.branch .chips .chip.done{color:var(--gold);border-color:rgba(212,184,112,.35);background:rgba(212,184,112,.05)}\n.branch .chips .chip.research{color:#a8bce0;border-color:rgba(90,119,184,.4);background:rgba(90,119,184,.08)}\n\n.spokes{position:absolute;inset:0;pointer-events:none;z-index:3;overflow:visible}\n.spokes line{stroke:var(--sc);stroke-width:1.2;stroke-dasharray:2 5;opacity:.55}\n\n.branch[data-br=\"tools\"]{--bc:var(--br-tools);--sc:var(--br-tools)}\n.branch[data-br=\"agri\"]{--bc:var(--br-agri);--sc:var(--br-agri)}\n.branch[data-br=\"build\"]{--bc:var(--br-build);--sc:var(--br-build)}\n.branch[data-br=\"know\"]{--bc:var(--br-know);--sc:var(--br-know)}\n.branch[data-br=\"expl\"]{--bc:var(--br-expl);--sc:var(--br-expl)}\n.branch[data-br=\"night\"]{--bc:var(--br-night);--sc:var(--br-night)}\n.branch[data-br=\"age\"]{--bc:var(--br-age);--sc:var(--br-age)}\n\n.branch.dimmed{opacity:.22;filter:saturate(.3)}\n\n.agerail{\n  position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:15;\n  display:flex;align-items:center;gap:2px;background:rgba(27,25,20,.9);backdrop-filter:blur(10px);\n  border:1px solid var(--rule);border-radius:100px;padding:6px 10px;\n  transition:opacity .4s;\n}\nbody.detail-mode .agerail{opacity:0;pointer-events:none}\n.agerail .dot{width:26px;height:26px;border-radius:50%;border:1px solid var(--rule);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:10px;color:var(--ink-3);cursor:pointer}\n.agerail .dot.active{border-color:var(--gold);color:var(--gold);background:rgba(212,184,112,.1);box-shadow:0 0 12px rgba(212,184,112,.25)}\n.agerail .dot.locked{opacity:.3;cursor:not-allowed}\n\n.filters-panel{\n  position:fixed;left:22px;bottom:22px;z-index:18;\n  background:rgba(27,25,20,.92);backdrop-filter:blur(10px);\n  border:1px solid var(--rule);border-radius:3px;padding:8px 10px;\n  display:flex;flex-direction:column;gap:4px;\n  transition:opacity .4s;\n}\nbody.detail-mode .filters-panel{opacity:0;pointer-events:none}\n.filters-panel .title{font-family:var(--mono);font-size:9px;letter-spacing:.18em;color:var(--ink-3);text-transform:uppercase;padding:2px 4px;margin-bottom:2px}\n.filter{padding:5px 10px;font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;background:transparent;border:1px solid transparent;color:var(--ink-2);border-radius:2px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:all .12s;text-align:left}\n.filter .sw{width:7px;height:7px;border-radius:50%}\n.filter:hover{color:var(--ink);background:rgba(212,184,112,.04)}\n.filter.off{opacity:.3}\n\n/* ============ BRANCH DETAIL VIEW ============ */\n.detail-view{\n  position:absolute;inset:0;opacity:0;pointer-events:none;\n  transition:opacity .4s cubic-bezier(.2,.8,.3,1) .15s;\n  display:flex;\n}\nbody.detail-mode .detail-view{opacity:1;pointer-events:auto}\n\n/* Left: canvas area */\n.branch-canvas-wrap{flex:1;position:relative;overflow:hidden;cursor:grab}\n.branch-canvas-wrap.dragging{cursor:grabbing}\n.branch-canvas{\n  position:absolute;transform-origin:0 0;transition:transform .4s cubic-bezier(.2,.8,.3,1);\n  will-change:transform;\n}\n.branch-canvas.dragging{transition:none}\n\n.branch-header{\n  position:absolute;top:30px;left:36px;z-index:2;pointer-events:none;max-width:420px;\n}\n.branch-header .el{display:flex;align-items:center;gap:14px}\n.branch-header .emblem{\n  width:56px;height:64px;\n  clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0 75%,0 25%);\n  background:linear-gradient(180deg,var(--vc),color-mix(in srgb, var(--vc) 60%, #000));\n  display:flex;align-items:center;justify-content:center;font-size:26px;color:#1a1510;\n}\n.branch-header .nm{font-family:var(--serif);font-weight:500;font-size:40px;line-height:1;letter-spacing:-.015em;color:var(--ink)}\n.branch-header .br{font-family:var(--mono);font-size:10px;letter-spacing:.18em;color:var(--vc);text-transform:uppercase;margin-top:4px}\n.branch-header .pitch{font-family:var(--serif);font-style:italic;font-size:14.5px;color:var(--ink-2);margin-top:12px;line-height:1.45;text-wrap:pretty}\n\n/* Age columns */\n.age-col{position:absolute;top:170px;bottom:40px}\n.age-col .ah{\n  position:absolute;top:-38px;left:0;right:0;text-align:center;\n  font-family:var(--mono);font-size:10px;letter-spacing:.2em;color:var(--ink-3);text-transform:uppercase;\n  padding-bottom:6px;border-bottom:1px dashed var(--rule);\n}\n.age-col .ah b{display:block;font-family:var(--serif);font-size:20px;color:var(--ink);font-weight:500;letter-spacing:-.01em;text-transform:none;margin-bottom:2px}\n.age-col.teased .ah b{color:var(--ink-3)}\n.age-col.teased{opacity:.55}\n.age-col.teased .ah{border-color:rgba(61,53,42,.4)}\n\n/* Tech nodes */\n.tech{\n  position:absolute;width:200px;height:110px;transform:translate(-50%,-50%);cursor:pointer;z-index:4;\n  transition:transform .15s;\n}\n.tech:hover{z-index:10}\n.tech .card{\n  position:relative;height:100%;background:linear-gradient(180deg,var(--panel-2),var(--panel));\n  border:1.5px solid var(--rule);border-radius:5px;padding:12px 14px;\n  transition:all .15s;overflow:hidden;\n}\n.tech:hover .card{transform:scale(1.03);border-color:var(--vc);box-shadow:0 12px 30px rgba(0,0,0,.5), 0 0 0 1px color-mix(in srgb, var(--vc) 50%, transparent)}\n.tech .row{display:flex;align-items:flex-start;gap:10px;margin-bottom:6px}\n.tech .ic{font-size:22px;line-height:1;flex-shrink:0}\n.tech .nm{font-family:var(--serif);font-size:14px;font-weight:500;line-height:1.15;color:var(--ink);text-wrap:balance}\n.tech .cost{display:flex;gap:8px;font-family:var(--mono);font-size:10px;color:var(--ink-3);margin-top:auto;position:absolute;bottom:10px;left:14px;right:14px;align-items:center}\n.tech .cost b{font-family:var(--serif);font-size:12px;color:var(--ink-2);font-weight:500;font-variant-numeric:tabular-nums}\n.tech .cross{margin-left:auto;font-family:var(--mono);font-size:9px;letter-spacing:.08em;color:var(--gold-2);display:inline-flex;align-items:center;gap:3px;padding:2px 6px;border:1px solid rgba(168,141,74,.35);border-radius:2px;background:rgba(212,184,112,.05);white-space:nowrap}\n.tech .lock{\n  position:absolute;top:8px;right:10px;display:flex;align-items:center;gap:4px;\n  font-family:var(--mono);font-size:10px;color:var(--ink-3);\n}\n.tech .lock b{font-family:var(--serif);font-size:12px;color:var(--ink-2);font-weight:500}\n.tech .check{position:absolute;top:8px;right:12px;color:var(--gold);font-family:var(--serif);font-size:16px;font-weight:500}\n.tech .progress-bar{position:absolute;bottom:0;left:0;right:0;height:3px;background:rgba(0,0,0,.4)}\n.tech .progress-bar i{display:block;height:100%;background:var(--state-progress,#e8c760);width:var(--p,0%);transition:width .3s}\n\n/* Tech states */\n.tech.done .card{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold), 0 0 22px rgba(212,184,112,.25);background:linear-gradient(180deg,rgba(212,184,112,.1),rgba(212,184,112,.02))}\n.tech.done .nm{color:var(--gold)}\n.tech.research .card{border-color:var(--vc);box-shadow:0 0 0 1px var(--vc), 0 0 22px color-mix(in srgb, var(--vc) 35%, transparent)}\n.tech.research::before{content:\"\";position:absolute;inset:-4px;border-radius:8px;border:1px solid var(--vc);opacity:0;animation:pulse 2.4s ease-in-out infinite;pointer-events:none}\n@keyframes pulse{0%{opacity:.6;transform:scale(1)}60%{opacity:0;transform:scale(1.04)}100%{opacity:0;transform:scale(1.04)}}\n.tech.progress .card{border-color:#e8c760;box-shadow:0 0 0 1px #e8c760, 0 0 22px rgba(232,199,96,.3)}\n.tech.locked{opacity:.55;filter:saturate(.5)}\n.tech.locked:hover{opacity:.85}\n.tech.locked.highlight{opacity:1;filter:none}\n.tech.req-highlight{z-index:12}\n.tech.req-highlight .card{\n  border-color:var(--gold);\n  box-shadow:0 0 0 2px var(--gold), 0 0 30px rgba(212,184,112,.5);\n  animation:reqpulse 1.2s ease-in-out infinite;\n}\n@keyframes reqpulse{0%,100%{box-shadow:0 0 0 2px var(--gold), 0 0 20px rgba(212,184,112,.3)}50%{box-shadow:0 0 0 2px var(--gold), 0 0 38px rgba(212,184,112,.7)}}\n.tech.faded{opacity:.15;filter:saturate(.3)}\n\n/* Orthogonal links (SVG) */\n.links{position:absolute;top:0;left:0;pointer-events:none;z-index:2;overflow:visible}\n.links path{fill:none;stroke-linecap:square;stroke-linejoin:miter}\n.link-line{stroke:var(--ink-3);stroke-width:1.4;opacity:.45}\n.link-line.done{stroke:var(--gold);stroke-width:1.8;opacity:.85}\n.link-line.req-hi{stroke:var(--gold);stroke-width:2.2;opacity:1;filter:drop-shadow(0 0 6px rgba(212,184,112,.6))}\n.link-corner{fill:var(--ink-3);opacity:.5}\n.link-corner.done{fill:var(--gold);opacity:.9}\n\n/* ============ RIGHT PANEL : DETAIL FICHE ============ */\n.fiche{\n  width:340px;flex-shrink:0;background:rgba(27,25,20,.96);backdrop-filter:blur(12px);\n  border-left:1px solid var(--rule);\n  display:flex;flex-direction:column;overflow:hidden;\n}\n.fiche-head{padding:18px 18px 14px;border-bottom:1px solid var(--rule);display:flex;gap:12px;align-items:flex-start;background:linear-gradient(180deg,color-mix(in srgb, var(--vc) 12%, transparent),transparent)}\n.fiche-head .ic{font-size:32px;line-height:1}\n.fiche-head h3{margin:0;font-family:var(--serif);font-size:20px;font-weight:500;line-height:1.15}\n.fiche-head .br{font-family:var(--mono);font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--vc);margin-top:5px}\n.fiche-body{flex:1;overflow-y:auto;padding:0}\n.fsec{padding:13px 18px;border-bottom:1px solid rgba(61,53,42,.5)}\n.fsec h5{margin:0 0 8px;font-family:var(--mono);font-size:9.5px;letter-spacing:.14em;color:var(--ink-3);text-transform:uppercase;font-weight:500}\n.cost-row{display:flex;gap:14px;font-family:var(--serif);font-size:15px}\n.cost-row .c{display:flex;align-items:center;gap:6px}\n.desc{font-family:var(--serif);font-size:13.5px;line-height:1.5;color:var(--ink-2);text-wrap:pretty;margin:0}\n.quote{font-family:var(--serif);font-style:italic;font-size:12.5px;color:var(--ink-2);line-height:1.45;padding:8px 12px;border-left:2px solid var(--gold-2);background:rgba(212,184,112,.04);margin:0}\n.quote::before{content:\"« \";color:var(--gold-2)}\n.quote::after{content:\" »\";color:var(--gold-2)}\n\n/* Req as mini cards */\n.req-grid{display:flex;flex-direction:column;gap:6px}\n.req-card{\n  display:flex;align-items:center;gap:10px;padding:8px 10px;\n  background:var(--panel-2);border:1px solid var(--rule);border-radius:3px;cursor:pointer;transition:all .12s;\n}\n.req-card:hover{border-color:var(--gold-2)}\n.req-card .chk{width:18px;height:18px;border-radius:50%;border:1px solid var(--rule);display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0}\n.req-card.ok .chk{background:var(--gold);border-color:var(--gold);color:#1a1510;font-weight:600}\n.req-card.ko .chk{color:var(--ink-3)}\n.req-card .tn{flex:1;font-family:var(--serif);font-size:13px;color:var(--ink)}\n.req-card .bn{font-family:var(--mono);font-size:9px;color:var(--ink-3);letter-spacing:.1em;text-transform:uppercase}\n.req-card.ko .tn{color:var(--ink-2)}\n\n.unlock-list{display:flex;flex-direction:column;gap:5px}\n.unlock-list .u{display:flex;gap:8px;color:var(--ink-2);font-size:12.5px;font-family:var(--serif)}\n.unlock-list .u .dot{color:var(--gold-2);width:12px;text-align:center}\n.unlock-list .u b{color:var(--ink);font-weight:500}\n\n.actions{padding:14px 18px;display:flex;flex-direction:column;gap:8px;border-top:1px solid var(--rule)}\n.btn{\n  width:100%;padding:11px;border-radius:3px;cursor:pointer;\n  font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;font-weight:500;\n  background:linear-gradient(180deg,var(--gold),var(--gold-2));border:1px solid var(--gold-2);color:#1a1510;transition:all .12s;\n}\n.btn:hover{filter:brightness(1.1)}\n.btn:disabled{background:var(--panel-2);border-color:var(--rule);color:var(--ink-3);cursor:not-allowed;filter:none}\n.btn.ghost{background:transparent;border:1px solid var(--rule);color:var(--ink-2)}\n.btn.ghost:hover{border-color:var(--gold-2);color:var(--gold)}\n.btn.done-btn{background:transparent;border:1px solid var(--gold-2);color:var(--gold)}\n\n/* ============ QUEUE — bottom bubble rail (Endless Space style) ============ */\n.queue{\n  position:fixed;bottom:18px;left:50%;transform:translateX(-50%);z-index:35;\n  display:flex;align-items:center;gap:12px;\n  background:rgba(20,18,14,.88);backdrop-filter:blur(12px);\n  border:1px solid var(--rule);border-radius:100px;\n  padding:8px 16px 8px 12px;\n  box-shadow:0 12px 32px rgba(0,0,0,.5);\n  transition:transform .35s cubic-bezier(.2,.8,.3,1), opacity .35s;\n}\nbody.detail-mode .agerail{opacity:0;pointer-events:none}\n.queue .qh{\n  display:flex;align-items:center;gap:8px;padding-right:10px;border-right:1px solid var(--rule);\n  font-family:var(--mono);font-size:9.5px;letter-spacing:.18em;color:var(--ink-3);text-transform:uppercase;\n}\n.queue .qh .hourglass{font-size:14px;color:var(--gold);line-height:1}\n.queue .qh b{font-family:var(--serif);font-size:12px;color:var(--ink);font-weight:500;letter-spacing:0;text-transform:none}\n.queue .qh .cnt{font-family:var(--mono);font-size:9.5px;color:var(--gold);padding:2px 7px;border:1px solid rgba(212,184,112,.3);border-radius:100px;letter-spacing:.08em}\n.qlist{\n  display:flex;align-items:center;gap:8px;min-height:52px;padding:0 4px;\n}\n.qempty{\n  font-family:var(--serif);font-size:12px;font-style:italic;color:var(--ink-3);\n  padding:0 14px;white-space:nowrap;\n}\n\n/* Bubbles */\n.qslot{\n  position:relative;width:54px;height:54px;flex-shrink:0;\n  display:flex;align-items:center;justify-content:center;\n  background:radial-gradient(circle at 30% 25%, var(--panel-3), var(--panel));\n  border:1.5px solid var(--rule);border-radius:50%;\n  cursor:grab;transition:transform .15s, border-color .15s, box-shadow .15s;\n}\n.qslot:hover{transform:translateY(-3px);border-color:var(--gold-2);box-shadow:0 6px 16px rgba(0,0,0,.5)}\n.qslot.dragging{opacity:.4;transform:scale(.9)}\n.qslot .ic{font-size:22px;line-height:1}\n.qslot .cost-pill{\n  position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);\n  background:var(--panel);border:1px solid var(--rule);border-radius:100px;\n  padding:2px 7px;font-family:var(--mono);font-size:10px;font-weight:600;color:var(--ink);\n  display:flex;align-items:center;gap:3px;line-height:1;white-space:nowrap;\n}\n.qslot .cost-pill .s{color:var(--gold);font-size:9px}\n.qslot .x{\n  position:absolute;top:-4px;right:-4px;\n  width:18px;height:18px;border-radius:50%;\n  background:#2a1a14;border:1px solid #c9442c;color:#c9442c;\n  cursor:pointer;font-size:10px;line-height:1;padding:0;\n  display:flex;align-items:center;justify-content:center;\n  opacity:0;transition:opacity .15s, background .15s;\n}\n.qslot:hover .x{opacity:1}\n.qslot .x:hover{background:#c9442c;color:#fff}\n.qslot .tip{\n  position:absolute;bottom:calc(100% + 10px);left:50%;transform:translateX(-50%);\n  background:var(--panel);border:1px solid var(--rule);border-radius:3px;\n  padding:6px 10px;font-family:var(--serif);font-size:12px;color:var(--ink);\n  white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;\n  box-shadow:0 6px 16px rgba(0,0,0,.4);\n}\n.qslot .tip::after{\n  content:\"\";position:absolute;top:100%;left:50%;transform:translateX(-50%);\n  border:5px solid transparent;border-top-color:var(--rule);\n}\n.qslot:hover .tip{opacity:1}\n.qslot.drop-before::before{content:\"\";position:absolute;left:-8px;top:8px;bottom:8px;width:2px;background:var(--gold);border-radius:2px;box-shadow:0 0 8px var(--gold)}\n.qslot.drop-after::after{content:\"\";position:absolute;right:-8px;top:8px;bottom:8px;width:2px;background:var(--gold);border-radius:2px;box-shadow:0 0 8px var(--gold)}\n\n/* Current (first slot) — animated ring + size up */\n.qslot.current{\n  width:64px;height:64px;\n  border-color:var(--gold);\n  box-shadow:0 0 0 1px var(--gold), 0 0 22px rgba(212,184,112,.35);\n  background:radial-gradient(circle at 30% 25%, rgba(212,184,112,.15), var(--panel));\n}\n.qslot.current .ic{font-size:26px}\n.qslot.current .ring{\n  position:absolute;inset:-4px;border-radius:50%;pointer-events:none;\n}\n.qslot.current .ring svg{width:100%;height:100%;transform:rotate(-90deg)}\n.qslot.current .ring circle{fill:none;stroke-width:2.5;stroke-linecap:round}\n.qslot.current .ring .bg{stroke:rgba(212,184,112,.12)}\n.qslot.current .ring .fg{stroke:var(--gold);stroke-dasharray:var(--circ);stroke-dashoffset:var(--off);transition:stroke-dashoffset .4s}\n.qslot.current .x{display:none}\n.qslot.invalid{animation:shakeBubble .4s;border-color:#c9442c}\n@keyframes shakeBubble{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}\n.qslot.invalid .err{\n  position:absolute;bottom:calc(100% + 10px);left:50%;transform:translateX(-50%);\n  background:#2a1a14;border:1px solid #c9442c;border-radius:3px;\n  padding:4px 8px;font-family:var(--mono);font-size:9.5px;color:#ff7a5a;\n  white-space:nowrap;letter-spacing:.04em;\n}\n\n/* Add-slot placeholders */\n.qadd{\n  width:54px;height:54px;flex-shrink:0;\n  display:flex;align-items:center;justify-content:center;\n  background:transparent;\n  border:1.5px dashed rgba(61,53,42,.8);border-radius:50%;\n  color:var(--ink-3);font-size:20px;font-weight:300;line-height:1;\n  user-select:none;\n}\n\n/* ============ UNLOCK POPUP ============ */\n.unlock-popup{\n  position:fixed;top:82px;width:320px;z-index:60;\n}\nbody.detail-mode .unlock-popup{right:358px}\nbody:not(.detail-mode) .unlock-popup{right:18px}\n.unlock-popup{\n  background:linear-gradient(180deg,#2a2418,#1b1914);\n  border:1px solid var(--gold);border-radius:4px;\n  box-shadow:0 24px 60px rgba(0,0,0,.6), 0 0 40px rgba(212,184,112,.2);\n  overflow:hidden;\n  transform:translateX(340px);opacity:0;\n  transition:all .4s cubic-bezier(.2,.8,.3,1);\n}\n.unlock-popup.on{transform:translateX(0);opacity:1}\n.unlock-popup .uh{padding:14px 16px;background:linear-gradient(180deg,rgba(212,184,112,.18),transparent);border-bottom:1px solid rgba(212,184,112,.25)}\n.unlock-popup .uh .kw{font-family:var(--mono);font-size:10px;letter-spacing:.22em;color:var(--gold);text-transform:uppercase;margin-bottom:3px}\n.unlock-popup .uh h4{margin:0;font-family:var(--serif);font-size:20px;font-weight:500;color:var(--ink)}\n.unlock-popup .uh h4 em{font-style:italic;color:var(--gold)}\n.unlock-popup .ub{padding:14px 16px;font-family:var(--serif);font-size:13px;color:var(--ink-2);font-style:italic;line-height:1.45;border-bottom:1px solid rgba(61,53,42,.5)}\n.unlock-popup .um{padding:10px 16px 4px;font-family:var(--mono);font-size:9.5px;letter-spacing:.14em;color:var(--ink-3);text-transform:uppercase}\n.unlock-popup .us{padding:6px 12px 14px;display:flex;flex-direction:column;gap:6px}\n.unlock-popup .sug{\n  display:flex;align-items:center;gap:10px;padding:10px 12px;\n  background:var(--panel-2);border:1px solid var(--rule);border-radius:3px;cursor:pointer;transition:all .12s;\n}\n.unlock-popup .sug:hover{border-color:var(--gold-2);background:color-mix(in srgb, var(--gold) 8%, var(--panel-2))}\n.unlock-popup .sug .ic{font-size:20px}\n.unlock-popup .sug .t{flex:1}\n.unlock-popup .sug .tn{font-family:var(--serif);font-size:13.5px;color:var(--ink);font-weight:500;line-height:1.1}\n.unlock-popup .sug .bn{font-family:var(--mono);font-size:9px;color:var(--ink-3);letter-spacing:.1em;text-transform:uppercase;margin-top:2px}\n.unlock-popup .sug .go{font-family:var(--mono);font-size:10px;color:var(--gold);letter-spacing:.14em}\n.unlock-popup .close{position:absolute;top:10px;right:10px;background:transparent;border:none;color:var(--ink-3);cursor:pointer;font-size:14px}\n.unlock-popup .close:hover{color:var(--ink)}\n\n/* ============ HELPER ============ */\n.hint{position:fixed;bottom:22px;right:22px;z-index:10;font-family:var(--mono);font-size:10px;color:var(--ink-3);letter-spacing:.1em;text-transform:uppercase;opacity:.6;transition:opacity .3s}\nbody:not(.detail-mode) .hint{opacity:0;pointer-events:none}\n\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<!-- TOPBAR -->\n<div class=\"topbar\">\n  <h1>Strates <small>Arbre<\u002Fsmall><\u002Fh1>\n  <button class=\"btn-back\" id=\"btnBack\">← Retour<\u002Fbutton>\n  <div class=\"crumb\">\n    <span>Âge I · Pierre<\u002Fspan>\n    <span class=\"sep\" id=\"crumbSep\" style=\"display:none\">/<\u002Fspan>\n    <span class=\"cur\" id=\"crumbCur\" style=\"display:none\">—<\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"age-pill\" id=\"agePill\">Âge en cours · <b>Pierre<\u002Fb><\u002Fdiv>\n  <div class=\"res\">\n    <span><b id=\"resSun\">16<\u002Fb> pts ☀<\u002Fspan>\n    <span><b id=\"resMoon\">4<\u002Fb> pts 🌙<\u002Fspan>\n  <\u002Fdiv>\n  <button class=\"close\">✕<\u002Fbutton>\n<\u002Fdiv>\n\n<!-- Search (globale only) -->\n<div class=\"search-top\">\n  <svg width=\"14\" height=\"14\" viewBox=\"0 0 12 12\" fill=\"none\" stroke=\"var(--ink-3)\" stroke-width=\"1.4\"><circle cx=\"5\" cy=\"5\" r=\"3.5\"><\u002Fcircle><path d=\"M7.5 7.5 L11 11\"><\u002Fpath><\u002Fsvg>\n  <input id=\"searchGlobal\" type=\"text\" placeholder=\"Rechercher une technologie dans toutes les branches…\">\n<\u002Fdiv>\n\n<!-- STAGE -->\n<div class=\"stage\" id=\"stage\">\n\n  <!-- CONSTELLATION (globale) -->\n  <div class=\"constellation\" id=\"constellation\">\n    <svg class=\"spokes\" viewBox=\"-410 -410 820 820\">\n      <line x1=\"0\" y1=\"0\" x2=\"0\" y2=\"-300\" data-br=\"tools\"><\u002Fline>\n      <line x1=\"0\" y1=\"0\" x2=\"260\" y2=\"-150\" data-br=\"agri\"><\u002Fline>\n      <line x1=\"0\" y1=\"0\" x2=\"260\" y2=\"150\" data-br=\"build\"><\u002Fline>\n      <line x1=\"0\" y1=\"0\" x2=\"0\" y2=\"340\" data-br=\"age\"><\u002Fline>\n      <line x1=\"0\" y1=\"0\" x2=\"-260\" y2=\"150\" data-br=\"know\"><\u002Fline>\n      <line x1=\"0\" y1=\"0\" x2=\"-260\" y2=\"-150\" data-br=\"expl\"><\u002Fline>\n      <line x1=\"0\" y1=\"0\" x2=\"200\" y2=\"-290\" data-br=\"night\"><\u002Fline>\n    <\u002Fsvg>\n\n    <div class=\"center\">\n      <div class=\"ring r3\"><\u002Fdiv><div class=\"ring r2\"><\u002Fdiv><div class=\"ring\"><\u002Fdiv>\n      <div class=\"lbl\">Âge 01<\u002Fdiv>\n      <div class=\"name\"><em>Pierre<\u002Fem><\u002Fdiv>\n      <div class=\"sub\">Tout commence par le feu, une pioche, et l'histoire qu'on se raconte.<\u002Fdiv>\n      <div class=\"progress\"><span>Débloquées<\u002Fspan><b id=\"globalProgress\">6/18<\u002Fb><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Branches -->\n    <div class=\"branch\" data-br=\"tools\" style=\"left:50%;top:50%;margin-left:0;margin-top:-300px\">\n      <div class=\"card\">\n        <div class=\"head\"><div class=\"emblem\">⛏<\u002Fdiv><div><div class=\"nm\">Outils<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"count\"><b class=\"bdone\">2<\u002Fb>/5 débloqués<\u002Fdiv>\n        <div class=\"bar\"><i style=\"--p:40%\"><\u002Fi><\u002Fdiv>\n        <div class=\"chips\"><span class=\"chip done\">Pioche<\u002Fspan><span class=\"chip done\">Hache<\u002Fspan><span class=\"chip research\">Lance<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"branch\" data-br=\"night\" style=\"left:50%;top:50%;margin-left:200px;margin-top:-290px\">\n      <div class=\"card\">\n        <div class=\"head\"><div class=\"emblem\">🌙<\u002Fdiv><div><div class=\"nm\">Nocturne<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"count\"><b>1<\u002Fb>/2 débloqués<\u002Fdiv>\n        <div class=\"bar\"><i style=\"--p:50%\"><\u002Fi><\u002Fdiv>\n        <div class=\"chips\"><span class=\"chip done\">Promontoire<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"branch\" data-br=\"agri\" style=\"left:50%;top:50%;margin-left:260px;margin-top:-150px\">\n      <div class=\"card\">\n        <div class=\"head\"><div class=\"emblem\">🌾<\u002Fdiv><div><div class=\"nm\">Agriculture<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"count\"><b>0<\u002Fb>/2 débloqués<\u002Fdiv>\n        <div class=\"bar\"><i style=\"--p:0%\"><\u002Fi><\u002Fdiv>\n        <div class=\"chips\"><span class=\"chip\">Cueillette<\u002Fspan><span class=\"chip\">Champ<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"branch\" data-br=\"build\" style=\"left:50%;top:50%;margin-left:260px;margin-top:150px\">\n      <div class=\"card\">\n        <div class=\"head\"><div class=\"emblem\">🏠<\u002Fdiv><div><div class=\"nm\">Construction<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"count\"><b>1<\u002Fb>/4 débloqués<\u002Fdiv>\n        <div class=\"bar\"><i style=\"--p:25%\"><\u002Fi><\u002Fdiv>\n        <div class=\"chips\"><span class=\"chip done\">Feu<\u002Fspan><span class=\"chip research\">Abri<\u002Fspan><span class=\"chip\">Cabane<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"branch\" data-br=\"age\" style=\"left:50%;top:50%;margin-left:0;margin-top:340px\">\n      <div class=\"card\">\n        <div class=\"head\"><div class=\"emblem\">🗿<\u002Fdiv><div><div class=\"nm\">Transition<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"count\"><b>0<\u002Fb>/2 · Seuil du Bronze<\u002Fdiv>\n        <div class=\"bar\"><i style=\"--p:0%\"><\u002Fi><\u002Fdiv>\n        <div class=\"chips\"><span class=\"chip\">Totem<\u002Fspan><span class=\"chip\">Cairn<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"branch\" data-br=\"know\" style=\"left:50%;top:50%;margin-left:-260px;margin-top:150px\">\n      <div class=\"card\">\n        <div class=\"head\"><div class=\"emblem\">✦<\u002Fdiv><div><div class=\"nm\">Savoir<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"count\"><b>2<\u002Fb>/2 débloqués<\u002Fdiv>\n        <div class=\"bar\"><i style=\"--p:100%\"><\u002Fi><\u002Fdiv>\n        <div class=\"chips\"><span class=\"chip done\">Tradition<\u002Fspan><span class=\"chip done\">Hutte<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"branch\" data-br=\"expl\" style=\"left:50%;top:50%;margin-left:-260px;margin-top:-150px\">\n      <div class=\"card\">\n        <div class=\"head\"><div class=\"emblem\">🧭<\u002Fdiv><div><div class=\"nm\">Exploration<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"count\"><b>0<\u002Fb>/1 débloqué<\u002Fdiv>\n        <div class=\"bar\"><i style=\"--p:0%\"><\u002Fi><\u002Fdiv>\n        <div class=\"chips\"><span class=\"chip\">Éclaireur<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- DETAIL VIEW -->\n  <div class=\"detail-view\" id=\"detailView\">\n    <div class=\"branch-canvas-wrap\" id=\"canvasWrap\">\n      <div class=\"branch-canvas\" id=\"branchCanvas\">\n        <div class=\"branch-header\" id=\"branchHeader\"><\u002Fdiv>\n        <svg class=\"links\" id=\"branchLinks\" width=\"1800\" height=\"900\"><\u002Fsvg>\n        <!-- tech nodes injected here -->\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <aside class=\"fiche\" id=\"fiche\">\n      <div class=\"fiche-head\">\n        <span class=\"ic\" id=\"fIc\">—<\u002Fspan>\n        <div style=\"flex:1\">\n          <h3 id=\"fName\">Sélectionne une technologie<\u002Fh3>\n          <div class=\"br\" id=\"fBranch\">—<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"fiche-body\" id=\"ficheBody\"><\u002Fdiv>\n    <\u002Faside>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- QUEUE -->\n<div class=\"queue\" id=\"queue\">\n  <div class=\"qh\">\n    <span class=\"hourglass\">⧖<\u002Fspan>\n    <b>File de recherche<\u002Fb>\n    <span class=\"cnt\" id=\"qCnt\">0/5<\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"qlist\" id=\"qList\"><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- UNLOCK POPUP -->\n<div class=\"unlock-popup\" id=\"unlockPopup\">\n  <button class=\"close\" id=\"popupClose\">✕<\u002Fbutton>\n  <div class=\"uh\">\n    <div class=\"kw\">★ Débloqué<\u002Fdiv>\n    <h4><em id=\"unName\">—<\u002Fem><\u002Fh4>\n  <\u002Fdiv>\n  <div class=\"ub\" id=\"unQuote\">—<\u002Fdiv>\n  <div class=\"um\">Suggestions de suite<\u002Fdiv>\n  <div class=\"us\" id=\"unSug\"><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- FILTERS (globale) -->\n<div class=\"filters-panel\" id=\"filtersPanel\">\n  <div class=\"title\">Filtres branches<\u002Fdiv>\n  <button class=\"filter\" data-br=\"tools\"><span class=\"sw\" style=\"background:var(--br-tools)\"><\u002Fspan>Outils<\u002Fbutton>\n  <button class=\"filter\" data-br=\"agri\"><span class=\"sw\" style=\"background:var(--br-agri)\"><\u002Fspan>Agriculture<\u002Fbutton>\n  <button class=\"filter\" data-br=\"build\"><span class=\"sw\" style=\"background:var(--br-build)\"><\u002Fspan>Construction<\u002Fbutton>\n  <button class=\"filter\" data-br=\"know\"><span class=\"sw\" style=\"background:var(--br-know)\"><\u002Fspan>Savoir<\u002Fbutton>\n  <button class=\"filter\" data-br=\"expl\"><span class=\"sw\" style=\"background:var(--br-expl)\"><\u002Fspan>Exploration<\u002Fbutton>\n  <button class=\"filter\" data-br=\"night\"><span class=\"sw\" style=\"background:var(--br-night)\"><\u002Fspan>Nocturne<\u002Fbutton>\n  <button class=\"filter\" data-br=\"age\"><span class=\"sw\" style=\"background:var(--br-age)\"><\u002Fspan>Transition<\u002Fbutton>\n<\u002Fdiv>\n\n<!-- AGE RAIL (globale) -->\n<div class=\"agerail\">\n  <div class=\"dot active\" title=\"Âge I — Pierre\">I<\u002Fdiv>\n  <div class=\"dot locked\">II<\u002Fdiv>\n  <div class=\"dot locked\">III<\u002Fdiv>\n  <div class=\"dot locked\">IV<\u002Fdiv>\n  <div class=\"dot locked\">V<\u002Fdiv>\n  <div class=\"dot locked\">VI<\u002Fdiv>\n  <div class=\"dot locked\">VII<\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"hint\">Échap pour revenir · glisser pour panner · molette pour zoomer<\u002Fdiv>\n\n<script>\n/* ============================================================\n * DATA\n * ============================================================ */\nconst BRANCHES = {\n  tools:{name:\"Outils\",color:\"#8a8078\",ic:\"⛏\",pitch:\"Le geste avant la pensée. Ce que tiennent leurs mains façonne ce qu'ils peuvent faire.\"},\n  agri:{name:\"Agriculture\",color:\"#b38a3a\",ic:\"🌾\",pitch:\"De la cueillette au champ. La terre commence à rendre ce qu'on lui donne.\"},\n  build:{name:\"Construction\",color:\"#a56a34\",ic:\"🏠\",pitch:\"Du foyer à la longère. Poser des murs, c'est décider de rester.\"},\n  know:{name:\"Savoir\",color:\"#5a77b8\",ic:\"✦\",pitch:\"Les histoires, puis les notes. On garde ce que les anciens ont compris avant nous.\"},\n  expl:{name:\"Exploration\",color:\"#3f8a74\",ic:\"🧭\",pitch:\"Au-delà de la crête. Celui qui marche revient avec des nouvelles du monde.\"},\n  night:{name:\"Nocturne\",color:\"#6a7cb8\",ic:\"🌙\",pitch:\"Les étoiles ont un ordre. La nuit n'est plus une attente, mais une lecture.\"},\n  age:{name:\"Transition\",color:\"#d4b870\",ic:\"🗿\",pitch:\"Ce que la tribu laisse derrière elle avant de franchir le seuil.\"},\n};\n\n// tech state: done, research, progress, avail, locked\n// col + row define placement inside branch grid (grid = 5 col x 4 row)\n// age: 1 = current (Pierre), 2 = teaser (Bronze)\nconst TECHS = [\n  // OUTILS — Âge I\n  {id:\"pick-stone\", name:\"Pioche en pierre\", ic:\"⛏\", branch:\"tools\", age:1, col:0, row:1, state:\"done\",\n   cost:{r:5,n:0}, desc:\"Permet le minage de la roche basique et des premiers affleurements.\",\n   quote:\"Il faut une pioche pour casser ça.\", requires:[],\n   unlocks:[\"Métier Mineur\",\"Ressource Pierre\"]},\n  {id:\"axe-stone\", name:\"Hache en pierre\", ic:\"🪓\", branch:\"tools\", age:1, col:0, row:2, state:\"done\",\n   cost:{r:5,n:0}, desc:\"Affûte une lame de silex emmanchée au bois. Les arbres cèdent.\",\n   quote:\"Ce tronc ne tombera pas à mains nues.\", requires:[],\n   unlocks:[\"Métier Bûcheron\",\"Ressource Bois\"]},\n  {id:\"spear-wood\", name:\"Lance en bois\", ic:\"🗡\", branch:\"tools\", age:1, col:1, row:2, state:\"research\",\n   cost:{r:5,n:0}, desc:\"Une branche droite, un silex taillé. Tient le gibier à distance.\",\n   quote:\"Le cerf est grand. Il nous faut une pointe.\", requires:[\"axe-stone\"],\n   unlocks:[\"Métier Chasseur\",\"Ressource Viande\"]},\n  {id:\"shovel-stone\", name:\"Pelle en pierre\", ic:\"⚒\", branch:\"tools\", age:1, col:2, row:1, state:\"avail\",\n   cost:{r:8,n:0}, desc:\"Un galet plat, un manche. Retourne la terre plus vite que les mains.\",\n   quote:\"La terre est lourde sans outil.\", requires:[\"pick-stone\"],\n   unlocks:[\"Métier Terrassier\",\"Action Niveler\"]},\n  {id:\"sickle-stone\", name:\"Faucille de silex\", ic:\"🌿\", branch:\"tools\", age:1, col:3, row:2, state:\"locked\",\n   cost:{r:10,n:0}, desc:\"Lame courbe pour moissonner. Annonce l'agriculture vraie.\",\n   quote:\"Les épis mûrissent. Qui les coupera ?\", requires:[\"axe-stone\",\"first-field\"],\n   unlocks:[\"Récolte Blé\",\"[Préparation Bronze]\"]},\n\n  // OUTILS — teaser Âge II\n  {id:\"pick-bronze\", name:\"Pioche en bronze\", ic:\"⛏\", branch:\"tools\", age:2, col:0, row:1, state:\"locked\",\n   cost:{r:20,n:0}, desc:\"Lame alliée, plus dure que la pierre. Ouvre la roche dure.\",\n   quote:\"Elle mord ce que la pierre ne pouvait pas.\", requires:[\"sickle-stone\",\"copper-ore\"],\n   unlocks:[\"Minage roche dure\",\"Filons cuivre\"]},\n  {id:\"copper-ore\", name:\"Extraction cuivre\", ic:\"◆\", branch:\"tools\", age:2, col:1, row:1, state:\"locked\",\n   cost:{r:15,n:0}, desc:\"Repérer, creuser, extraire le premier métal.\",\n   quote:\"Une pierre qui luit autrement.\", requires:[\"shovel-stone\"],\n   unlocks:[\"Ressource Cuivre\"]},\n\n  // AGRICULTURE\n  {id:\"gather-plus\", name:\"Cueillette améliorée\", ic:\"🫐\", branch:\"agri\", age:1, col:1, row:0, state:\"avail\",\n   cost:{r:8,n:0}, desc:\"Techniques de cueillette plus fines. +1 baie par buisson.\",\n   quote:\"On en prend moins, on en trouve plus.\", requires:[],\n   unlocks:[\"+1 baie / buisson\"]},\n  {id:\"first-field\", name:\"Premier champ\", ic:\"🌾\", branch:\"agri\", age:1, col:2, row:0, state:\"locked\",\n   cost:{r:10,n:0}, desc:\"Un carré de terre retournée. Première récolte prévisible.\",\n   quote:\"Si on met la graine dans la terre, elle revient.\", requires:[\"shovel-stone\",\"gather-plus\"],\n   unlocks:[\"Bâtiment Champ\",\"Ressource Blé\"]},\n\n  // CONSTRUCTION (on simule qu'on est dans une autre branche quand user clique build — mais ici on montre tools)\n];\n\n/* ============================================================\n * STATE\n * ============================================================ */\nlet currentBranch = null;\nlet queue = []; // array of tech ids\nlet selectedTech = null;\nlet resources = {sun:16, moon:4};\n\nconst techMap = () => Object.fromEntries(TECHS.map(t=>[t.id,t]));\nconst byId = (id) => TECHS.find(t=>t.id===id);\n\n/* ============================================================\n * CONSTELLATION interactions\n * ============================================================ */\ndocument.querySelectorAll('.branch').forEach(el=>{\n  el.addEventListener('click',()=>openBranch(el.dataset.br));\n});\n\nconst active = new Set(Object.keys(BRANCHES));\ndocument.querySelectorAll('.filter').forEach(f=>{\n  f.addEventListener('click',()=>{\n    const br = f.dataset.br;\n    if(active.has(br)){ active.delete(br); f.classList.add('off'); }\n    else { active.add(br); f.classList.remove('off'); }\n    document.querySelectorAll('.branch').forEach(c=>{\n      c.classList.toggle('dimmed', !active.has(c.dataset.br));\n    });\n    document.querySelectorAll('.spokes line').forEach(l=>{\n      l.style.opacity = active.has(l.dataset.br) ? '' : '.1';\n    });\n  });\n});\n\ndocument.getElementById('searchGlobal').addEventListener('input',e=>{\n  const q = e.target.value.toLowerCase().trim();\n  document.querySelectorAll('.branch').forEach(c=>{\n    if(!q){ c.classList.remove('dimmed'); return; }\n    c.classList.toggle('dimmed', !c.textContent.toLowerCase().includes(q));\n  });\n});\n\n/* ============================================================\n * BRANCH DETAIL VIEW\n * ============================================================ */\nconst CELL_W = 240, CELL_H = 150, PAD_X = 80, PAD_Y = 180;\n// column 0..4 = age I, column 5..9 = age II teaser\n\nfunction openBranch(br){\n  currentBranch = br;\n  const B = BRANCHES[br];\n  document.body.classList.add('detail-mode');\n  document.body.style.setProperty('--vc', B.color);\n\n  document.getElementById('crumbSep').style.display='inline';\n  const cur = document.getElementById('crumbCur');\n  cur.style.display='inline';\n  cur.textContent = B.name;\n\n  // Header\n  document.getElementById('branchHeader').innerHTML = `\n    <div class=\"el\">\n      <div class=\"emblem\">${B.ic}<\u002Fdiv>\n      <div>\n        <div class=\"br\">Branche<\u002Fdiv>\n        <div class=\"nm\">${B.name}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"pitch\">${B.pitch}<\u002Fdiv>\n  `;\n\n  renderBranchTree(br);\n\n  // open first interesting tech in fiche\n  const list = TECHS.filter(t=>t.branch===br && t.age===1);\n  const first = list.find(t=>t.state==='research') || list.find(t=>t.state==='avail') || list[0];\n  if(first) selectTech(first.id);\n}\n\nfunction closeBranch(){\n  document.body.classList.remove('detail-mode');\n  document.getElementById('crumbSep').style.display='none';\n  document.getElementById('crumbCur').style.display='none';\n  currentBranch=null;\n}\n\ndocument.getElementById('btnBack').addEventListener('click',closeBranch);\nwindow.addEventListener('keydown',e=>{\n  if(e.key==='Escape'){\n    if(document.body.classList.contains('detail-mode')) closeBranch();\n  }\n});\n\nfunction renderBranchTree(br){\n  const canvas = document.getElementById('branchCanvas');\n  const links = document.getElementById('branchLinks');\n  // clear previous tech nodes + links\n  canvas.querySelectorAll('.tech').forEach(n=>n.remove());\n  canvas.querySelectorAll('.age-col').forEach(n=>n.remove());\n  links.innerHTML = '';\n\n  // Age columns background\n  const ages = [1,2];\n  ages.forEach(a=>{\n    const col = document.createElement('div');\n    col.className = 'age-col' + (a===2?' teased':'');\n    const ageStartCol = (a-1)*5;\n    const x = PAD_X + ageStartCol*CELL_W - 40;\n    const w = 5*CELL_W;\n    col.style.cssText = `left:${x}px;width:${w}px;`;\n    const names = [\"\",\"Pierre\",\"Bronze\"];\n    col.innerHTML = `<div class=\"ah\"><b>${names[a]}<\u002Fb>Âge ${String(a).padStart(2,'0')}${a===2?' — teaser':' — en cours'}<\u002Fdiv>`;\n    canvas.appendChild(col);\n  });\n\n  // Nodes\n  const branchTechs = TECHS.filter(t=>t.branch===br);\n  branchTechs.forEach(t=>{\n    const el = document.createElement('div');\n    el.className = 'tech ' + t.state;\n    el.dataset.id = t.id;\n    const ageOffset = (t.age-1)*5;\n    const cx = PAD_X + (ageOffset + t.col)*CELL_W + CELL_W/2;\n    const cy = PAD_Y + 40 + t.row*CELL_H + CELL_H/2;\n    el.style.left = cx+'px';\n    el.style.top = cy+'px';\n\n    // cross-branch indicator (simulated: if requires something NOT in this branch, show badge)\n    const crossReqs = t.requires.filter(r=>{\n      const rt = byId(r);\n      return rt && rt.branch !== br;\n    });\n    const crossBadge = crossReqs.length ? `<div class=\"cross\">↗ ${BRANCHES[byId(crossReqs[0]).branch].name}<\u002Fdiv>` : '';\n\n    // lock indicator with req count\n    const missingCount = t.requires.filter(r=>{\n      const rt = byId(r);\n      return !rt || rt.state !== 'done';\n    }).length;\n\n    let rightCorner = '';\n    if(t.state==='done'){\n      rightCorner = `<div class=\"check\">✓<\u002Fdiv>`;\n    } else if(t.state==='locked' && missingCount>0){\n      rightCorner = `<div class=\"lock\">🔒 <b>${missingCount}<\u002Fb><\u002Fdiv>`;\n    }\n\n    el.innerHTML = `\n      <div class=\"card\">\n        ${rightCorner}\n        <div class=\"row\">\n          <div class=\"ic\">${t.ic}<\u002Fdiv>\n          <div class=\"nm\">${t.name}<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"cost\">\n          ${t.cost.r?`<span><b>${t.cost.r}<\u002Fb> ☀<\u002Fspan>`:''}\n          ${t.cost.n?`<span><b>${t.cost.n}<\u002Fb> 🌙<\u002Fspan>`:''}\n          ${crossBadge}\n        <\u002Fdiv>\n        ${t.state==='progress'?`<div class=\"progress-bar\"><i style=\"--p:45%\"><\u002Fi><\u002Fdiv>`:''}\n      <\u002Fdiv>\n    `;\n    el.addEventListener('click',()=>selectTech(t.id));\n    el.addEventListener('mouseenter',()=>highlightReqs(t.id));\n    el.addEventListener('mouseleave',clearReqHighlight);\n    canvas.appendChild(el);\n  });\n\n  drawLinks(br);\n  resetPan();\n}\n\nfunction drawLinks(br){\n  const links = document.getElementById('branchLinks');\n  const branchTechs = TECHS.filter(t=>t.branch===br);\n  branchTechs.forEach(t=>{\n    t.requires.forEach(rid=>{\n      const src = byId(rid);\n      if(!src) return;\n      // only draw link if src is ALSO in this branch (cross-branch shown as badge)\n      if(src.branch !== br) return;\n\n      const srcOffset = (src.age-1)*5;\n      const tOffset = (t.age-1)*5;\n      const x1 = PAD_X + (srcOffset + src.col)*CELL_W + CELL_W/2 + 100;  // right edge of src\n      const y1 = PAD_Y + 40 + src.row*CELL_H + CELL_H/2;\n      const x2 = PAD_X + (tOffset + t.col)*CELL_W + CELL_W/2 - 100;      // left edge of dest\n      const y2 = PAD_Y + 40 + t.row*CELL_H + CELL_H/2;\n\n      // Orthogonal path: right then down/up then right\n      const midX = (x1+x2)/2;\n      const d = `M ${x1} ${y1} L ${midX} ${y1} L ${midX} ${y2} L ${x2} ${y2}`;\n      const path = document.createElementNS('http://www.w3.org/2000/svg','path');\n      path.setAttribute('d',d);\n      const isDone = t.state==='done' && src.state==='done';\n      path.setAttribute('class', 'link-line' + (isDone?' done':''));\n      path.dataset.to = t.id;\n      path.dataset.from = src.id;\n      links.appendChild(path);\n    });\n  });\n}\n\n/* ============ Req highlighting ============ */\nfunction highlightReqs(techId){\n  const t = byId(techId);\n  if(!t) return;\n  if(t.state !== 'locked' && t.state !== 'avail') return;\n  // find all missing requirements (direct)\n  const missing = t.requires.filter(r=>{\n    const rt = byId(r);\n    return !rt || rt.state !== 'done';\n  });\n  if(missing.length===0) return;\n\n  document.querySelectorAll('.tech').forEach(el=>{\n    if(el.dataset.id === techId){ el.classList.add('highlight'); return; }\n    if(missing.includes(el.dataset.id)){\n      el.classList.add('req-highlight','highlight');\n    } else {\n      el.classList.add('faded');\n    }\n  });\n  document.querySelectorAll('.links path').forEach(p=>{\n    if(p.dataset.to===techId && missing.includes(p.dataset.from)){\n      p.classList.add('req-hi');\n    } else {\n      p.style.opacity='.1';\n    }\n  });\n}\nfunction clearReqHighlight(){\n  document.querySelectorAll('.tech').forEach(el=>el.classList.remove('req-highlight','faded','highlight'));\n  document.querySelectorAll('.links path').forEach(p=>{p.classList.remove('req-hi');p.style.opacity=''});\n}\n\n/* ============ Fiche ============ */\nfunction selectTech(id){\n  const t = byId(id);\n  if(!t) return;\n  selectedTech = id;\n  document.getElementById('fIc').textContent = t.ic;\n  document.getElementById('fName').textContent = t.name;\n  const fb = document.getElementById('fBranch');\n  fb.textContent = BRANCHES[t.branch].name;\n  fb.style.color = BRANCHES[t.branch].color;\n\n  const body = document.getElementById('ficheBody');\n  const queued = queue.includes(id);\n\n  const reqsHtml = t.requires.length ? `\n    <div class=\"fsec\">\n      <h5>Prérequis<\u002Fh5>\n      <div class=\"req-grid\">\n        ${t.requires.map(rid=>{\n          const r = byId(rid);\n          const ok = r && r.state==='done';\n          const crossIcon = r && r.branch !== t.branch ? `<span class=\"bn\">↗ ${BRANCHES[r.branch].name}<\u002Fspan>` : '';\n          return `<div class=\"req-card ${ok?'ok':'ko'}\" data-req=\"${rid}\">\n            <div class=\"chk\">${ok?'✓':'·'}<\u002Fdiv>\n            <div class=\"tn\">${r?r.name:rid}<\u002Fdiv>\n            ${crossIcon}\n          <\u002Fdiv>`;\n        }).join('')}\n      <\u002Fdiv>\n    <\u002Fdiv>\n  ` : '';\n\n  body.innerHTML = `\n    <div class=\"fsec\">\n      <h5>Coût<\u002Fh5>\n      <div class=\"cost-row\">\n        ${t.cost.r?`<div class=\"c\">☀ <b>${t.cost.r}<\u002Fb> recherche<\u002Fdiv>`:''}\n        ${t.cost.n?`<div class=\"c\">🌙 <b>${t.cost.n}<\u002Fb> nocturnes<\u002Fdiv>`:''}\n        ${!t.cost.r && !t.cost.n ? '<div class=\"c\" style=\"color:var(--ink-3)\">Starter offert<\u002Fdiv>':''}\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"fsec\">\n      <h5>Description<\u002Fh5>\n      <p class=\"desc\">${t.desc}<\u002Fp>\n    <\u002Fdiv>\n    ${t.quote?`<div class=\"fsec\"><h5>Murmure<\u002Fh5><p class=\"quote\">${t.quote}<\u002Fp><\u002Fdiv>`:''}\n    ${reqsHtml}\n    <div class=\"fsec\">\n      <h5>Débloque<\u002Fh5>\n      <div class=\"unlock-list\">${t.unlocks.map(u=>`<div class=\"u\"><span class=\"dot\">▸<\u002Fspan><span>${u}<\u002Fspan><\u002Fdiv>`).join('')}<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"actions\">\n      ${renderActionButton(t, queued)}\n    <\u002Fdiv>\n  `;\n\n  body.querySelectorAll('.req-card').forEach(c=>{\n    c.addEventListener('click',()=>selectTech(c.dataset.req));\n  });\n  attachActionButtonHandlers(t, queued);\n}\n\nfunction renderActionButton(t, queued){\n  if(t.state==='done') return `<button class=\"btn done-btn\" disabled>✓ Débloqué<\u002Fbutton>`;\n  if(t.state==='research' || t.state==='progress') return `<button class=\"btn\" disabled>Recherche en cours<\u002Fbutton>`;\n  // compute if directly researchable (all reqs done)\n  const allReqsDone = t.requires.every(r=>{const rt=byId(r);return rt && rt.state==='done'});\n  if(queued){\n    return `<button class=\"btn ghost\" id=\"btnUnqueue\">− Retirer de la file<\u002Fbutton>`;\n  }\n  if(allReqsDone){\n    return `<button class=\"btn\" id=\"btnQueue\">+ Ajouter à la file · ${t.cost.r} ☀<\u002Fbutton>`;\n  }\n  // locked: show \"add chain\" button\n  return `\n    <button class=\"btn\" id=\"btnChain\">⤳ Mettre le chemin en file<\u002Fbutton>\n    <button class=\"btn ghost\" id=\"btnQueueAnyway\" disabled style=\"opacity:.5\">Prérequis manquants<\u002Fbutton>\n  `;\n}\n\nfunction attachActionButtonHandlers(t, queued){\n  const bq = document.getElementById('btnQueue');\n  const bu = document.getElementById('btnUnqueue');\n  const bc = document.getElementById('btnChain');\n  if(bq) bq.addEventListener('click',()=>enqueue(t.id));\n  if(bu) bu.addEventListener('click',()=>dequeue(t.id));\n  if(bc) bc.addEventListener('click',()=>enqueueChain(t.id));\n}\n\n/* ============ Queue management ============ */\nfunction computeChain(id, acc=new Set()){\n  if(acc.has(id)) return acc;\n  const t = byId(id);\n  if(!t) return acc;\n  if(t.state==='done') return acc;\n  t.requires.forEach(r=>{\n    const rt = byId(r);\n    if(rt && rt.state!=='done') computeChain(r, acc);\n  });\n  acc.add(id);\n  return acc;\n}\n\nfunction enqueue(id){\n  if(queue.includes(id)) return;\n  if(queue.length>=5){ flashQueueFull(); return; }\n  queue.push(id);\n  renderQueue();\n  if(selectedTech===id) selectTech(id);\n}\nfunction dequeue(id){\n  queue = queue.filter(q=>q!==id);\n  renderQueue();\n  if(selectedTech===id) selectTech(id);\n}\nfunction enqueueChain(id){\n  const chain = Array.from(computeChain(id));\n  // Order chain: dependency order (topological) — simple approach: iterate until stable\n  const ordered = [];\n  const pending = new Set(chain);\n  const isDoneOrOrdered = (tid)=> {\n    const t = byId(tid);\n    return (t && t.state==='done') || ordered.includes(tid);\n  };\n  let guard = 0;\n  while(pending.size && guard<50){\n    guard++;\n    for(const tid of Array.from(pending)){\n      const t = byId(tid);\n      if(t.requires.every(r=>isDoneOrOrdered(r) || !pending.has(r))){\n        // only add if all reqs are either done or already ordered\n        if(t.requires.every(r=>isDoneOrOrdered(r) || !chain.includes(r))){\n          ordered.push(tid);\n          pending.delete(tid);\n        }\n      }\n    }\n  }\n  ordered.forEach(oid=>{\n    if(queue.length<5 && !queue.includes(oid)) queue.push(oid);\n  });\n  renderQueue();\n  if(selectedTech) selectTech(selectedTech);\n}\nfunction flashQueueFull(){\n  const q = document.getElementById('queue');\n  q.animate([{transform:'translateX(0)'},{transform:'translateX(-6px)'},{transform:'translateX(6px)'},{transform:'translateX(0)'}],{duration:280});\n}\n\nfunction renderQueue(){\n  const list = document.getElementById('qList');\n  document.getElementById('qCnt').textContent = `${queue.length}/5`;\n  if(queue.length===0){\n    list.innerHTML = '<div class=\"qempty\">Aucune recherche programmée. Ouvre une branche pour en ajouter.<\u002Fdiv>';\n    return;\n  }\n  const progress = 42; // demo current progress %\n  const C = 2 * Math.PI * 30; // circumference for r=30\n  const off = C * (1 - progress/100);\n  list.innerHTML = queue.map((id,i)=>{\n    const t = byId(id);\n    const isCurrent = i===0;\n    const ring = isCurrent ? `\n      <div class=\"ring\" style=\"--circ:${C};--off:${off}\">\n        <svg viewBox=\"0 0 64 64\">\n          <circle class=\"bg\" cx=\"32\" cy=\"32\" r=\"30\"/>\n          <circle class=\"fg\" cx=\"32\" cy=\"32\" r=\"30\"/>\n        <\u002Fsvg>\n      <\u002Fdiv>` : '';\n    const subLine = isCurrent ? `${progress}% · ${t.cost.r}☀` : `${t.cost.r}☀`;\n    return `\n      <div class=\"qslot ${isCurrent?'current':''}\" draggable=\"true\" data-id=\"${id}\" data-idx=\"${i}\">\n        ${ring}\n        <span class=\"ic\">${t.ic}<\u002Fspan>\n        <div class=\"cost-pill\"><span class=\"s\">${isCurrent?'▶':''}<\u002Fspan>${subLine}<\u002Fdiv>\n        <button class=\"x\" title=\"Retirer\">×<\u002Fbutton>\n        <div class=\"tip\">${t.name}${isCurrent?' — en cours':''}<\u002Fdiv>\n      <\u002Fdiv>\n    `;\n  }).join('');\n  // add empty slots to fill to 5 (visual scaffolding)\n  const remaining = 5 - queue.length;\n  for(let i=0;i<remaining;i++){\n    const add = document.createElement('div');\n    add.className = 'qadd';\n    add.textContent = '+';\n    list.appendChild(add);\n  }\n  list.querySelectorAll('.qslot').forEach(s=>{\n    s.querySelector('.x').addEventListener('click',e=>{e.stopPropagation();dequeue(s.dataset.id)});\n    s.addEventListener('click',()=>{\n      if(currentBranch !== byId(s.dataset.id).branch){\n        openBranch(byId(s.dataset.id).branch);\n      }\n      selectTech(s.dataset.id);\n    });\n    // Drag\n    s.addEventListener('dragstart',e=>{\n      e.dataTransfer.effectAllowed='move';\n      e.dataTransfer.setData('text/plain',s.dataset.id);\n      s.classList.add('dragging');\n    });\n    s.addEventListener('dragend',()=>{\n      s.classList.remove('dragging');\n      list.querySelectorAll('.qslot').forEach(x=>x.classList.remove('drop-before','drop-after'));\n    });\n    s.addEventListener('dragover',e=>{\n      e.preventDefault();\n      const rect = s.getBoundingClientRect();\n      const before = (e.clientY - rect.top) < rect.height/2;\n      list.querySelectorAll('.qslot').forEach(x=>x.classList.remove('drop-before','drop-after'));\n      s.classList.add(before?'drop-before':'drop-after');\n    });\n    s.addEventListener('drop',e=>{\n      e.preventDefault();\n      const srcId = e.dataTransfer.getData('text/plain');\n      const rect = s.getBoundingClientRect();\n      const before = (e.clientY - rect.top) < rect.height/2;\n      reorderQueue(srcId, s.dataset.id, before);\n    });\n  });\n}\n\nfunction reorderQueue(srcId, targetId, before){\n  if(srcId===targetId) return;\n  const newQueue = queue.filter(q=>q!==srcId);\n  const tIdx = newQueue.indexOf(targetId);\n  const insertIdx = before ? tIdx : tIdx+1;\n  newQueue.splice(insertIdx, 0, srcId);\n  // VALIDATE : respect dependencies. For each tech in newQueue, all requires (that are in queue OR not done) must come before.\n  if(!isQueueValid(newQueue)){\n    flashInvalid(srcId);\n    return;\n  }\n  queue = newQueue;\n  renderQueue();\n}\nfunction isQueueValid(q){\n  for(let i=0;i<q.length;i++){\n    const t = byId(q[i]);\n    for(const r of t.requires){\n      const rt = byId(r);\n      if(!rt) continue;\n      if(rt.state==='done') continue;\n      // if r is in queue, must be before i\n      const rIdx = q.indexOf(r);\n      if(rIdx === -1) continue; // r is not queued, we tolerate (but then tech isn't researchable anyway — out of scope for drag)\n      if(rIdx >= i) return false;\n    }\n  }\n  return true;\n}\nfunction flashInvalid(id){\n  const el = document.querySelector(`.qslot[data-id=\"${id}\"]`);\n  if(!el) return;\n  el.classList.add('invalid');\n  const err = document.createElement('div');\n  err.className = 'err';\n  err.textContent = 'Prérequis non satisfait';\n  el.appendChild(err);\n  setTimeout(()=>{el.classList.remove('invalid');err.remove()},1400);\n}\n\n/* ============ Unlock popup (demo) ============ */\nfunction showUnlockPopup(id){\n  const t = byId(id);\n  if(!t) return;\n  document.getElementById('unName').textContent = t.name;\n  document.getElementById('unQuote').textContent = t.quote || '';\n  // suggestions: techs whose reqs become satisfied (or are directly avail)\n  const suggestions = TECHS\n    .filter(x=>x.branch===t.branch && x.state!=='done' && x.state!=='research' && x.requires.includes(id))\n    .slice(0,2);\n  const sugHtml = (suggestions.length?suggestions:TECHS.filter(x=>x.state==='avail').slice(0,2)).map(s=>`\n    <div class=\"sug\" data-id=\"${s.id}\">\n      <span class=\"ic\">${s.ic}<\u002Fspan>\n      <div class=\"t\">\n        <div class=\"tn\">${s.name}<\u002Fdiv>\n        <div class=\"bn\">${BRANCHES[s.branch].name} · ${s.cost.r} ☀<\u002Fdiv>\n      <\u002Fdiv>\n      <span class=\"go\">+ File ›<\u002Fspan>\n    <\u002Fdiv>\n  `).join('');\n  document.getElementById('unSug').innerHTML = sugHtml;\n  document.getElementById('unSug').querySelectorAll('.sug').forEach(el=>{\n    el.addEventListener('click',()=>{\n      enqueue(el.dataset.id);\n      hideUnlockPopup();\n    });\n  });\n  document.getElementById('unlockPopup').classList.add('on');\n}\nfunction hideUnlockPopup(){\n  document.getElementById('unlockPopup').classList.remove('on');\n}\ndocument.getElementById('popupClose').addEventListener('click',hideUnlockPopup);\n\n/* ============ Pan + zoom ============ */\nconst cw = document.getElementById('canvasWrap');\nconst canv = document.getElementById('branchCanvas');\nlet scale = 0.85, tx = 0, ty = 0;\nfunction applyT(){ canv.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`; }\nfunction resetPan(){\n  // start at initial zoom, positioned so the branch header is visible on the left\n  scale = 0.88;\n  tx = 240; // leave room for the fixed header on the left\n  ty = 0;\n  applyT();\n}\nlet dragging=false, sx=0, sy=0, stx=0, sty=0;\ncw.addEventListener('mousedown',e=>{\n  if(e.target.closest('.tech')) return;\n  dragging=true; sx=e.clientX; sy=e.clientY; stx=tx; sty=ty;\n  cw.classList.add('dragging');\n  canv.classList.add('dragging');\n});\nwindow.addEventListener('mousemove',e=>{\n  if(!dragging) return;\n  tx = stx + (e.clientX-sx);\n  ty = sty + (e.clientY-sy);\n  clampPan();\n  applyT();\n});\nwindow.addEventListener('mouseup',()=>{\n  if(!dragging) return;\n  dragging=false;\n  cw.classList.remove('dragging');\n  canv.classList.remove('dragging');\n  elasticSnap();\n});\ncw.addEventListener('wheel',e=>{\n  if(!document.body.classList.contains('detail-mode')) return;\n  e.preventDefault();\n  const rect = cw.getBoundingClientRect();\n  const mx = e.clientX-rect.left, my = e.clientY-rect.top;\n  const old = scale;\n  scale = Math.max(0.5, Math.min(1.4, scale + (e.deltaY>0?-0.08:0.08)));\n  tx = mx - (mx-tx)*(scale/old);\n  ty = my - (my-ty)*(scale/old);\n  clampPan();\n  applyT();\n},{passive:false});\n\nfunction clampPan(){\n  const wrap = cw.getBoundingClientRect();\n  const CW = 10*CELL_W + PAD_X*2;\n  const CH = 4*CELL_H + PAD_Y + 260;\n  const scaledW = CW*scale, scaledH = CH*scale;\n  // generous elastic margins: frise technologique = on peut aller loin a gauche/droite\n  const elasticX = 400;\n  const elasticY = 120;\n  const minTx = wrap.width - scaledW - elasticX;\n  const maxTx = elasticX;\n  const minTy = wrap.height - scaledH - elasticY;\n  const maxTy = elasticY;\n  if(tx > maxTx) tx = maxTx + (tx-maxTx)*.4;\n  if(tx < minTx) tx = minTx + (tx-minTx)*.4;\n  if(ty > maxTy) ty = maxTy + (ty-maxTy)*.4;\n  if(ty < minTy) ty = minTy + (ty-minTy)*.4;\n}\nfunction elasticSnap(){\n  const wrap = cw.getBoundingClientRect();\n  const CW = 10*CELL_W + PAD_X*2;\n  const CH = 4*CELL_H + PAD_Y + 260;\n  const scaledW = CW*scale, scaledH = CH*scale;\n  // headroom to the left so the user CAN see the branch header\n  const leftroom = 260;\n  const minTx = wrap.width - scaledW - 40; // allow some slack to the right\n  const maxTx = leftroom;\n  const minTy = wrap.height - scaledH - 40;\n  const maxTy = 40;\n  let ntx = tx, nty = ty;\n  if(tx > maxTx) ntx = maxTx;\n  if(tx < minTx) ntx = Math.min(maxTx, minTx);\n  if(ty > maxTy) nty = maxTy;\n  if(ty < minTy) nty = Math.min(maxTy, minTy);\n  if(ntx !== tx || nty !== ty){\n    tx = ntx; ty = nty; applyT();\n  }\n}\n\n/* ============ Init demo ============ */\nrenderQueue();\n\n// Demo: auto-open popup once for showcase\nsetTimeout(()=>{\n  // enqueue lance (research state), plus shovel\n  queue = ['spear-wood','shovel-stone','gather-plus'];\n  renderQueue();\n}, 800);\n\n// Demo trigger: double-click on center = show unlock popup\ndocument.querySelector('.center').addEventListener('dblclick',()=>{\n  showUnlockPopup('pick-stone');\n});\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
