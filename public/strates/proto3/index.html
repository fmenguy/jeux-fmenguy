<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Strates, proto 3, beauty shot</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #0b0d12; overflow: hidden; font-family: system-ui, sans-serif; color: #f3ecdd; }
    #app { position: fixed; inset: 0; }
    #hud {
      position: fixed; left: 16px; bottom: 16px;
      background: rgba(20, 24, 30, 0.55);
      padding: 10px 14px; border-radius: 10px;
      backdrop-filter: blur(6px);
      font-size: 13px; line-height: 1.4;
      letter-spacing: 0.02em;
      pointer-events: none;
      max-width: 320px;
    }
    #hud b { color: #ffd98a; }
    #loader {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      background: #0b0d12; color: #c7b98c; font-size: 14px; letter-spacing: 0.1em;
    }
    #loader.hidden { display: none; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.161.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.161.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="loader">generation du monde...</div>
  <div id="app"></div>
  <div id="hud">
    <div><b>Strates</b>, proto 3 beauty shot</div>
    <div>glissez pour orbiter, molette pour zoomer</div>
  </div>
  <script type="module" src="./main.js"></script>
</body>
</html>
