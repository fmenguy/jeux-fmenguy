<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Strates, Proto 2 : sculpting</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #0b0d12; font-family: system-ui, sans-serif; color: #f3ecdd; }
  #app { position: fixed; inset: 0; }
  canvas { display: block; }
  #ui {
    position: absolute; top: 12px; left: 12px; z-index: 10;
    background: rgba(20, 24, 30, 0.65);
    backdrop-filter: blur(6px);
    padding: 10px 12px; border-radius: 10px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.35); display: flex; flex-direction: column; gap: 8px;
    min-width: 220px;
    color: #f3ecdd;
  }
  #ui h1 { margin: 0 0 4px; font-size: 14px; letter-spacing: 0.5px; color: #ffd98a; }
  .row { display: flex; gap: 6px; flex-wrap: wrap; }
  button {
    flex: 1; padding: 6px 8px; border: 1px solid rgba(255,255,255,0.18); border-radius: 6px;
    background: rgba(255,255,255,0.06); color: #f3ecdd; cursor: pointer; font-size: 12px; min-width: 58px;
  }
  button.active { background: #6aa6d9; color: white; border-color: #4a86b9; }
  button:hover { background: rgba(255,255,255,0.14); }
  button.active:hover { background: #5a96c9; }
  .label { font-size: 11px; color: #c7b98c; text-transform: uppercase; letter-spacing: 0.5px; }
  #fps {
    position: absolute; top: 12px; right: 12px; z-index: 10;
    background: rgba(0,0,0,0.6); color: #0f0; padding: 6px 10px; border-radius: 6px;
    font-family: monospace; font-size: 13px;
  }
  #help {
    position: absolute; bottom: 12px; left: 12px; z-index: 10;
    background: rgba(20, 24, 30, 0.65);
    backdrop-filter: blur(6px);
    padding: 8px 12px; border-radius: 10px;
    font-size: 12px; color: #f3ecdd; max-width: 380px; line-height: 1.5;
  }
  #help b { color: #ffd98a; }
  #loader {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    background: #0b0d12; color: #c7b98c; font-size: 14px; letter-spacing: 0.1em; z-index: 20;
  }
  #loader.hidden { display: none; }
</style>
</head>
<body>
<div id="loader">generation du monde...</div>
<div id="app"></div>
<div id="ui">
  <h1>Strates, Proto 2</h1>
  <div class="label">Mode</div>
  <div class="row">
    <button id="tool-nav" class="active">Naviguer</button>
  </div>
  <div class="label">Outil sculpt</div>
  <div class="row">
    <button id="tool-raise">Elever</button>
    <button id="tool-lower">Abaisser</button>
    <button id="tool-level">Niveler</button>
  </div>
  <div class="label">Pinceau</div>
  <div class="row">
    <button id="brush-1" class="active">R 1</button>
    <button id="brush-3">R 3 (croix)</button>
    <button id="brush-5">R 5 (disque)</button>
  </div>
</div>
<div id="fps">FPS: --</div>
<div id="help">
  <b>Naviguer</b> (defaut), clic gauche orbite, clic droit pan, molette zoom.
  Quand un outil de sculpt est actif, clic gauche sculpte, Shift plus clic gauche orbite, Echap revient en mode Naviguer.
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.161.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.161.0/examples/jsm/"
  }
}
</script>
<script type="module" src="./main.js"></script>
</body>
</html>
